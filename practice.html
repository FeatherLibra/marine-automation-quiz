辅助机械自动控制装置的结构和功", "section": "第一节 发电机和配电系统的设计特点及系统配置 （配电屏", "stem": "对于发电机主配电板中的负载屏说法错误的是______。", "options": {"A": "负载屏是用来监视、控制和保护发电机的", "B": "负载屏包括动力负载屏和照明负载屏", "C": "负载屏上装有兆欧表和绝缘指示灯", "D": "负载屏上装有与岸电箱相连的岸电开关"}, "answer": "A", "answerText": "负载屏是用来监视、控制和保护发电机的", "raw": "对于发电机主配电板中的负载屏说法错误的是______。\nA. 负载屏是用来监视、控制和保护发电机的\nB. 负载屏包括动力负载屏和照明负载屏\nC.负载屏上装有兆欧表和绝缘指示灯\nD.负载屏上装有与岸电箱相连的岸电开关", "day": 3}, {"id": 806, "number": 350, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第一节 发电机和配电系统的设计特点及系统配置 （配电屏", "stem": "对于主配电板中的负载屏，说法错误的是_____。", "options": {"A": "负载屏用来分配电能并对各馈电线路进行控制、监视和保护", "B": "通过馈电开关将电能供给各用电设备和分电箱", "C": "负载屏上装有逆功率继电器、仪用互感器", "D": "负载屏上装的自动开关大多为装置式自动空气开关"}, "answer": "C", "answerText": "负载屏上装有逆功率继电器、仪用互感器", "raw": "对于主配电板中的负载屏，说法错误的是_____。\nA.负载屏用来分配电能并对各馈电线路进行控制、监视和保护\nB.通过馈电开关将电能供给各用电设备和分电箱\nC.负载屏上装有逆功率继电器、仪用互感器\nD.负载屏上装的自动开关大多为装置式自动空气开关", "day": 3}, {"id": 807, "number": 351, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第一节 发电机和配电系统的设计特点及系统配置 （配电屏", "stem": "在主配电板中的负载屏上不装有_______。", "options": {"A": "绝缘电阻表和绝缘指示灯", "B": "同步表和整步指示灯", "C": "与岸电箱相连的岸电开关", "D": "主配电板和应急配电板之间的联络开关"}, "answer": "B", "answerText": "同步表和整步指示灯", "raw": "在主配电板中的负载屏上不装有_______。\nA.绝缘电阻表和绝缘指示灯\nB.同步表和整步指示灯\nC.与岸电箱相连的岸电开关\nD.主配电板和应急配电板之间的联络开关", "day": 3}, {"id": 808, "number": 125, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "在船舶发电机组的安全保护控制装置中，如出现冷却水温度过高，安全系统\n应是____.", "options": {"A": "分级给出报警，出现停车报警的延时后，再发出故障停车信号", "B": "报警，但不输出停止电磁阀动作信号", "C": "报警，立即跳电，停机", "D": "仅报警"}, "answer": "A", "answerText": "分级给出报警，出现停车报警的延时后，再发出故障停车信号", "raw": "在船舶发电机组的安全保护控制装置中，如出现冷却水温度过高，安全系统\n应是____.\nA.分级给出报警，出现停车报警的延时后，再发出故障停车信号\nB.报警，但不输出停止电磁阀动作信号\nC.报警，立即跳电，停机\nD.仅报警", "day": 3}, {"id": 809, "number": 126, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "在船舶发电机组的安全保护控制装置中，如出现滑油压力过低，安保系统应\n是_______。", "options": {"A": "发动机故障减速", "B": "发动机起动闭锁", "C": "报警，延时后跳电，再延时后停机", "D": "发动机直接故障停车"}, "answer": "D", "answerText": "发动机直接故障停车", "raw": "在船舶发电机组的安全保护控制装置中，如出现滑油压力过低，安保系统应\n是_______。\nA.发动机故障减速\nB.发动机起动闭锁\nC.报警，延时后跳电，再延时后停机\nD.发动机直接故障停车", "day": 3}, {"id": 810, "number": 127, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "同步发电机在额定转速和一定的负载功率因数下，为保持端电压基本不变，\n励磁电流随负载电流而变化的关系称为________.", "options": {"A": "调节特性", "B": "输出特性", "C": "效率特性", "D": "外特性"}, "answer": "A", "answerText": "调节特性", "raw": "同步发电机在额定转速和一定的负载功率因数下，为保持端电压基本不变，\n励磁电流随负载电流而变化的关系称为________.\nA.调节特性\nB.输出特性\nC.效率特性\nD.外特性", "day": 3}, {"id": 811, "number": 128, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "同步发电机的外特性是在_______一定的情况下测得的。\n①原动机转速；②励磁电流；③功率因数", "options": {"A": "①", "B": "②", "C": "③", "D": "①②③"}, "answer": "D", "answerText": "①②③", "raw": "同步发电机的外特性是在_______一定的情况下测得的。\n①原动机转速；②励磁电流；③功率因数\nA.①\nB.②\nC.③\nD.①②③", "day": 3}, {"id": 812, "number": 129, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "同步发电机的调节特性是在________一定的情况下测得的。\n①原动机转速；②端电压；③功率因数", "options": {"A": "①②", "B": "②③", "C": "①③", "D": "①②③"}, "answer": "D", "answerText": "①②③", "raw": "同步发电机的调节特性是在________一定的情况下测得的。\n①原动机转速；②端电压；③功率因数\nA.①②\nB.②③\nC.①③\nD.①②③", "day": 3}, {"id": 813, "number": 130, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "用实验的方法测量同步发电机的调节特性时，要求保持发电机的 _______不\n变。", "options": {"A": "端电压", "B": "电枢电流", "C": "励磁电流", "D": "负载大小"}, "answer": "A", "answerText": "端电压", "raw": "用实验的方法测量同步发电机的调节特性时，要求保持发电机的 _______不\n变。\nA.端电压\nB.电枢电流\nC.励磁电流\nD.负载大小", "day": 3}, {"id": 814, "number": 131, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "为维持同步发电机的输出电压恒定，随着输出电流的增大，在感性负载时应\n______励磁电流；在容性负载时，应_______励磁电流。", "options": {"A": "减小；不变", "B": "增大；减小", "C": "增大；不变", "D": "减小；增大"}, "answer": "B", "answerText": "增大；减小", "raw": "为维持同步发电机的输出电压恒定，随着输出电流的增大，在感性负载时应\n______励磁电流；在容性负载时，应_______励磁电流。\nA.减小；不变\nB.增大；减小\nC.增大；不变\nD.减小；增大", "day": 3}, {"id": 815, "number": 132, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "中国船级社《钢质海船入级规范》规定，船舶主发电机系统的静态电压调整\n率应在_________以内。", "options": {"A": "±5%", "B": "±3.5%", "C": "±2.5%", "D": "±10%"}, "answer": "C", "answerText": "±2.5%", "raw": "中国船级社《钢质海船入级规范》规定，船舶主发电机系统的静态电压调整\n率应在_________以内。\nA.±5%\nB.±3.5%\nC.±2.5%\nD.±10%", "day": 3}, {"id": 816, "number": 133, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "在衡量船舶发电机自动调压装置的品质时，应_______ 。", "options": {"A": "只考察其静态指标即可", "B": "只考察其电压恢复时间即可", "C": "只考察其动态指标即可", "D": "动态、静态指标均要满足有关规范的要求"}, "answer": "D", "answerText": "动态、静态指标均要满足有关规范的要求", "raw": "在衡量船舶发电机自动调压装置的品质时，应_______ 。\nA.只考察其静态指标即可\nB.只考察其电压恢复时间即可\nC.只考察其动态指标即可\nD.动态、静态指标均要满足有关规范的要求", "day": 3}, {"id": 817, "number": 134, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "中国船级社《钢质海船入级规范》规定，发电机的自动调压系统应该满足：\n发电机_______额定电流及功率因数不超过 0.4 感性对称负载时，电压恢复到最\n后稳态值相差 3%以内所需时间应不超过 1.5s.", "options": {"A": "突加或突减 20%", "B": "突减 50%", "C": "突加或突减 60%", "D": "突加 50%"}, "answer": "C", "answerText": "突加或突减 60%", "raw": "中国船级社《钢质海船入级规范》规定，发电机的自动调压系统应该满足：\n发电机_______额定电流及功率因数不超过 0.4 感性对称负载时，电压恢复到最\n后稳态值相差 3%以内所需时间应不超过 1.5s.\nA.突加或突减 20%\nB.突减 50%\nC.突加或突减 60%\nD.突加 50%", "day": 3}, {"id": 818, "number": 135, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶电站运行时， ____________参数必须保持恒定， 这是供电质量的重要指\n标。\n①电压；②频率；③电流；④功率；⑤功率因数", "options": {"A": "①②", "B": "①③⑤", "C": "①④⑤", "D": "②⑤"}, "answer": "A", "answerText": "①②", "raw": "船舶电站运行时， ____________参数必须保持恒定， 这是供电质量的重要指\n标。\n①电压；②频率；③电流；④功率；⑤功率因数\nA.①②\nB.①③⑤\nC.①④⑤\nD.②⑤", "day": 3}, {"id": 819, "number": 136, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "在船舶电站中，要求电网_________.", "options": {"A": "无功电流稳定", "B": "有功电流稳定", "C": "电压稳定", "D": "功率稳定"}, "answer": "C", "answerText": "电压稳定", "raw": "在船舶电站中，要求电网_________.\nA.无功电流稳定\nB.有功电流稳定\nC.电压稳定\nD.功率稳定", "day": 3}, {"id": 820, "number": 195, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "无刷同步发电机的自动调压系统中，设有差动电流互感器，它是____ 。", "options": {"A": "频率自动调整装置", "B": "有功功率的自动调整装置", "C": "无功功率的自动调整装置", "D": "起压回路"}, "answer": "C", "answerText": "无功功率的自动调整装置", "raw": "无刷同步发电机的自动调压系统中，设有差动电流互感器，它是____ 。\nA.频率自动调整装置\nB.有功功率的自动调整装置\nC.无功功率的自动调整装置\nD.起压回路", "day": 3}, {"id": 821, "number": 196, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶发电机自动调压器不仅担负自动调压的任务，还担负_______。", "options": {"A": "自动调整发电机频率的任务", "B": "自动调整、分配有功功率的任务", "C": "自动调整、分配无功功率的任务", "D": "自动调整、分配有功电流的任务"}, "answer": "C", "answerText": "自动调整、分配无功功率的任务", "raw": "船舶发电机自动调压器不仅担负自动调压的任务，还担负_______。\nA.自动调整发电机频率的任务\nB.自动调整、分配有功功率的任务\nC.自动调整、分配无功功率的任务\nD.自动调整、分配有功电流的任务", "day": 3}, {"id": 822, "number": 197, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "同步发电机带恒定负载单独运行时， 改变发电机的励磁电流， 会引起发电机\n_______出现相应变化。", "options": {"A": "电流", "B": "电压", "C": "频率", "D": "相位"}, "answer": "B", "answerText": "电压", "raw": "同步发电机带恒定负载单独运行时， 改变发电机的励磁电流， 会引起发电机\n_______出现相应变化。\nA.电流\nB.电压\nC.频率\nD.相位", "day": 3}, {"id": 823, "number": 198, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "两台均为无差调压特性的发电机， 由于_______ 分配关系不恒定， 不可并联\n运行。", "options": {"A": "无功功率", "B": "有功功率", "C": "无功频率", "D": "有功电流"}, "answer": "A", "answerText": "无功功率", "raw": "两台均为无差调压特性的发电机， 由于_______ 分配关系不恒定， 不可并联\n运行。\nA.无功功率\nB.有功功率\nC.无功频率\nD.有功电流", "day": 3}, {"id": 824, "number": 199, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "三台电压相同、相序一致的无差调压特性的发电机，_______。", "options": {"A": "可以并联运行", "B": "可以串联运行", "C": "可以混联运行", "D": "不可并联运行"}, "answer": "D", "answerText": "不可并联运行", "raw": "三台电压相同、相序一致的无差调压特性的发电机，_______。\nA.可以并联运行\nB.可以串联运行\nC.可以混联运行\nD.不可并联运行", "day": 3}, {"id": 825, "number": 200, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "自动调频调载装置由_______ 、有功功率分配器、调整器组成。", "options": {"A": "电压变换器、有功功率变换器", "B": "电压变换器、无功功率变换器", "C": "频率变换器、有功功率变换器", "D": "频率变换器、无功功率变换器"}, "answer": "C", "answerText": "频率变换器、有功功率变换器", "raw": "自动调频调载装置由_______ 、有功功率分配器、调整器组成。\nA.电压变换器、有功功率变换器\nB.电压变换器、无功功率变换器\nC.频率变换器、有功功率变换器\nD.频率变换器、无功功率变换器", "day": 3}, {"id": 826, "number": 201, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶电站的自动调频调载是指能自动维持电网 _______ ；接到解列指令时\n能自动控制负荷转移。", "options": {"A": "频率恒定，保证无功功率按比例分配", "B": "频率恒定，保证有功功率按比例分配", "C": "电压恒定，保证有功功率按比例分配", "D": "电压恒定，保证无功功率按比例分配"}, "answer": "B", "answerText": "频率恒定，保证有功功率按比例分配", "raw": "船舶电站的自动调频调载是指能自动维持电网 _______ ；接到解列指令时\n能自动控制负荷转移。\nA. 频率恒定，保证无功功率按比例分配\nB. 频率恒定，保证有功功率按比例分配\nC. 电压恒定，保证有功功率按比例分配\nD. 电压恒定，保证无功功率按比例分配", "day": 3}, {"id": 827, "number": 202, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "自 动 调 频 调 载 装 置 是 在 发 电 机 并 联 运 行 时 协 助 原 动 机 调 速 器 对 电 网\n________和_______进行调整的装置。", "options": {"A": "电压大小；频率", "B": "电压的大小；有功功率分配", "C": "电压的频率；有功功率分配", "D": "电压的频率；无功功率分配"}, "answer": "C", "answerText": "电压的频率；有功功率分配", "raw": "自 动 调 频 调 载 装 置 是 在 发 电 机 并 联 运 行 时 协 助 原 动 机 调 速 器 对 电 网\n________和_______进行调整的装置。\nA.电压大小；频率\nB.电压的大小；有功功率分配\nC.电压的频率；有功功率分配\nD.电压的频率；无功功率分配", "day": 3}, {"id": 828, "number": 203, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "一般说来，船舶电站的自动调频调载装置能完成_______ 功能。\n①维持调速特性不一致的两机组有功功率分配均匀；②保持电网电压的频率恒定；\n③接到解列指令， 自动进行负荷转移；④根据目前网上负荷大小自动调整发电机\n台数", "options": {"A": "①②③④", "B": "①②④", "C": "②③④", "D": "①②③"}, "answer": "D", "answerText": "①②③", "raw": "一般说来，船舶电站的自动调频调载装置能完成_______ 功能。\n①维持调速特性不一致的两机组有功功率分配均匀；②保持电网电压的频率恒定；\n③接到解列指令， 自动进行负荷转移；④根据目前网上负荷大小自动调整发电机\n台数\nA.①②③④\nB.①②④\nC.②③④\nD.①②③", "day": 3}, {"id": 829, "number": 204, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "通常，_______ 是自动调频调载装置在船舶电站中的作用。\n①保持电网的频率恒定；②按并联运行机组的容量比例进行负荷分配；③当接到\n解列指令， 可自动转移负荷；④主发电机出现过载时自动分级将次要负载从电网\n切除", "options": {"A": "①②③④", "B": "②③④", "C": "①③④", "D": "①②③"}, "answer": "D", "answerText": "①②③", "raw": "通常，_______ 是自动调频调载装置在船舶电站中的作用。\n①保持电网的频率恒定；②按并联运行机组的容量比例进行负荷分配；③当接到\n解列指令， 可自动转移负荷；④主发电机出现过载时自动分级将次要负载从电网\n切除\nA.①②③④\nB.②③④\nC.①③④\nD.①②③", "day": 3}, {"id": 830, "number": 205, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "自动调频调载的方法很多，其中每一台发电机所装设的调速器的特性为有\n差，而调整的结果可使电网的频率恒定，功率均分，是无差的，这种方法称为\n_______ 。", "options": {"A": "虚有差调节法", "B": "主调发电机法", "C": "主-从控制法", "D": "积差法"}, "answer": "A", "answerText": "虚有差调节法", "raw": "自动调频调载的方法很多，其中每一台发电机所装设的调速器的特性为有\n差，而调整的结果可使电网的频率恒定，功率均分，是无差的，这种方法称为\n_______ 。\nA.虚有差调节法\nB.主调发电机法\nC.主-从控制法\nD.积差法", "day": 3}, {"id": 831, "number": 206, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "柴油同步发电机并联后，调节 ________可改变无功功率的分配，调节\n________可改变有功功率的分配。", "options": {"A": "励磁电流；原动机油门", "B": "励磁电流；发电机调压器", "C": "原动机油门；原动机调速器", "D": "原动机油门；励磁电流"}, "answer": "A", "answerText": "励磁电流；原动机油门", "raw": "柴油同步发电机并联后，调节 ________可改变无功功率的分配，调节\n________可改变有功功率的分配。\nA.励磁电流；原动机油门\nB.励磁电流；发电机调压器\nC.原动机油门；原动机调速器\nD.原动机油门；励磁电流", "day": 3}, {"id": 832, "number": 207, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "并联运行发电机无功功率分配故障，可能原因不包括_______ 。", "options": {"A": "发电机自动电压调节压器调差电位器位置不正确", "B": "发电机自动电压调节器采样电压相序不正确", "C": "发电机自动电压调节器故障", "D": "发电机自动电压调节器强行励磁装置故障"}, "answer": "D", "answerText": "发电机自动电压调节器强行励磁装置故障", "raw": "并联运行发电机无功功率分配故障，可能原因不包括_______ 。\nA. 发电机自动电压调节压器调差电位器位置不正确\nB. 发电机自动电压调节器采样电压相序不正确\nC. 发电机自动电压调节器故障\nD. 发电机自动电压调节器强行励磁装置故障", "day": 3}, {"id": 833, "number": 208, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "发电机自动调频调载装置又称 “自动负荷分配器”，关于其作用的描述不正\n确的是________。", "options": {"A": "保护电网频率为额定频率", "B": "平均分配并联运行机组负荷", "C": "接到解列指令时，自动转移负荷", "D": "待解列发电机负荷接近零时，使待解列发电机主开关自动跳闸"}, "answer": "B", "answerText": "平均分配并联运行机组负荷", "raw": "发电机自动调频调载装置又称 “自动负荷分配器”，关于其作用的描述不正\n确的是________。\nA. 保护电网频率为额定频率\nB. 平均分配并联运行机组负荷\nC. 接到解列指令时，自动转移负荷\nD. 待解列发电机负荷接近零时，使待解列发电机主开关自动跳闸", "day": 3}, {"id": 834, "number": 209, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "并联运行发电机负荷自动分配故障，故障原因不可能是________。", "options": {"A": "调速器故障", "B": "调压器故障", "C": "调频调载装置故障", "D": "发电机有功功率和频率测量装置故障"}, "answer": "B", "answerText": "调压器故障", "raw": "并联运行发电机负荷自动分配故障，故障原因不可能是________。\nA.调速器故障\nB.调压器故障\nC.调频调载装置故障\nD.发电机有功功率和频率测量装置故障", "day": 3}, {"id": 835, "number": 210, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "对于具有自动电站管理系统的电站，当发生一台发电机主开关因逆功率跳\n闸时，除报警外自动电站会将_______ 立即自动起动。\n①第一备用机组；②第二备用机组；③应急发电机组", "options": {"A": "①", "B": "③", "C": "①③", "D": "①②"}, "answer": "A", "answerText": "①", "raw": "对于具有自动电站管理系统的电站，当发生一台发电机主开关因逆功率跳\n闸时，除报警外自动电站会将_______ 立即自动起动。\n①第一备用机组；②第二备用机组；③应急发电机组\nA.①\nB.③\nC.①③\nD.①②", "day": 3}, {"id": 836, "number": 211, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶并联运行发电机的原动机调速器的调速特性必须为_______ 。", "options": {"A": "有差上翘特性", "B": "有差下垂特性", "C": "无差特性", "D": "有差下垂特性或无差特性"}, "answer": "B", "answerText": "有差下垂特性", "raw": "船舶并联运行发电机的原动机调速器的调速特性必须为_______ 。\nA.有差上翘特性\nB.有差下垂特性\nC.无差特性\nD.有差下垂特性或无差特性", "day": 3}, {"id": 837, "number": 212, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "如图所示发电机原动机调速器特性曲线由 A 调到 B 说明 ；由 A 调到\nC 则说明________。", "options": {"A": "调速器的弹簧预紧力增加，油门开度增大；调速器的弹簧预紧力减小，油门\n开度减小", "B": "调速器的弹簧预紧力减小，油门开度减小；调速器的弹簧预紧力增加，油门\n开度增大", "C": "调速器的弹簧预紧力减小，油门开度增大；调速器的弹簧预紧力减小，油门\n开度减小", "D": "调速器的弹簧预紧力增加，油门开度增大；调速器的弹簧预紧力增加，油门\n开度减小"}, "answer": "B", "answerText": "调速器的弹簧预紧力减小，油门开度减小；调速器的弹簧预紧力增加，油门\n开度增大", "raw": "如图所示发电机原动机调速器特性曲线由 A 调到 B 说明 ；由 A 调到\nC 则说明________。\nA. 调速器的弹簧预紧力增加，油门开度增大；调速器的弹簧预紧力减小，油门\n开度减小\nB. 调速器的弹簧预紧力减小，油门开度减小；调速器的弹簧预紧力增加，油门\n开度增大\nC. 调速器的弹簧预紧力减小，油门开度增大；调速器的弹簧预紧力减小，油门\n开度减小\nD. 调速器的弹簧预紧力增加，油门开度增大；调速器的弹簧预紧力增加，油门\n开度减小", "day": 3}, {"id": 838, "number": 213, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "调速器的 “一次调节 ”是通过调速器的作用，依靠调速器的固有调速特性\n________的大小，从而维持发电机的频率在一定的范围内。", "options": {"A": "手动调节油门", "B": "自动调节油门", "C": "手动调节阀门", "D": "自动调节阀门"}, "answer": "B", "answerText": "自动调节油门", "raw": "调速器的 “一次调节 ”是通过调速器的作用，依靠调速器的固有调速特性\n________的大小，从而维持发电机的频率在一定的范围内。\nA.手动调节油门\nB.自动调节油门\nC.手动调节阀门\nD.自动调节阀门", "day": 3}, {"id": 839, "number": 214, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "如果两台原动机调速特性完全一致的同步发电机并联均载运行， 由于网上有\n功负载的发生变动，一段时间运行后，则______。", "options": {"A": "导致一台机组发电机逆功跳闸", "B": "两台机组有功负载分配不再均匀", "C": "机组间发生功率振荡", "D": "有功负载仍保持均匀分配"}, "answer": "D", "answerText": "有功负载仍保持均匀分配", "raw": "如果两台原动机调速特性完全一致的同步发电机并联均载运行， 由于网上有\n功负载的发生变动，一段时间运行后，则______。\nA.导致一台机组发电机逆功跳闸\nB.两台机组有功负载分配不再均匀\nC.机组间发生功率振荡\nD.有功负载仍保持均匀分配", "day": 3}, {"id": 840, "number": 215, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "交流电站中，若电网负载无变化，电网频率不稳多由_______ 引起。", "options": {"A": "励磁", "B": "调速器", "C": "调压器", "D": "均压线"}, "answer": "B", "answerText": "调速器", "raw": "交流电站中，若电网负载无变化，电网频率不稳多由_______ 引起。\nA.励磁\nB.调速器\nC.调压器\nD.均压线", "day": 3}, {"id": 841, "number": 216, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "若两台同步发电机的原动机调速特性分别为有差特性和无差特性，则该二\n机并联运行后，若电网上有功负载变动，则________。", "options": {"A": "发电机频率波动，不能进行有功负载转移", "B": "变化量将全部由无差特性的发电机承担", "C": "变化量将全部由有差特性的发电机承担", "D": "将导致两台发电机频率的都变动"}, "answer": "B", "answerText": "变化量将全部由无差特性的发电机承担", "raw": "若两台同步发电机的原动机调速特性分别为有差特性和无差特性，则该二\n机并联运行后，若电网上有功负载变动，则________。\nA. 发电机频率波动，不能进行有功负载转移\nB. 变化量将全部由无差特性的发电机承担\nC. 变化量将全部由有差特性的发电机承担\nD. 将导致两台发电机频率的都变动", "day": 3}, {"id": 842, "number": 217, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "由两台交流同步发电机构成的船舶电站， 关于其原动机调速特性的说法， 正\n确的是________ 。", "options": {"A": "均为无差特性，是最为理想的", "B": "一台为有差特性，一台为无差特性，并联后一定可以稳定运行", "C": "均为相同调差率的有差特性，是最为理想的", "D": "均为相同调差率的有差特性，并联后不能稳定运行"}, "answer": "C", "answerText": "均为相同调差率的有差特性，是最为理想的", "raw": "由两台交流同步发电机构成的船舶电站， 关于其原动机调速特性的说法， 正\n确的是________ 。\nA. 均为无差特性，是最为理想的\nB. 一台为有差特性，一台为无差特性，并联后一定可以稳定运行\nC. 均为相同调差率的有差特性，是最为理想的\nD. 均为相同调差率的有差特性，并联后不能稳定运行", "day": 3}, {"id": 843, "number": 218, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "若两台原动机调速特性完全一致的同容量同步发电机并联运行，经一段时\n间后，有功负载发生变动，______。", "options": {"A": "有功负载分配不再均匀", "B": "机组间功率振荡", "C": "有功负载分配仍保持均匀", "D": "导致一台发电机逆功跳闸"}, "answer": "C", "answerText": "有功负载分配仍保持均匀", "raw": "若两台原动机调速特性完全一致的同容量同步发电机并联运行，经一段时\n间后，有功负载发生变动，______。\nA.有功负载分配不再均匀\nB.机组间功率振荡\nC.有功负载分配仍保持均匀\nD.导致一台发电机逆功跳闸", "day": 3}, {"id": 844, "number": 219, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "两台同型号的同步发电机并联运行时已均功， 若系统无自动调频调载装置，\n由于两台柴油机调速器的调差率不同， 当电网功率减小后， 结果是调差率小的输\n出功率与调差率大的输出功率相比为______。", "options": {"A": "调差率小的输出功率小", "B": "调差率大的输出功率小", "C": "两者相等", "D": "视当时负载情况而定"}, "answer": "A", "answerText": "调差率小的输出功率小", "raw": "两台同型号的同步发电机并联运行时已均功， 若系统无自动调频调载装置，\n由于两台柴油机调速器的调差率不同， 当电网功率减小后， 结果是调差率小的输\n出功率与调差率大的输出功率相比为______。\nA.调差率小的输出功率小\nB.调差率大的输出功率小\nC.两者相等\nD.视当时负载情况而定", "day": 3}, {"id": 845, "number": 220, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "在讨论并联运行同步发电机调速器的调速特性时，说法正确的是 _______。", "options": {"A": "若调速特性均为有差特性且大体一致，当电网负荷变化时，能自动地、稳定\n地分配有功功率，两机组能稳定并联运行", "B": "若调速特性均为无差特性的同步发电机能并联运行，并可保证两机组有功功\n率分配始终均匀", "C": "若一台具有有差特性与另一台具有无差特性发电机并联运行， 当负荷变化时，\n由于系统的频率不变，可以保证负荷的均匀分配", "D": "为了使负荷变化时，并联运行发电机稳定运行，两组机组调速特性的斜率相\n差大些为好"}, "answer": "A", "answerText": "若调速特性均为有差特性且大体一致，当电网负荷变化时，能自动地、稳定\n地分配有功功率，两机组能稳定并联运行", "raw": "在讨论并联运行同步发电机调速器的调速特性时，说法正确的是 _______。\nA. 若调速特性均为有差特性且大体一致，当电网负荷变化时，能自动地、稳定\n地分配有功功率，两机组能稳定并联运行\nB. 若调速特性均为无差特性的同步发电机能并联运行，并可保证两机组有功功\n率分配始终均匀\nC. 若一台具有有差特性与另一台具有无差特性发电机并联运行， 当负荷变化时，\n由于系统的频率不变，可以保证负荷的均匀分配\nD. 为了使负荷变化时，并联运行发电机稳定运行，两组机组调速特性的斜率相\n差大些为好", "day": 3}, {"id": 846, "number": 221, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶电站单机运行时，通过调节运行发电机组原动机的 _______ 可以实现\n电网频率的调整。", "options": {"A": "调速器", "B": "励磁", "C": "调压器", "D": "均压线"}, "answer": "A", "answerText": "调速器", "raw": "船舶电站单机运行时，通过调节运行发电机组原动机的 _______ 可以实现\n电网频率的调整。\nA.调速器\nB.励磁\nC.调压器\nD.均压线", "day": 3}, {"id": 847, "number": 222, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", " 分配器和\n调整器四部分组成，其中调整器接收________的综合信号来控制发电机组。", "options": {"A": "频率和功率", "B": "频差和功差", "C": "电压和电流", "D": "电压差和电流差"}, "answer": "B", "answerText": "频差和功差", "raw": "自动调频调载装置一般由频率变换器、 有功功率变换器、 有功功率分配器和\n调整器四部分组成，其中调整器接收________的综合信号来控制发电机组。\nA.频率和功率\nB.频差和功差\nC.电压和电流\nD.电压差和电流差", "day": 3}, {"id": 857, "number": 232, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "如图所示， 为构成某船舶电站的两台同容量同步发电机调速器的特性曲线。\n现已经在。 点处运行并均匀出力。 若在没有自动调载装置情况下现投入大功率电\n动机（如起货机）运行，则________。", "options": {"A": "1 号机的有功增加，2 号机的有功减小", "B": "1 号机 2 号机的有功均增加且有功变化量相同", "C": "1 号机 2 号机的有功均增加且 1 号机增加得多一些", "D": "1 号机 2 号机的有功均增加且 2 号机增加得多一些"}, "answer": "C", "answerText": "1 号机 2 号机的有功均增加且 1 号机增加得多一些", "raw": "如图所示， 为构成某船舶电站的两台同容量同步发电机调速器的特性曲线。\n现已经在。 点处运行并均匀出力。 若在没有自动调载装置情况下现投入大功率电\n动机（如起货机）运行，则________。\nA. 1 号机的有功增加，2 号机的有功减小\nB. 1 号机 2 号机的有功均增加且有功变化量相同\nC. 1 号机 2 号机的有功均增加且 1 号机增加得多一些\nD. 1 号机 2 号机的有功均增加且 2 号机增加得多一些", "day": 3}, {"id": 858, "number": 233, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "发电机组自动并车过程中， 待并发电机组的加速与减速是由_____来控制的。", "options": {"A": "频差电压幅值", "B": "频差电压的周期", "C": "频差方向", "D": "电压差的大小"}, "answer": "C", "answerText": "频差方向", "raw": "发电机组自动并车过程中， 待并发电机组的加速与减速是由_____来控制的。\nA.频差电压幅值\nB.频差电压的周期\nC.频差方向\nD.电压差的大小", "day": 3}, {"id": 859, "number": 234, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "有两台同容量的交流发电机组并联运行时，若 2 号机组有功功率小于 1 号\n机组有功功率，为使两机组担负的有功功率相等，其调整的方法是________。", "options": {"A": "减小 1 号机组发电机油门，增大 2 号机组发电机油门", "B": "增大 1 号机组发电机油门，减小 2 号机组发电机油门", "C": "减小 1 号机组励磁电流，增大 2 号机组励磁电流", "D": "增大 1 号机组励磁电流，减小 2 号机组励磁电流"}, "answer": "A", "answerText": "减小 1 号机组发电机油门，增大 2 号机组发电机油门", "raw": "有两台同容量的交流发电机组并联运行时，若 2 号机组有功功率小于 1 号\n机组有功功率，为使两机组担负的有功功率相等，其调整的方法是________。\nA. 减小 1 号机组发电机油门，增大 2 号机组发电机油门\nB. 增大 1 号机组发电机油门，减小 2 号机组发电机油门\nC. 减小 1 号机组励磁电流，增大 2 号机组励磁电流\nD. 增大 1 号机组励磁电流，减小 2 号机组励磁电流", "day": 3}, {"id": 860, "number": 236, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", " 发电机的调速器损坏；③负荷变\n化太快；④其中一台发电机的调速马达坏\nA.①②③\nB.②③④\nC.①②④\nD.③④", "day": 3}, {"id": 865, "number": 241, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶电站交流发电机组单机运行和并联运行时，对其调速特性的要求分别\n为_______ 。", "options": {"A": "无差调节，无差调节", "B": "有差调节，无差调节", "C": "无差调节，有差调节", "D": "有差调节，有差调节"}, "answer": "C", "answerText": "无差调节，有差调节", "raw": "船舶电站交流发电机组单机运行和并联运行时，对其调速特性的要求分别\n为_______ 。\nA.无差调节，无差调节\nB.有差调节，无差调节\nC.无差调节，有差调节\nD.有差调节，有差调节", "day": 3}, {"id": 866, "number": 242, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "主柴油发电机组自动起动控制装置必须具有的功能之一是_______。", "options": {"A": "自动、机旁、遥控操作方式的转换，并能满足机旁优先于遥控，遥控优先于\n自动", "B": "自动、机旁、遥控操作方式的转换，并能满足自动优先于遥控，遥控优先于\n机旁", "C": "当转换开关置自动时，不能进行遥控操作", "D": "当转换开关置自动时，不能进行机旁操作"}, "answer": "A", "answerText": "自动、机旁、遥控操作方式的转换，并能满足机旁优先于遥控，遥控优先于\n自动", "raw": "主柴油发电机组自动起动控制装置必须具有的功能之一是_______。\nA. 自动、机旁、遥控操作方式的转换，并能满足机旁优先于遥控，遥控优先于\n自动\nB. 自动、机旁、遥控操作方式的转换，并能满足自动优先于遥控，遥控优先于\n机旁\nC. 当转换开关置自动时，不能进行遥控操作\nD. 当转换开关置自动时，不能进行机旁操作", "day": 3}, {"id": 867, "number": 243, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "主柴油发电机组自动起动控制装置必须具有的功能之一是_______。", "options": {"A": "起动指令给出后，若一次失败，则给出起动失败信号", "B": "自动模式下，操作人员不能在本地手动起动发电机组", "C": "一个起动指令允许三次起动，若三次失败，应给出起动失败信号", "D": "自动模式下，操作人员不能在本地手动停止发电机组"}, "answer": "C", "answerText": "一个起动指令允许三次起动，若三次失败，应给出起动失败信号", "raw": "主柴油发电机组自动起动控制装置必须具有的功能之一是_______。\nA. 起动指令给出后，若一次失败，则给出起动失败信号\nB. 自动模式下，操作人员不能在本地手动起动发电机组\nC. 一个起动指令允许三次起动，若三次失败，应给出起动失败信号\nD. 自动模式下，操作人员不能在本地手动停止发电机组", "day": 3}, {"id": 868, "number": 244, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "主柴油发电机组自动起动控制装置必须具有的功能之一是_______。", "options": {"A": "发电机组可供备用的条件是：操作选择开关置“自动”、机旁的本地/遥控开关\n置“本地”位且燃油及压缩空气备好、有预热和预润滑、无阻塞", "B": "发电机组可供备用的条件是：操作选择开关置“手动”、机旁的本地/遥控开关\n置“遥控”位且燃油及压缩空气备好、有预热和预润滑、无阻塞", "C": "发电机组可供备用的条件是：操作选择开关置“手动”、机旁的本地/遥控开关\n置“本地”且燃油及压缩空气备好、有预热和预润滑、无阻塞", "D": "发电机组可供备用的条件是：操作选择开关置“自动”、机旁的本地/遥控开关\n置“遥控”位、燃油及压缩空气备好、有预热和预润滑、无阻塞"}, "ans 脱扣", "day": 3}, {"id": 904, "number": 282, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "中国船级社 《钢质海船入级规范》 规定， 对500 V 以下同步发电机， 针对其\n不正常运行情况和可能出现的故障，主要设置的安全保护有_______。\n①发电机的过载和短路保护；②发电机的欠电压保护；③发电机的逆功率保护；\n④自动卸载；⑤岸电相序保护；⑥变压器的保护", "options": {"A": "①②③④", "B": "①②③⑤⑥", "C": "①③⑤", "D": "①②③④⑤⑥"}, "answer": "A", "answerText": "①②③④", "raw": "中国船级社 《钢质海船入级规范》 规定， 对500 V 以下同步发电机， 针对其\n不正常运行情况和可能出现的故障，主要设置的安全保护有_______。\n①发电机的过载和短路保护；②发电机的欠电压保护；③发电机的逆功率保护；\n④自动卸载；⑤岸电相序保护；⑥变压器的保护\nA.①②③④\nB.①②③⑤⑥\nC.①③⑤\nD.①②③④⑤⑥", "day": 3}, {"id": 905, "number": 283, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶电站配电屏上的仪表有多种，但是_______ 不太常见。", "options": {"A": "三相功率表", "B": "在线式绝缘表", "C": "三相电能表", "D": "电网频率表"}, "answer": "C", "answerText": "三相电能表", "raw": "船舶电站配电屏上的仪表有多种，但是_______ 不太常见。\nA.三相功率表\nB.在线式绝缘表\nC.三相电能表\nD.电网频率表", "day": 3}, {"id": 906, "number": 284, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "日常维护中， 需对船舶电力系统的功能及报警进行定期的试验， 功能试验不\n包括_______。", "options": {"A": "对手动并车装置进行检查和效用试验", "B": "模拟故障，检验发电机能否在规定时间内自动起动并合闸供电", "C": "模拟试验运行中的主发电机出现预报警", "D": "用模拟信号替代运行中发电机的滑油压力，模拟故障停机"}, "answer": "D", "answerText": "用模拟信号替代运行中发电机的滑油压力，模拟故障停机", "raw": "日常维护中， 需对船舶电力系统的功能及报警进行定期的试验， 功能试验不\n包括_______。\nA. 对手动并车装置进行检查和效用试验\nB. 模拟故障，检验发电机能否在规定时间内自动起动并合闸供电\nC. 模拟试验运行中的主发电机出现预报警\nD. 用模拟信号替代运行中发电机的滑油压力，模拟故障停机", "day": 3}, {"id": 907, "number": 285, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶同步发电机主要应设置过载、短路、欠压和逆功率四种保护，其中\n_______ 保护发电机主开关无法完成。", "options": {"A": "过载", "B": "短路", "C": "欠压", "D": "逆功率"}, "answer": "D", "answerText": "逆功率", "raw": "船舶同步发电机主要应设置过载、短路、欠压和逆功率四种保护，其中\n_______ 保护发电机主开关无法完成。\nA.过载\nB.短路\nC.欠压\nD.逆功率", "day": 3}, {"id": 908, "number": 286, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "发电机短路故障跳闸后， 应对发电机主开关做的保养内容不包括_______ 。", "options": {"A": "清除灭弧室内的烟痕和金属颗粒", "B": "清洁后栅片之间的绝缘电阻值不少于 0.5 MΩ", "C": "检查触头的光洁度，如有斑点或凹凸不平'应进行打磨或更换触头", "D": "重新整定发电机主开关短路保护设定值"}, "answer": "D", "answerText": "重新整定发电机主开关短路保护设定值", "raw": "发电机短路故障跳闸后， 应对发电机主开关做的保养内容不包括_______ 。\nA. 清除灭弧室内的烟痕和金属颗粒\nB. 清洁后栅片之间的绝缘电阻值不少于 0.5 MΩ\nC. 检查触头的光洁度，如有斑点或凹凸不平'应进行打磨或更换触头\nD. 重新整定发电机主开关短路保护设定值", "day": 3}, {"id": 909, "number": 287, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "发电机主开关手动、电动均不能合闸，故障原因不可能是_______ 。", "options": {"A": "发电机主开关失压脱扣线圈损坏", "B": "发电机主升关分励脱扣器的铁芯卡死在脱扣位置", "C": "发电机主开关合闸线圈损坏", "D": "发电机主开关失压脱扣器凸轮磨损过大，不能有效地使连杆锁止"}, "answer": "C", "answerText": "发电机主开关合闸线圈损坏", "raw": "发电机主开关手动、电动均不能合闸，故障原因不可能是_______ 。\nA. 发电机主开关失压脱扣线圈损坏\nB. 发电机主升关分励脱扣器的铁芯卡死在脱扣位置\nC. 发电机主开关合闸线圈损坏\nD. 发电机主开关失压脱扣器凸轮磨损过大，不能有效地使连杆锁止", "day": 3}, {"id": 910, "number": 288, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "同步发电机单独运行时，负载的突然变化会引起发电机 _______ 出现相应\n的变化。\n①电压；②相位；③频率", "options": {"A": "①", "B": "②", "C": "③", "D": "①③"}, "answer": "D", "answerText": "①③", "raw": "同步发电机单独运行时，负载的突然变化会引起发电机 _______ 出现相应\n的变化。\n①电压；②相位；③频率\nA.①\nB.②\nC.③\nD.①③", "day": 3}, {"id": 911, "number": 289, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶电力系统是由_______ 组成的。", "options": {"A": "主电源、应急电源、电网、负载", "B": "电源设备、调压器、电力网", "C": "电源设备、负载", "D": "电源设备、配电装置、电力网、负载"}, "answer": "D", "answerText": "电源设备、配电装置、电力网、负载", "raw": "船舶电力系统是由_______ 组成的。\nA.主电源、应急电源、电网、负载\nB.电源设备、调压器、电力网\nC.电源设备、负载\nD.电源设备、配电装置、电力网、负载", "day": 3}, {"id": 912, "number": 290, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船上的配电装置是接受和分配电能的装置， 也是对_______ 进行保护、 监视\n测量和控制的装置。", "options": {"A": "电源、电力网", "B": "电力网、负载", "C": "电源、负载", "D": "电源、电力网和负载"}, "answer": "D", "answerText": "电源、电力网和负载", "raw": "船上的配电装置是接受和分配电能的装置， 也是对_______ 进行保护、 监视\n测量和控制的装置。\nA.电源、电力网\nB.电力网、负载\nC.电源、负载\nD.电源、电力网和负载", "day": 3}, {"id": 913, "number": 291, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "对于船舶电站中配电装置，说法错误的是________。", "options": {"A": "配电装置是接受和分配电能的装置", "B": "配电装置是电源和负载之间的简单导线的连接", "C": "配电装置是对电源、电力网、负载进行保护的装置", "D": "配电装置是对电源、电力网、负载进行测量、监视和控制的装置"}, "answer": "B", "answerText": "配电装置是电源和负载之间的简单导线的连接", "raw": "对于船舶电站中配电装置，说法错误的是________。\nA. 配电装置是接受和分配电能的装置\nB. 配电装置是电源和负载之间的简单导线的连接\nC. 配电装置是对电源、电力网、负载进行保护的装置\nD. 配电装置是对电源、电力网、负载进行测量、监视和控制的装置", "day": 3}, {"id": 914, "number": 292, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶电网的线制，目前应用最为广泛的是_______。", "options": {"A": "三线绝缘系统", "B": "中性点接地的三相四线制系统", "C": "利用船体做中线的三线系统", "D": "中性点不接地的三相四线制系统"}, "answer": "A", "answerText": "三线绝缘系统", "raw": "船舶电网的线制，目前应用最为广泛的是_______。\nA.三线绝缘系统\nB.中性点接地的三相四线制系统\nC.利用船体做中线的三线系统\nD.中性点不接地的三相四线制系统", "day": 3}, {"id": 915, "number": 293, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "目前我国大多数船舶采用的电网线制是_______。", "options": {"A": "中性点接地三线系统", "B": "中性点不接地的三相三线制系统", "C": "中性点接地的三相四线系统", "D": "中性点不接地的三相四线系统"}, "answer": "B", "answerText": "中性点不接地的三相三线制系统", "raw": "目前我国大多数船舶采用的电网线制是_______。\nA. 中性点接地三线系统\nB. 中性点不接地的三相三线制系统\nC. 中性点接地的三相四线系统\nD. 中性点不接地的三相四线系统", "day": 3}, {"id": 916, "number": 294, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "关于船舶电网，说法错误的是_______。", "options": {"A": "动力电网主要向电动机和照明负载供电", "B": "应急电网是在主电网失电后，向全船重要的辅机、应急照明信号灯、通信导\n航等设备供电", "C": "小应急照明是由蓄电池组供电", "D": "弱电网是向全船无线通信设备、助航设备、报警系统供电"}, "answer": "A", "answerText": "动力电网主要向电动机和照明负载供电", "raw": "关于船舶电网，说法错误的是_______。\nA. 动力电网主要向电动机和照明负载供电\nB. 应急电网是在主电网失电后，向全船重要的辅机、应急照明信号灯、通信导\n航等设备供电\nC.小应急照明是由蓄电池组供电\nD. 弱电网是向全船无线通信设备、助航设备、报警系统供电", "day": 3}, {"id": 917, "number": 295, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "关于船舶电网的说法，错误的是_______ 。", "options": {"A": "动力电网是给电动机负载和大的电热负载供电", "B": "正常照明电网是经主变压器给照明负载供电", "C": "应急电网是由 24 V 蓄电池组成，向特别重要的辅机、导航设备供电", "D": "弱电网是向导航设备、无线通信设备和报警系统供电"}, "answer": "C", "answerText": "应急电网是由 24 V 蓄电池组成，向特别重要的辅机、导航设备供电", "raw": "关于船舶电网的说法，错误的是_______ 。\nA. 动力电网是给电动机负载和大的电热负载供电\nB. 正常照明电网是经主变压器给照明负载供电\nC. 应急电 功能均由计算机程序实现", "B": "调频功能由数字-模拟电路实现，而调载功能由计算机程序实现", "C": "调频功能由计算机程序实现，而调载功能由数字-模拟电路实现", "D": "调频和调载功能均由数字-模拟电路实现"}, "answer": "A", "answerText": "调频和调载功能均由计算机程序实现", "raw": "在采用计算机控制的船舶电站系统中， 关于发电机组的调频和调载问题， 说法\n正确的是_______\nA. 调频和调载功能均由计算机程序实现\nB. 调频功能由数字-模拟电路实现，而调载功能由计算机程序实现\nC. 调频功能由计算机程序实现，而调载功能由数字-模拟电路实现\nD. 调频和调载功能均由数字-模拟电路实现", "day": 3}, {"id": 923, "number": 4, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "下列_______ 不是自动电站的计算机软件系统基本功能。", "options": {"A": "负载分级切除", "B": "原动机自动起动", "C": "发电机无功功率自动控制", "D": "母线电流自动控制"}, "answer": "D", "answerText": "母线电流自动控制", "raw": "下列_______ 不是自动电站的计算机软件系统基本功能。\nA.负载分级切除\nB.原动机自动起动\nC.发电机无功功率自动控制\nD.母线电流自动控制", "day": 3}, {"id": 924, "number": 5, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "下列_______ 不属于自动控制系统处理的电网故障。", "options": {"A": "电压过高（或过低）", "B": "频率过高（或过低）", "C": "失电", "D": "相序接错或断相"}, "answer": "D", "answerText": "相序接错或断相", "raw": "下列_______ 不属于自动控制系统处理的电网故障。\nA.电压过高（或过低）\nB.频率过高（或过低）\nC.失电\nD.相序接错或断相", "day": 3}, {"id": 925, "number": 6, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "某船舶有三台发电机和一台应急发电机。 一台发电机在网运行， 其他发电机都\n处于备车完成状态。当在网发电机跳闸时________", "options": {"A": "应急发电机马上起动", "B": "第一备用机组马上起动", "C": "第二备用机组起动", "D": "应急发电机马上起动号备用机组延时起动"}, "answer": "B", "answerText": "第一备用机组马上起动", "raw": "某船舶有三台发电机和一台应急发电机。 一台发电机在网运行， 其他发电机都\n处于备车完成状态。当在网发电机跳闸时________\nA. 应急发电机马上起动\nB. 第一备用机组马上起动\nC. 第二备用机组起动\nD. 应急发电机马上起动号备用机组延时起动", "day": 3}, {"id": 926, "number": 7, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "对电站自动化的发电机组自动并车和自动解列功能正确的认识是_______", "options": {"A": "当运行机组的功率不能满足用电负载需要时应自动解列", "B": "自动并车装置是用于柴油机组之间自动并车的", "C": "自动解列是指把负载转移到一台发电机上，然后把已卸去负载的发电机组自\n动与电网脱开", "D": "自动并车是指备用机组的自动起动"}, "answer": "C", "answerText": "自动解列是指把负载转移到一台发电机上，然后把已卸去负载的发电机组自\n动与电网脱开", "raw": "对电站自动化的发电机组自动并车和自动解列功能正确的认识是_______\nA. 当运行机组的功率不能满足用电负载需要时应自动解列\nB. 自动并车装置是用于柴油机组之间自动并车的\nC. 自动解列是指把负载转移到一台发电机上，然后把已卸去负载的发电机组自\n动与电网脱开\nD. 自动并车是指备用机组的自动起动", "day": 3}, {"id": 927, "number": 8, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶电站自动化基本功能不包括_______ 。", "options": {"A": "按顺序自动起动备用机组，并能自动投入、自动停机", "B": "发电机组之间的自动并车", "C": "发电机组功率分配的调节", "D": "自动调节电压调差特性"}, "answer": "D", "answerText": "自动调节电压调差特性", "raw": "船舶电站自动化基本功能不包括_______ 。\nA. 按顺序自动起动备用机组，并能自动投入、自动停机\nB. 发电机组之间的自动并车\nC. 发电机组功率分配的调节\nD. 自动调节电压调差特性", "day": 3}, {"id": 928, "number": 9, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶电站自动化基本功能不包括_______ 。①重载询问；②自动调压功能；③\n频率与有功功率的自动调节；④船舶电力系统的综合保护", "options": {"A": "①③④", "B": "②③④", "C": "①②③", "D": "①②④"}, "answer": "A", "answerText": "①③④", "raw": "船舶电站自动化基本功能不包括_______ 。①重载询问；②自动调压功能；③\n频率与有功功率的自动调节；④船舶电力系统的综合保护\nA.①③④\nB.②③④\nC.①②③\nD.①②④", "day": 3}, {"id": 929, "number": 10, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "对于船舶电站自动化的设备，投入电网发电机数量按照________决定。", "options": {"A": "电站电压", "B": "电站实际运行功率", "C": "电网频率", "D": "发电机的瞬态电压变化率 ."}, "answer": "B", "answerText": "电站实际运行功率", "raw": "对于船舶电站自动化的设备，投入电网发电机数量按照________决定。\nA.电站电压\nB.电站实际运行功率\nC.电网频率\nD.发电机的瞬态电压变化率 .", "day": 3}, {"id": 930, "number": 11, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "在自动电站中，船舶柴油机起、停程序一般采用", "options": {"A": "按时间原则控制，即模仿人的实际操作过程，按时间拟定控制程序", "B": "按速度原则控制，即直接按速度拟定控制程序", "C": "按滑油压力控制，即根据不同转速时滑油压力的变化拟定控制程序", "D": "综合方式控制，即在整个控制系统中，把按时间原则、速度原则和滑油压力\n控制原则都 考虑进去"}, "answer": "D", "answerText": "综合方式控制，即在整个控制系统中，把按时间原则、速度原则和滑油压力\n控制原则都 考虑进去", "raw": "在自动电站中，船舶柴油机起、停程序一般采用\nA. 按时间原则控制，即模仿人的实际操作过程，按时间拟定控制程序\nB. 按速度原则控制，即直接按速度拟定控制程序\nC. 按滑油压力控制，即根据不同转速时滑油压力的变化拟定控制程序\nD. 综合方式控制，即在整个控制系统中，把按时间原则、速度原则和滑油压力\n控制原则都 考虑进去", "day": 3}, {"id": 931, "number": 12, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "在自动电站中当出现条件_______ 自动控制系统不会发出“增机”指令，备用\n机组不 起动。", "options": {"A": "经延时判断，确认运行机组重载", "B": "经重载询问，储备容量不够", "C": "运行机组的滑油压力高", "D": "电网突然断电"}, "answer": "C", "answerText": "运行机组的滑油压力高", "raw": "在自动电站中当出现条件_______ 自动控制系统不会发出“增机”指令，备用\n机组不 起动。\nA. 经延时判断，确认运行机组重载\nB. 经重载询问，储备容量不够\nC. 运行机组的滑油压力高\nD. 电网突然断电", "day": 3}, {"id": 932, "number": 13, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶自动电站备用机组在备机状态下，_______ 应处于自动工作状态。", "options": {"A": "滑油预润滑", "B": "电瓶预充电", "C": "调压器预调节", "D": "调速器预调整"}, "answer": "A", "answerText": "滑油预润滑", "raw": "船舶自动电站备用机组在备机状态下，_______ 应处于自动工作状态。\nA.滑油预润滑\nB.电瓶预充电\nC.调压器预调节\nD.调速器预调整", "day": 3}, {"id": 933, "number": 14, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "自动电站中备用机组进入“备好”状态的条件不包括________", "options": {"A": "预热", "B": "预润滑", "C": "预点火", "D": "无阻塞"}, "answer": "C", "answerText": "预点火", "raw": "自动电站中备用机组进入“备好”状态的条件不包括________\nA.预热\nB.预润滑\nC.预点火\nD.无阻塞", "day": 3}, {"id": 934, "number": 15, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶自动化电站运行中，在接到解列运行机组的指令后，进入解列程序，此\n时如电网总负 载大于在网发电机额定功率的 85%，则_______", "options": {"A": "自动取消解列指令", "B": "继续执行解列指令", "C": "解列成功后，再自动起动另一备用机组", "D": "解列成功后，再自动起动该备用机组"}, "answer": "A", "answerText": "自动取消解列指令", "raw": "船舶自动化电站运行中，在接到解列运行机组的指令后，进入解列程序，此\n时如电网总负 载大于在网发电机额定功率的 85%，则_______\nA. 自动取消解列指令\nB. 继续执行解列指令\nC. 解列成功后，再自动起动另一备用机组\nD. 解列成功后，再自动起动该备用机组", "day": 3}, {"id": 935, "number": 16, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "当两台及以上发电机组并联运行，_______ 时，船舶自动电站系统不会发出\n解列信号。", "options": {"A": "电网负荷降到很低", "B": "运行机组之一冷却水出口温度高", "C": "运行机组之一滑油压力低", "D": "备用发电机组手动起动"}, "answer": "D", "answerText": "备用发电机组手动起动", "raw": "当两台及以上发电机组并联运行，_______ 时，船舶自动电站系统不会发出\n解列信号。\nA.电网负荷降到很低\nB.运行机组之一冷却水出口温度高\nC.运行机组之一滑油压力低\nD.备用发电机组手动起动", "day": 3}, {"id": 936, "number": 17, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶自动电站系统在发出解列信号后，控制_______ 。", "options": {"A": "自动调频调载装置将待停发电机组的负载转移给其他运行发电机组后，再将\n该机 ACB 分闸", "B": "自动电压调节装置将待停发电机组的电流转移给其他运行发电机组后，再将\n该机 ACB 分闸", "C": "待停发电机组的电子调速器减小油门直至负载为 0，再将该机 A stem": "在同步发电机自动并车中，要检测脉动电压，脉动电压是指_______", "options": {"A": "待并发电机发出的交流电压", "B": "电网中的交流电压", "C": "待并机投入电网前主开关两侧电压差", "D": "待并机与工作机的转速差"}, "answer": "C", "answerText": "待并机投入电网前主开关两侧电压差", "raw": "在同步发电机自动并车中，要检测脉动电压，脉动电压是指_______\nA.待并发电机发出的交流电压\nB.电网中的交流电压\nC.待并机投入电网前主开关两侧电压差\nD.待并机与工作机的转速差", "day": 3}, {"id": 946, "number": 27, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶电站处于自动电站状态时，出现自动起动备用机组，条件满足并准备并\n车，此时", "options": {"A": "同步表将自动投入工作", "B": "自动调整待并机电压", "C": "将会自动发出合闸信号", "D": "发合闸信号时的电压、频率和相位将完全一样"}, "answer": "C", "answerText": "将会自动发出合闸信号", "raw": "船舶电站处于自动电站状态时，出现自动起动备用机组，条件满足并准备并\n车，此时\nA. 同步表将自动投入工作\nB. 自动调整待并机电压\nC. 将会自动发出合闸信号\nD. 发合闸信号时的电压、频率和相位将完全一样", "day": 3}, {"id": 947, "number": 28, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶电站处于自动电站状态时，自动并车装置的附加功能有_______ 。", "options": {"A": "电压差超限报警后，自动调整电压", "B": "出现频率一致时，即不再调节发动机速度", "C": "正常情况下，并车时采用正频差合闸", "D": "如同步比较困难，指示延长了合闸时间，并不影响同步工作"}, "answer": "C", "answerText": "正常情况下，并车时采用正频差合闸", "raw": "船舶电站处于自动电站状态时，自动并车装置的附加功能有_______ 。\nA. 电压差超限报警后，自动调整电压\nB. 出现频率一致时，即不再调节发动机速度\nC. 正常情况下，并车时采用正频差合闸\nD. 如同步比较困难，指示延长了合闸时间，并不影响同步工作", "day": 3}, {"id": 948, "number": 29, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "关于采用计算机控制的船舶电站系统，一般来说，电站控制系统本身不具备\n_______ 的功能。", "options": {"A": "发电机组的机、电故障报警", "B": "发电机原动机冷却水温度控制", "C": "发电机组运行台数的管理", "D": "发电机的自动并车"}, "answer": "B", "answerText": "发电机原动机冷却水温度控制", "raw": "关于采用计算机控制的船舶电站系统，一般来说，电站控制系统本身不具备\n_______ 的功能。\nA.发电机组的机、电故障报警\nB.发电机原动机冷却水温度控制\nC.发电机组运行台数的管理\nD.发电机的自动并车", "day": 3}, {"id": 949, "number": 30, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "在采用计算机控制的船舶电站系统中，当机组起动命令发出后，计算机的下\n一个步骤是________", "options": {"A": "起动原动机滑油泵，进行预润滑", "B": "判断发电机组电压是否建立", "C": "判断在规定时间内机组是否起动成功", "D": "进入并车调频程序"}, "answer": "C", "answerText": "判断在规定时间内机组是否起动成功", "raw": "在采用计算机控制的船舶电站系统中，当机组起动命令发出后，计算机的下\n一个步骤是________\nA. 起动原动机滑油泵，进行预润滑\nB. 判断发电机组电压是否建立\nC. 判断在规定时间内机组是否起动成功\nD. 进入并车调频程序", "day": 3}, {"id": 950, "number": 31, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "在采用计算机控制的船舶电站系统中，当发生严重故障后需要故障停机时，\n计算机的处理过程是________", "options": {"A": "发出警报，提醒值班轮机员处理", "B": "立即使停车电磁阀动作", "C": "进行负载转移后立即使停车电磁阀动作", "D": "进行负载转移后，再空转规定时间后使停车电磁阀动作"}, "answer": "B", "answerText": "立即使停车电磁阀动作", "raw": "在采用计算机控制的船舶电站系统中，当发生严重故障后需要故障停机时，\n计算机的处理过程是________\nA. 发出警报，提醒值班轮机员处理\nB. 立即使停车电磁阀动作\nC. 进行负载转移后立即使停车电磁阀动作\nD. 进行负载转移后，再空转规定时间后使停车电磁阀动作", "day": 3}, {"id": 951, "number": 32, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "在采用计算机控制的船舶电站系统中，当机组起动指令形成后，计算机的第\n一个步骤是________", "options": {"A": "检测电网频率", "B": "判断机组是否可以起动", "C": "发出机组起动命令", "D": "按计时原则延时发出机组起动命令"}, "answer": "B", "answerText": "判断机组是否可以起动", "raw": "在采用计算机控制的船舶电站系统中，当机组起动指令形成后，计算机的第\n一个步骤是________\nA.检测电网频率\nB.判断机组是否可以起动\nC.发出机组起动命令\nD.按计时原则延时发出机组起动命令", "day": 3}, {"id": 952, "number": 33, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "电力推进中的功率管理系统（PMS）主要作用是_______ 。", "options": {"A": "管理应急发电机的起动、并车和解列", "B": "限制除船舶电力推进系统以外用电负载的电能使用", "C": "限制船舶电力推进系统的电能使用", "D": "对电力推进系统的电能进行实时调配和管理"}, "answer": "D", "answerText": "对电力推进系统的电能进行实时调配和管理", "raw": "电力推进中的功率管理系统（PMS）主要作用是_______ 。\nA. 管理应急发电机的起动、并车和解列\nB. 限制除船舶电力推进系统以外用电负载的电能使用\nC. 限制船舶电力推进系统的电能使用\nD. 对电力推进系统的电能进行实时调配和管理", "day": 3}, {"id": 953, "number": 34, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "关于电力推进中的功率管理系统，叙述最正确的是_______", "options": {"A": "船舶电力推进中的 PMS 的主要功能是自动电力管理的功能", "B": "电力推进中 PMS 无重载询问及处理功能", "C": "船舶电力推进中的 PMS 的主要功能包括发电系统的自动化、输配电监控保\n护、主要用电设备监控管理、系统监测报警等", "D": "船舶电力推进中的 PMS 不具有多级重载询问及处理功能， 具有日用变压器控\n制及保 护、电网可用功率输出监控等功能"}, "answer": "C", "answerText": "船舶电力推进中的 PMS 的主要功能包括发电系统的自动化、输配电监控保\n护、主要用电设备监控管理、系统监测报警等", "raw": "关于电力推进中的功率管理系统，叙述最正确的是_______\nA. 船舶电力推进中的 PMS 的主要功能是自动电力管理的功能\nB. 电力推进中 PMS 无重载询问及处理功能\nC. 船舶电力推进中的 PMS 的主要功能包括发电系统的自动化、输配电监控保\n护、主要用电设备监控管理、系统监测报警等\nD. 船舶 动是否超过允许值\nC. 投入一个大负载时，电网功率储备是否足够，是否需要增机\nD. 投入一个大负载时，电网电压、频率波动是否符合要求", "day": 3}, {"id": 958, "number": 39, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "在自动电站中， 若投入负载后， 其_______， 则必须先自动起动备用机组， 并\n车后方可投入大负载。", "options": {"A": "电网功率余量大于最小功率余量", "B": "电网功率余量小于最小功率余量", "C": "电网功率余量大于最大功率余量", "D": "电网功率余量小于最大功率余量"}, "answer": "B", "answerText": "电网功率余量小于最小功率余量", "raw": "在自动电站中， 若投入负载后， 其_______， 则必须先自动起动备用机组， 并\n车后方可投入大负载。\nA.电网功率余量大于最小功率余量\nB.电网功率余量小于最小功率余量\nC.电网功率余量大于最大功率余量\nD.电网功率余量小于最大功率余量", "day": 3}, {"id": 959, "number": 40, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "有重载询问的船舶自动电站系统中，在大功率负荷起动箱上，按下起动按钮\n后，_______。", "options": {"A": "可以先起动，然后根据负载大小起动备用发电机组", "B": "不可以起动，必须先起动备用发电机组后再起动", "C": "视当前发电机组的功率余量，如果足够，则可立即起动", "D": "视当前发电机组的功率余量，如果不够，则采取软起动方式起动"}, "answer": "C", "answerText": "视当前发电机组的功率余量，如果足够，则可立即起动", "raw": "有重载询问的船舶自动电站系统中，在大功率负荷起动箱上，按下起动按钮\n后，_______。\nA. 可以先起动，然后根据负载大小起动备用发电机组\nB. 不可以起动，必须先起动备用发电机组后再起动\nC. 视当前发电机组的功率余量，如果足够，则可立即起动\nD. 视当前发电机组的功率余量，如果不够，则采取软起动方式起动", "day": 3}, {"id": 960, "number": 41, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶自动电站的重载起动询问信号的处理中， 包括_______ 。①模拟运算实际\n负载与发电机功率余量；②起动负载限定；③发电机过载保护设定；④起动询问\n的功率值计算", "options": {"A": "①②④", "B": "①②③", "C": "①③④", "D": "②③④"}, "answer": "C", "answerText": "①③④", "raw": "船舶自动电站的重载起动询问信号的处理中， 包括_______ 。①模拟运算实际\n负载与发电机功率余量；②起动负载限定；③发电机过载保护设定；④起动询问\n的功率值计算\nA.①②④\nB.①②③\nC.①③④\nD.②③④", "day": 3}, {"id": 961, "number": 42, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "某船电站的发电机额定功率为 500kW，如_______ 大于 425 kW 的额定负载\n时，应起动备用机组。", "options": {"A": "正在运行的负载", "B": "当前负载加上按下起动按钮的负载之和", "C": "按起动按钮的负载", "D": "运行的负载加上正在起动的负载"}, "answer": "B", "answerText": "当前负载加上按下起动按钮的负载之和", "raw": "某船电站的发电机额定功率为 500kW，如_______ 大于 425 kW 的额定负载\n时，应起动备用机组。\nA.正在运行的负载\nB.当前负载加上按下起动按钮的负载之和\nC.按起动按钮的负载\nD.运行的负载加上正在起动的负载", "day": 3}, {"id": 962, "number": 43, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶自动电站自动调频调载装置需要的输入信号和输出的执行信号分别是\n_______", "options": {"A": "输入是电压、电流信号；输出是调压器设定信号", "B": "输入是转速、油门信号；输出是调压器设定信号", "C": "输入是转速、电流信号；输出是调速器设定信号", "D": "输入是频率、功率信号；输出是调速器设定信号"}, "answer": "D", "answerText": "输入是频率、功率信号；输出是调速器设定信号", "raw": "船舶自动电站自动调频调载装置需要的输入信号和输出的执行信号分别是\n_______\nA. 输入是电压、电流信号；输出是调压器设定信号\nB. 输入是转速、油门信号；输出是调压器设定信号\nC. 输入是转速、电流信号；输出是调速器设定信号\nD. 输入是频率、功率信号；输出是调速器设定信号", "day": 3}, {"id": 963, "number": 44, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶自动电站并联运行中，有功功率分配情况最好的调速特性是 _______ 。", "options": {"A": "两台无差调节", "B": "一台有差调节，一台无差调节", "C": "两台均为有差调节", "D": "两台均为特性一致的有差调节"}, "answer": "D", "answerText": "两台均为特性一致的有差调节", "raw": "船舶自动电站并联运行中，有功功率分配情况最好的调速特性是 _______ 。\nA.两台无差调节\nB. 一台有差调节，一台无差调节\nC.两台均为有差调节\nD.两台均为特性一致的有差调节", "day": 3}, {"id": 964, "number": 45, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶继电综合保护中，_______保护是为保证电网连续供电而进行的保护。", "options": {"A": "过电流", "B": "短路", "C": "分级卸载", "D": "失压"}, "answer": "C", "answerText": "分级卸载", "raw": "船舶继电综合保护中，_______保护是为保证电网连续供电而进行的保护。\nA.过电流\nB.短路\nC.分级卸载\nD.失压", "day": 3}, {"id": 965, "number": 46, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "自动分级卸载的作用是_______ 。", "options": {"A": "当发电机过载时，将次要负载分批从电网上自动切除，以保证发电机正常工\n作", "B": "当发电机过载时，将大功率负载从电网上尽快切除，以保证其他设备正常工\n作", "C": "当电网发生故障时任选部分负荷从电网上自动切除，以保证电网正常工作", "D": "通过它自动切除需要停用的负载"}, "answer": "A", "answerText": "当发电机过载时，将次要负载分批从电网上自动切除，以保证发电机正常工\n作", "raw": "自动分级卸载的作用是_______ 。\nA. 当发电机过载时，将次要负载分批从电网上自动切除，以保证发电机正常工\n作\nB. 当发电机过载时，将大功率负载从电网上尽快切除，以保证其他设备正常工\n作\nC. 当电网发生故障时任选部分负荷从电网上自动切除，以保证电网正常工作\nD. 通过它自动切除需要停用的负载", "day": 3}, {"id": 966, "number": 47, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶电站自动分级卸载的根本目的是_______ 。", "options": {"A": "避免发电机烧毁", "B": "保证主要负载连续供电", "C": "保证次要负载设备安全", "D": "减少运行机组台数"}, "answer": "B", "answerText": "保证主要负载连续供电", "raw": "船舶电站自动分级卸载的根本目的是_______ 。\nA.避免发电机烧毁\nB.保证主要负载连续供电\nC.保证次要负载设备安全\nD.减少运行机组台数", "day": 3}, {"id": 967, "number": 48, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "当主发电机出现过载时，自动分级卸载装置是_______ 。", "options": {"A": "立即切除大功率负载，使发电机尽快恢复正常供电", "B": "立即起动应急发电机，保证正常供电", "C": "自动分级将次要负载从电网切除，保证发电机正常供电", "D": "一次性切除与船舶航行、安全无关的所有次要负载，使发电机尽快恢复正常\n供电"}, "answer": "C", "answerText": "自动分级将次要负载从电网切除，保证发电机正常供电", "raw": "当主发电机出现过载时，自动分级卸载装置是_______ 。\nA.立即切除大功率负载，使发电机尽快恢复正常供电\nB. 立即起动应急发电机，保证正常供电\nC. 自动分级将次要负载从电网切除，保证发电机正常供电\nD. 一次性切除与船舶航行、安全无关的所有次要负载，使发电机尽快恢复正常\n供电", "day": 3}, {"id": 968, "number": 49, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "船舶用电高峰期引起发电机过载时，在备用机组投入前，自动卸载装置应能\n自动将 _ ______负载切除，以保证电网的连续供电。", "options": {"A": "次要", "B": "大功率", "C": "任意一部分", "D": "功率因数低的"}, "answer": "A", "answerText": "次要", "raw": "船舶用电高峰期引起发电机过载时，在备用机组投入前，自动卸载装置应能\n自动将 _ ______负载切除，以保证电网的连续供电。\nA.次要\nB.大功率\nC.任意一部分\nD.功率因数低的", "day": 3}, {"id": 969, "number": 50, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "如图所示，重载起动询问电路。当询问选择开关 S3 置于“询问”位时，按下\nS2，起动线路因 K2 线圈未接通，接触器 K1 不动作；此时询问线路接通，向自\n动控制系统发出起动询问。当 K2 线圈得电动作，指示灯亮，表示_______。", "options": {"A": "允许起动时自动控制系统的相应输出触点断开", "B": "允许起动时自动控制系统的相应输出触点闭合", "C": "不允许重载起动", "D": "重载起动故障"}, "answer": "B", "answerText": "允许起动时自动控制系统的相应输出触点闭合", "raw": "如图所示，重载起动询问电路。当询问选择开关 S3 置于“询问”位时，按下\nS2，起动线路因 K2 线圈未接通，接触器 K1 不动作；此时询问线路接通，向自\n动控制系统发出起动询问。当 K2 线圈得电动作，指示灯亮，表示_______。\nA. 允许起动时自动控制系统的相应输出触点断开\nB. 允许起动时自动控制系统的相应输出触点闭合\nC. 不允许重载起动\nD. 重载起动故障", "day": 3}, {"id": 970, "number": 51, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "如图所示，重载起动询问电路。当询问选择开关 S3 置于“询问”位时，需要按\n_______ 次 S2，发出起动询问。电机 M 才能转动。", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "answerText": "2", "raw": "如图所示，重载起动询问电路。当询问选择开关 S3 置于“询问”位时，需要按\n_______ 次 S2，发出起动询问。电机 M 才能转动。\nA.1\nB.2\nC. 3\nD. 4", "day": 3}, {"id": 971, "number": 52, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "如图所示， 重载起动询问电路。 当询问选择开关S3 置于“询问”位时， 按下S2，\n控制系统发出起动询问。图中 K1 辅助常闭触点的作用是________。", "options": {"A": "在重载询问时，K1 辅助常闭触点断开询问线路，使 K2 线圈得电连续运行", "B": "在重载询问后，K1 辅助常闭触点接通询问线路，避免电机 M 产生过载", "C": "当电机 M 起动后，K1 辅助常闭触点断开询问线路，避免在运行的情况下再\n次询问", "D": "当电机 M 起动后，K1 辅助常闭触点接通询问线路，使电机 M 连续运行"}, "answer": "C", "answerText": "当电机 M 起动后，K1 辅助常闭触点断开询问线路，避免在运行的情况下再\n次询问", "raw": "如图所示， 重载起动询问电路。 当询问选择开关S3 置于“询问”位时， 按下S2，\n控制系统发出起动询问。图中 K1 辅助常闭触点的作用是________。\nA. 在重载询问时，K1 辅助常闭触点断开询问线路，使 K2 线圈得电连续运行\nB. 在重载询问后，K1 辅助常闭触点接通询问线路，避免电机 M 产生过载\nC. 当电机 M 起动后，K1 辅助常闭触点断开询问线路，避免在运行的情况下再\n次询问\nD. 当电机 M 起动后，K1 辅助常闭触点接通询问线路，使电机 M 连续运行", "day": 3}, {"id": 972, "number": 53, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "_______ 不是船舶自动化电站的基本功能。", "options": {"A": "自动分级卸载", "B": "重载询问", "C": "巡回检测及保护", "D": "次要负载分级起动"}, "answer": "D", "answerText": "次要负载分级起动", "raw": "_______ 不是船舶自动化电站的基本功能。\nA.自动分级卸载\nB.重载询问\nC.巡回检测及保护\nD.次要负载分级起动", "day": 3}, {"id": 973, "number": 54, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "________ 不是船舶自动化电站柴油机起、停程序的基本原则。", "options": {"A": "按时间原则控制", "B": "按速度原则控制", "C": "按滑油压力控制", "D": "按冷却水温度控制"}, "answer": "D", "answerText": "按冷却水温度控制", "raw": "________ 不是船舶自动化电站柴油机起、停程序的基本原则。\nA.按时间原则控制\nB.按速度原则控制\nC.按滑油压力控制\nD.按冷却水温度控制", "day": 3}, {"id": 974, "number": 55, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "自动调频调载装置由________基本组成。", "options": {"A": "频率变换器、有功功率变换器、有功功率分配器和调整器", "B": "频率变换器、有功功率变换器、无功功率分配器和调整器", "C": "频率变换器、无功功率变换器、无功功率分配器和调整器", "D": "频率变换器、无功功率变换器、有功功率分配器和调整器"}, "answer": "A", "answerText": "频率变换器、有功功率变换器、有功功率分配器和调整器", "raw": "自动调频调载装置由________基本组成。\nA. 频率变换器、有功功率变换器、有功功率分配器和调整器\nB. 频率变换器、有功功率变换器、无功功率分配器和调整器\nC. 频率变换器、无功功率变换器、无功功率分配器和调整器\nD. 频率变换器、无功功率变换器、有功功率分配器和调整器", "day": 3}, {"id": 975, "number": 56, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "ACB 正常分闸是由手动分闸操作或解列时的自动分闸操作，由于保护动作或\n其他原因引起的脱扣都算  号发电机运行，2 号备用，3 号手动，现 1 号重载、2 号起\n动故障，需要另外起动 1 台大功率压载水泵马达则系统会________。\nA. 立即卸载部分次要负载后起动压载水泵\nB. 1 号发电机跳闸失电\nC. 起动 3 号发电机\nD. 报警且提示机组“已经用完”", "day": 3}, {"id": 980, "number": 61, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "发电机自动并车装置中，获得恒定超前角的目的是_______", "options": {"A": "检测频差大小", "B": "检测频差方向", "C": "考虑开关动作时间", "D": "避开动态过程"}, "answer": "C", "answerText": "考虑开关动作时间", "raw": "发电机自动并车装置中，获得恒定超前角的目的是_______\nA.检测频差大小\nB.检测频差方向\nC.考虑开关动作时间\nD.避开动态过程", "day": 3}, {"id": 981, "number": 62, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "对电站自动化的自动调频与有功功率自动调节功能的错误认识是 ________。", "options": {"A": "多台机组额定功率不同，则要求按比例分配负载", "B": "多台机组额定功率都相同，则要求均匀分配负载", "C": "该功能可通过调频调载装置及调速器来实现", "D": "该功能可通过调自动励磁调整装置来实现"}, "answer": "D", "answerText": "该功能可通过调自动励磁调整装置来实现", "raw": "对电站自动化的自动调频与有功功率自动调节功能的错误认识是 ________。\nA. 多台机组额定功率不同，则要求按比例分配负载\nB. 多台机组额定功率都相同，则要求均匀分配负载\nC. 该功能可通过调频调载装置及调速器来实现\nD. 该功能可通过调自动励磁调整装置来实现", "day": 3}, {"id": 982, "number": 63, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "如图所示频率变换器，其作用是_______。", "options": {"A": "输出与电网频率成比例", "B": "输出与电网频率和额定频率的差值成比例", "C": "输出与待并发电机频率成比例", "D": "输出与电网频率和待并发电机频率的差值成比例"}, "answer": "B", "answerText": "输出与电网频率和额定频率的差值成比例", "raw": "如图所示频率变换器，其作用是_______。\nA. 输出与电网频率成比例\nB. 输出与电网频率和额定频率的差值成比例\nC. 输出与待并发电机频率成比例\nD. 输出与电网频率和待并发电机频率的差值成比例", "day": 3}, {"id": 983, "number": 64, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "虚有差法是在并联运行的每一台发电机上，都装有调频调载装置。对每台原\n动机而言，其调速器是________。", "options": {"A": "均为有差", "B": "均为无差", "C": "均为有差，且调差系数始终是一样的", "D": "均为无差，且动态调节过程也是一样的"}, "answer": "A", "answerText": "均为有差", "raw": "虚有差法是在并联运行的每一台发电机上，都装有调频调载装置。对每台原\n动机而言，其调速器是________。\nA. 均为有差\nB. 均为无差\nC. 均为有差，且调差系数始终是一样的\nD. 均为无差，且动态调节过程也是一样的", "day": 3}, {"id": 984, "number": 65, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第二节 发电机和配电系统的控制原理和功能", "stem": "在船舶电站的实际运行工况中，负载电流是经常变化的，因此导致发电机的\n输出电压也随之变化，需要设备配有", "options": {"A": "自 em": "在油船辅锅炉蒸汽压力自动控制系统中，函数发生器的作用是保证最佳的\n_______ 。", "options": {"A": "供风量", "B": "供油率", "C": "风油比", "D": "燃烧强度"}, "answer": "C", "answerText": "风油比", "raw": "在油船辅锅炉蒸汽压力自动控制系统中，函数发生器的作用是保证最佳的\n_______ 。\nA.供风量\nB.供油率\nC.风油比\nD.燃烧强度", "day": 3}, {"id": 1000, "number": 81, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第四节 蒸汽锅炉的自动控制原理和功能（水位、 压力、 燃烧", "stem": "在锅炉电极式双位水位控制系统中，在一情况下，给水泵电机保持运转向锅\n炉 供水。", "options": {"A": "水位在上限水位", "B": "水位上升至上、下限水位之间", "C": "只要水位在中间水位", "D": "水位下降至上、下限水位之间"}, "answer": "B", "answerText": "水位上升至上、下限水位之间", "raw": "在锅炉电极式双位水位控制系统中，在一情况下，给水泵电机保持运转向锅\n炉 供水。\nA.水位在上限水位\nB.水位上升至上、下限水位之间\nC.只要水位在中间水位\nD.水位下降至上、下限水位之间", "day": 3}, {"id": 1001, "number": 82, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第四节 蒸汽锅炉的自动控制原理和功能（水位、 压力、 燃烧", "stem": "在电极式辅锅炉水位双位控制系统中， 把锅炉给水泵转换开关放在自动位置，\n在________ 情况下，锅炉给水泵停止向锅炉供水。", "options": {"A": "从下限水位上升至上、下限水位之间", "B": "从上限水位下降至上、下限水位之间", "C": "水位在下限水位", "D": "只要在上下限水位之间"}, "answer": "B", "answerText": "从上限水位下降至上、下限水位之间", "raw": "在电极式辅锅炉水位双位控制系统中， 把锅炉给水泵转换开关放在自动位置，\n在________ 情况下，锅炉给水泵停止向锅炉供水。\nA. 从下限水位上升至上、下限水位之间\nB. 从上限水位下降至上、下限水位之间\nC. 水位在下限水位\nD. 只要在上下限水位之间", "day": 3}, {"id": 1002, "number": 83, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第四节 蒸汽锅炉的自动控制原理和功能（水位、 压力、 燃烧", "stem": "在锅炉电极式双位水位控制系统中，电极 1、2、3 分别检测高水位、低水位\n和危险水位，为提高锅炉允许的高水位，调整方法是_______", "options": {"A": "电极 1、2 不动，降低电极 3", "B": "电极 1、3 不动，降低电极 2", "C": "电极 1、3 不动，升高电极 2", "D": "电极 2、3 不动，升高电极 1"}, "answer": "D", "answerText": "电极 2、3 不动，升高电极 1", "raw": "在锅炉电极式双位水位控制系统中，电极 1、2、3 分别检测高水位、低水位\n和危险水位，为提高锅炉允许的高水位，调整方法是_______\nA.电极 1、2 不动，降低电极 3\nB.电极 1、3 不动，降低电极 2\nC.电极 1、3 不动，升高电极 2\nD.电极 2、3 不动，升高电极 1", "day": 3}, {"id": 1003, "number": 84, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第四节 蒸汽锅炉的自动控制原理和功能（水位、 压力、 燃烧", "stem": "在锅炉电极式双位水位控制系统中， 为同时提高上、 下限水位， 其调整方法是\n_______", "options": {"A": "下移 1 电极，上移 2 电极", "B": "同时上移 1 和 2 电极", "C": "同时下移 1 和 2 电极", "D": "上移 1 电极，下移 2 电极"}, "answer": "B", "answerText": "同时上移 1 和 2 电极", "raw": "在锅炉电极式双位水位控制系统中， 为同时  "15 s", "D": "18 s"}, "answer": "C", "answerText": "15 s", "raw": "锅炉点火时，若点火失败，喷油器进油阀应当关闭，进油阀从点火开启到点\n火失败关闭的时间不得大于___\nA. 8 s\nB. 12 s\nC. 15 s\nD. 18 s", "day": 3}, {"id": 1032, "number": 114, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第四节 蒸汽锅炉的自动控制原理和功能（水位、 压力、 燃烧", "stem": "对于废气锅炉，安全系统应保证的气鼓蒸汽出口压力/温度过高时，应触发\n________ 动作。", "options": {"A": "废气旁通", "B": "蒸汽释放机构", "C": "废气旁通或蒸汽释放机构", "D": "无"}, "answer": "C", "answerText": "废气旁通或蒸汽释放机构", "raw": "对于废气锅炉，安全系统应保证的气鼓蒸汽出口压力/温度过高时，应触发\n________ 动作。\nA.废气旁通\nB.蒸汽释放机构\nC.废气旁通或蒸汽释放机构\nD.无", "day": 3}, {"id": 1033, "number": 115, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第四节 蒸汽锅炉的自动控制原理和功能（水位、 压力、 燃烧", "stem": "在采用浮子对辅锅炉水位进行双位控制的原理图中，如果水位在上升的过\n程中，枢轴 4 卡死不能转动，可能产生的后果是_______ 。", "options": {"A": "双位控制变为比例控制", "B": "浮球破裂", "C": "水位超过最高水位给水泵电机不停", "D": "水位低于最低水位给水泵电机不起动"}, "answer": "C", "answerText": "水位超过最高水位给水泵电机不停", "raw": "在采用浮子对辅锅炉水位进行双位控制的原理图中，如果水位在上升的过\n程中，枢轴 4 卡死不能转动，可能产生的后果是_______ 。\nA.双位控制变为比例控制\nB.浮球破裂\nC.水位超过最高水位给水泵电机不停\nD.水位低于最低水位给水泵电机不起动", "day": 3}, {"id": 1034, "number": 137, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第四节 蒸汽锅炉的自动控制原理和功能 （锅炉控制故障分", "stem": "柴油机货船辅锅炉电极式双位水位自动控制系统，其原理如下图所示。若电\n极棒 2 在涂红部位局部结垢严重不导电，其余正常，则_______.", "options": {"A": "水泵不起动", "B": "水泵不停机", "C": "锅炉下限水位提高", "D": "锅炉的水位低报警"}, "answer": "C", "answerText": "锅炉下限水位提高", "raw": "柴油机货船辅锅炉电极式双位水位自动控制系统，其原理如下图所示。若电\n极棒 2 在涂红部位局部结垢严重不导电，其余正常，则_______.\nA.水泵不起动\nB.水泵不停机\nC.锅炉下限水位提高\nD.锅炉的水位低报警", "day": 3}, {"id": 1035, "number": 138, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第四节 蒸汽锅炉的自动控制原理和功能 （锅炉控制故障分", "stem": "在电极式锅炉双位水位控制系统中，若 1 号电极结垢严重，则故障现象是\n____。", "options": {"A": "水位在低水位振荡", "B": "锅炉失水", "C": "水位在高水位振荡", "D": "锅炉满水"}, "answer": "D", "answerText": "锅炉满水", "raw": "在电极式锅炉双位水位控制系统中，若 1 号电极结垢严重，则故障现象是\n____。\nA.水位在低水位振荡\nB.锅炉失水\nC.水位在高水位振荡\nD.锅炉满水", "day": 3}, {"id": 1036, "number": 139, "chapter": "第三章 辅助机械自动控制装置的结构和功", "section": "第四节 蒸汽锅炉的自动控制原理和功能 （锅炉控制故障分", "stem": "在电极式锅炉双位水位控制系统中，若 1 号电极接线断开，则可能出现的问\n题是____", "options n信号同时处理的方式\nD. 两种检测方式检测的信息最终均送入监视报警控制单元", "day": 4}, {"id": 1089, "number": 474, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "采用连续监测方式的机舱监视与报警系统， 监测点信息_______送入监视与\n报警系统。", "options": {"A": "并行", "B": "串行", "C": "分时", "D": "定时"}, "answer": "A", "answerText": "并行", "raw": "采用连续监测方式的机舱监视与报警系统， 监测点信息_______送入监视与\n报警系统。\nA.并行\nB.串行\nC.分时\nD.定时", "day": 4}, {"id": 1090, "number": 475, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "机舱单元组合式报警系统中负责将不同的报警信号有选择地送到驾驶台、\n生活区、轮机长室等的是________单元。", "options": {"A": "模拟量报警", "B": "开关量报警", "C": "延伸报警", "D": "报警器自检"}, "answer": "C", "answerText": "延伸报警", "raw": "机舱单元组合式报警系统中负责将不同的报警信号有选择地送到驾驶台、\n生活区、轮机长室等的是________单元。\nA.模拟量报警\nB.开关量报警\nC.延伸报警\nD.报警器自检", "day": 4}, {"id": 1091, "number": 476, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "__功能是机舱监视与报警系统最根本的功能。", "options": {"A": "参数与状态显示", "B": "声光报警", "C": "延时报警", "D": "自检"}, "answer": "B", "answerText": "声光报警", "raw": "__功能是机舱监视与报警系统最根本的功能。\nA.参数与状态显示\nB.声光报警\nC.延时报警\nD.自检", "day": 4}, {"id": 1092, "number": 477, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "机舱设备相关参数不正常，但在机舱监视与报警系统中却无报警声响和报\n警显示，不可能的原因是________。", "options": {"A": "该监测点报警为短时报警", "B": "该监测点传感器故障", "C": "该监测点报警被锁闭", "D": "监视报警控制单元本身故障"}, "answer": "A", "answerText": "该监测点报警为短时报警", "raw": "机舱设备相关参数不正常，但在机舱监视与报警系统中却无报警声响和报\n警显示，不可能的原因是________。\nA.该监测点报警为短时报警\nB.该监测点传感器故障\nC.该监测点报警被锁闭\nD.监视报警控制单元本身故障", "day": 4}, {"id": 1093, "number": 478, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "________ 是判断长时报警还是短时报警主要的依据。", "options": {"A": "报警延时时间的长短", "B": "报警自动复位等待时间的长短", "C": "是否会触发声光报警", "D": "导致报警发生的原因能否自行消失"}, "answer": "D", "answerText": "导致报警发生的原因能否自行消失", "raw": "________ 是判断长时报警还是短时报警主要的依据。\nA.报警延时时间的长短\nB.报警自动复位等待时间的长短\nC.是否会触发声光报警\nD.导致报警发生的原因能否自行消失", "day": 4}, {"id": 1094, "number": 479, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "当出现短时报警时，不会触发的动作是_______。", "options": {"A": "报警指示快闪，故障消失后，报警指示转为慢闪，起动报警解除打印", "B": "起动报警声响，消声后报警声响关闭", "C": "按下报警确认按钮，报警指示平光", "D": "按下报警确认按钮，撤销报警指示和分组报警"}, "answer": "C", "answerText": "按下报警确认按钮，报警指示平光", "raw": "当出现短时报警时，不会触发的动作是_______。\nA. 报警指示快闪，故障消失后，报警指示转为慢闪，起动报警解除打印\nB. 起动报警声响，消声后报警声响关闭\nC. 按下报警确认按钮，报警指示平光\nD. 按下报警确认按钮，撤销报警指示和分组报警", "day": 4}, {"id": 1095, "number": 480, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "机舱监视与报警系统设置延时报警功能的目的是避免发生误报警，根据所\n监视参数不同， 延时时间也不同， 对液位的监视， 可采用_______ ， 对某些压力\n系统的压力监视，可采用________。", "options": {"A": "短延时；长延时", "B": "长延时；短延时", "C": "短延时；短延时", "D": "长延时；长延时"}, "answer": "B", "answerText": "长延时；短延时", "raw": "机舱监视与报警系统设置延时报警功能的目的是避免发生误报警，根据所\n监视参数不同， 延时时间也不同， 对液位的监视， 可采用_______ ， 对某些压力\n系统的压力监视，可采用________。\nA.短延时；长延时\nB.长延时；短延时\nC.短延时；短延时\nD.长延时；长延时", "day": 4}, {"id": 1096, "number": 481, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "根据监测点报警处理流程图， 在机舱监视与报警系统正常的情况下， 设备或\n系统参数异常时能发出声光报警信号的前提是_______。", "options": {"A": "监测点报警未被闭锁", "B": "监测点报警为常规报警", "C": "监测点报警为短时报警", "D": "显示单元或警报器控制单元故障"}, "answer": "A", "answerText": "监测点报警未被闭锁", "raw": "根据监测点报警处理流程图， 在机舱监视与报警系统正常的情况下， 设备或\n系统参数异常时能发出声光报警信号的前提是_______。\nA.监测点报警未被闭锁\nB.监测点报警为常规报警\nC.监测点报警为短时报警\nD.显示单元或警报器控制单元故障", "day": 4}, {"id": 1097, "number": 482, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "机舱监视与报警系统设置测试功能的目的是通过测试，判断________。", "options": {"A": "各监测点传感器状态", "B": "警报器控制单元状态", "C": "各监测点相应的监视通道状态并对故障定位", "D": "监控报警控制单元"}, "answer": "C", "answerText": "各监测点相应的监视通道状态并对故障定位", "raw": "机舱监视与报警系统设置测试功能的目的是通过测试，判断________。\nA. 各监测点传感器状态\nB. 警报器控制单元状态\nC. 各监测点相应的监视通道状态并对故障定位\nD. 监控报警控制单元", "day": 4}, {"id": 1098, "number": 483, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "机舱监视与报警系统的延伸报警功能是为无人机舱设置，一般将监测点的\n报警信息分为四组。为简化延伸报警，在轮机员住所的延伸报警箱上仅设置\n________。", "options": {"A": "主机故障停车报警", "B": "主机故障降速报警", "C": "重要故障报警", "D": "重要故障和一般故障报警"}, "answer": "D", "answerText": "重要故障和一般故障报警", "raw": "机舱监视与报警系统的延伸报警功能是为无人机舱设置，一般将监测点的\n报警信息分为四组。为简化延伸报警，在轮机员住所的延伸报警箱上仅设置\n________。\nA.主机故障停车报警\nB.主机故障降速报警\nC.重要故障报警\nD.重要故障和一般故障报警", "day": 4}, {"id": 1099, "number": 484, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "船舶机舱单元组合式自动报警系统中故障报警单元设置延时报警的原因是\n_______。", "options": {"A": "考虑到多个报警信号同时来，分时响应的需要", "B": "系统信号传输有时间滞后", "C": "考虑到虚假报警及暂时故障的可能", "D": "考虑到传感器故障"}, "answer": "C", "answerText": "考虑到虚假报警及暂时故障的可能", "raw": "船舶机舱单元组合式自动报警系统中故障报警单元设置延时报警的原因是\n_______。\nA. 考虑到多个报警信号同时来，分时响应的需要\nB. 系统信号传输有时间滞后\nC. 考虑到虚假报警及暂时故障的可能\nD. 考虑到传感器故障", "day": 4}, {"id": 1100, "number": 485, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "机舱单元组合式报警系统中设有公用插件（中央控制单元） ，其中设有闭锁\n控制电路。该电路的功能是在给出闭锁指令时_______。", "options": {"A": "模拟量报警单元瞬时报警，不再延时", "B": "开关量报警单元瞬时报警，不再延时", "C": "报警时只有闪光信号，无声音信号", "D": "被监测点不再出现声光报警信号"}, "answer": "D", "answerText": "被监测点不再出现声光报警信号", "raw": "机舱单元组合式报警系统中设有公用插件（中央控制单元） ，其中设有闭锁\n控制电路。该电路的功能是在给出闭锁指令时_______。\nA. 模拟量报警单元瞬时报警，不再延时\nB. 开关量报警单元瞬时报警，不再延时\nC. 报警时只有闪光信号，无声音信号\nD. 被监测点不再出现声光报警信号", "day": 4}, {"id": 1101, "number": 486, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "无人机舱单元组合报警系统，由分组单元送出的延伸报警，有重复报警功\n能， 即延伸处所虽已有人声应答消声， 但当_______ 延时无人应答时， 延伸报警\n处将再次报警。", "options": {"A": "船长室", "B": "机舱集控室", "C": "驾驶室", "D": "轮机长室"}, "answer": "B", "answerText": "机舱集控室", "raw": "无人机舱单元组合报警系统，由分组单元送出的延伸报警，有重复报警功\n能， 即延伸处所虽已有人声应答消声， 但当_______ 延时无人应答时， 延伸报警\n处将再次报警。\nA.船长室\nB.机舱集控室\nC.驾驶室\nD.轮机长室", "day": 4}, {"id": 1102, "number": 487, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "单元组合式报警系统有“闭锁控制”功能，该功能常用于_______ 。", "options": {"A": "闭锁有故障监视点的参数检测", "B": "关闭有故障检测点的报警指示灯", "C": "分组关闭不运行设备的报警指示灯", "D": "分组闭锁不运行设备相关监视点的报警"}, "answer": "D", "answerText": "分组闭锁不运行设备相关监视点的报警", "raw": "单元组合式报警系统有“闭锁控制”功能，该功能常用于_______ 。\nA. 闭锁有故障监视点的参数检测\nB. 关闭有故障检测点的报警指示灯\nC. 分组关闭不运行设备的报警指示灯\nD. 分组闭锁不运行设备相关监视点的报警", "day": 4}, {"id": 1103, "number": 488, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "以下各单元中，_____ 延伸", "C": "故障打印", "D": "趋势预报"}, "answer": "D", "answerText": "趋势预报", "raw": "单元组合式监视报警系统不具备的功能是_______ 。\nA.功能测试\nB.报警延伸\nC.故障打印\nD.趋势预报", "day": 4}, {"id": 1109, "number": 494, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "在单元组合式模拟量报警控制单元中包含_______。①测量电路；②延时电\n路；③模数转换电路；④比较电路", "options": {"A": "①③④", "B": "②③④", "C": "①②④", "D": "①②③"}, "answer": "C", "answerText": "①②④", "raw": "在单元组合式模拟量报警控制单元中包含_______。①测量电路；②延时电\n路；③模数转换电路；④比较电路\nA.①③④\nB.②③④\nC.①②④\nD.①②③", "day": 4}, {"id": 1110, "number": 495, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "关于单元组合式监视报警系统，正确的说法是_______。\n①每块报警控制电路板都能进行报警值设定；②每块报警控制电路板都具有消闪\n按钮；③每块报警控制电路板都能进行独立的功能测试；④每块报警控制电路板\n都具有报警指示灯", "options": {"A": "①②③", "B": "①②④", "C": "①③④", "D": "②③④"}, "answer": "D", "answerText": "②③④", "raw": "关于单元组合式监视报警系统，正确的说法是_______。\n①每块报警控制电路板都能进行报警值设定；②每块报警控制电路板都具有消闪\n按钮；③每块报警控制电路板都能进行独立的功能测试；④每块报警控制电路板\n都具有报警指示灯\nA.①②③\nB.①②④\nC.①③④\nD.②③④", "day": 4}, {"id": 1111, "number": 496, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "对于通常故障报警和短时故障报警，在发生故障时，两者都会发出声光报\n警，确认故障后，声响消失，______。", "options": {"A": "报警指示灯均常亮", "B": "前者报警指示灯熄灭而后者报警指示灯继续常亮", "C": "前者报警指示灯继续常亮而后者报警指示灯熄灭", "D": "报警指示灯均熄灭"}, "answer": "C", "answerText": "前者报警指示灯继续常亮而后者报警指示灯熄灭", "raw": "对于通常故障报警和短时故障报警，在发生故障时，两者都会发出声光报\n警，确认故障后，声响消失，______。\nA. 报警指示灯均常亮\nB. 前者报警指示灯熄灭而后者报警指示灯继续常亮\nC. 前者报警指示灯继续常亮而后者报警指示灯熄灭\nD. 报警指示灯均熄灭", "day": 4}, {"id": 1112, "number": 497, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "在如图所示的报警控制单元中， 在_______ 情况下， 按确认按钮后， 报警灯\n常亮且消声。", "options": {"A": "通常故障报警\nB，短时故障报警", "C": "闭锁报警", "D": "值班报警"}, "answer": "A", "answerText": "通常故障报警\nB，短时故障报警", "raw": "在如图所示的报警控制单元中， 在_______ 情况下， 按确认按钮后， 报警灯\n常亮且消声。\nA.通常故障报警\nB，短时故障报警\nC.闭锁报警\nD.值班报警", "day": 4}, {"id": 1113, "number": 498, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "在机舱监视与报警系统中， 当被监视的开关量参数在报警值附近波动时， 通\n常采取______方法避免频繁报警。", "options": {"A": "增加延时时间"  "D": "①②④"}, "answer": "D", "answerText": "①②④", "raw": "船舶机舱监视与报警，______是采用扫描监测的工作方式。①单台微型计算机\n构成集中型监视与报警系统；②集散型监视与报警系统；③用集成电路组成的监\n视与报警控制单元；④全分布式网络型监测与报警系统；⑤用继电器组成的监视\n与报警控制单元\nA.①②③⑤\nB.③⑤\nC.①②③④\nD.①②④", "day": 4}, {"id": 1128, "number": 88, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "在船舶自动化机舱中_______是在集中控制室的监视屏上可完成的。①设备的\n运行状态显示；②运行参数值显示；③故障报警状态显示；④运行参数打印", "options": {"A": "①②④", "B": "①②③④", "C": "②③④", "D": "①②③"}, "answer": "D", "answerText": "①②③", "raw": "在船舶自动化机舱中_______是在集中控制室的监视屏上可完成的。①设备的\n运行状态显示；②运行参数值显示；③故障报警状态显示；④运行参数打印\nA.①②④\nB.①②③④\nC.②③④\nD.①②③", "day": 4}, {"id": 1129, "number": 89, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "连续监测的方法由于每个监测点采用单独的电路，监视点的数量增减在原则\n上____。", "options": {"A": "不受限制", "B": "受限制", "C": "根据需要增加硬件", "D": "不能增加"}, "answer": "A", "answerText": "不受限制", "raw": "连续监测的方法由于每个监测点采用单独的电路，监视点的数量增减在原则\n上____。\nA.不受限制\nB.受限制\nC.根据需要增加硬件\nD.不能增加", "day": 4}, {"id": 1130, "number": 90, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "计算机网络技术的成熟应用已经使得监视与报警系统朝着 ______的方向发展。", "options": {"A": "总线型网络结构", "B": "环形网络结构", "C": "分布式网络结构", "D": "星形网络结构"}, "answer": "C", "answerText": "分布式网络结构", "raw": "计算机网络技术的成熟应用已经使得监视与报警系统朝着 ______的方向发展。\nA.总线型网络结构\nB.环形网络结构\nC.分布式网络结构\nD.星形网络结构", "day": 4}, {"id": 1131, "number": 91, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "在集中监视与报警系统中， 失职报警一直要维持到接收到______为止。①集控\n室消声应答指令；②集控室消闪应答指令；③延伸报警箱的消声应答指令；④延\n伸报警箱的消闪应答指令", "options": {"A": "①", "B": "①②", "C": "③", "D": "③④"}, "answer": "A", "answerText": "①", "raw": "在集中监视与报警系统中， 失职报警一直要维持到接收到______为止。①集控\n室消声应答指令；②集控室消闪应答指令；③延伸报警箱的消声应答指令；④延\n伸报警箱的消闪应答指令\nA.①\nB.①②\nC.③\nD.③④", "day": 4}, {"id": 1132, "number": 92, "chapter": "第四章 机舱监测与报警系统", "section": "第一节 船舶机舱监测与报警系统基础知识", "stem": "在监视液位时，为避免因船舶摇摆而出现的误报警，通常采用________", "options": {"A": "报警延时", "B": "报警封锁", "C": "报警切除", "D": "报警延伸"}, "answer": "A", "answerText": "报警延时", "raw": "在监视液位时，为避免因船舶摇摆而出现的误报警，通常采用_ 的原因，并更换其中一个 DPU"}, "answer": "A", "answerText": "把其中一个从 CAN 总线断开，对另一个进行断电复位", "raw": "在 DATACHIEF C20/K-Chief 500 的监测与报警系统的维护管理过程中，如\n由于某种原因导致两个 DPU 的节点 ID 发生冲突时， 应首先_______ ， 并在ROS\n上利用 RioLoad 工具软件对节点 ID 进行更正。\nA. 把其中一个从 CAN 总线断开，对另一个进行断电复位\nB. 把两个均从 CAN 总线断开，对其中一个进行断电复位\nC. 系统断电复位，然后再次通电起动\nD. 查找节点 ID 发生冲突的原因，并更换其中一个 DPU", "day": 4}, {"id": 1204, "number": 564, "chapter": "第四章 机舱监测与报警系统", "section": "第二节 网络型监测与报警系统", "stem": "在 DATACHIEF C20/K-Chief 500 的监视与报警系统中，若某个输入通道出\n现硬件故障，则可将相应的输入信号转移到其他通道，以下说法中正确的是\n_______。", "options": {"A": "可以将故障通道的输入信号转移到其他同类模块的空闲输出通道", "B": "可以将故障通道的输入信号转移到其他同类模块的空闲通道", "C": "若有可能，应尽量将故障通道的信号转移到同一模块的控制通道", "D": "可以将故障通道的输出信号转移到同一个模块的其他空闲通道"}, "answer": "B", "answerText": "可以将故障通道的输入信号转移到其他同类模块的空闲通道", "raw": "在 DATACHIEF C20/K-Chief 500 的监视与报警系统中，若某个输入通道出\n现硬件故障，则可将相应的输入信号转移到其他通道，以下说法中正确的是\n_______。\nA. 可以将故障通道的输入信号转移到其他同类模块的空闲输出通道\nB. 可以将故障通道的输入信号转移到其他同类模块的空闲通道\nC. 若有可能，应尽量将故障通道的信号转移到同一模块的控制通道\nD. 可以将故障通道的输出信号转移到同一个模块的其他空闲通道", "day": 4}, {"id": 1205, "number": 565, "chapter": "第四章 机舱监测与报警系统", "section": "第二节 网络型监测与报警系统", "stem": "DATACHIEF C20/K-Chief 500 的 ROS 软件系统具有内建的在线测试和程序\n自诊断功能，多数情况下可以通过_______ 查找故障。", "options": {"A": "检查 DPU 的工作状态", "B": "检查内部、外部设备的工作状态", "C": "查看 ROS 屏幕上显示的故障代码", "D": "检查 ROS 与外部设备的通信状态"}, "answer": "C", "answerText": "查看 ROS 屏幕上显示的故障代码", "raw": "DATACHIEF C20/K-Chief 500 的 ROS 软件系统具有内建的在线测试和程序\n自诊断功能，多数情况下可以通过_______ 查找故障。\nA.检查 DPU 的工作状态\nB.检查内部、外部设备的工作状态\nC.查看 ROS 屏幕上显示的故障代码 D.检查 ROS 与外部设备的通信状态", "day": 4}, {"id": 1206, "number": 566, "chapter": "第四章 机舱监测与报警系统", "section": "第二节 网络型监测与报警系统", "stem": "DATACHIEF C20/K-Chief 500 监视与报警系统的 DPU 模块的状态指示灯\n“ Run”处在_______ 状态，表示 DPU 模块工作正常。", "options": {"A": "绿色", "B": "红色", "C": "黄色", "D": "熄灭"}, "answer": "A", "answerText": "绿色", "raw": "DATACHIEF C20/K-Chief 500 监视与报警系统的 DPU 模块的状态指示灯\n“ Run”处在_______ 状态，表示 DPU 模块工作正常。\nA.绿色\nB.红色\nC.黄色\nD.熄灭", "day": 4}, {"id": 1207, "number": 567, "chapter": "第四章 机舱监测与报警系统", "section": "第二节 网络型监测与报警系统", "stem": "K-Chief 500 const state = { day:'all', mode:'all', chapter:'all', order:'normal', query:'', index:0, answered:false, selected:'', roundRight:0, roundWrong:0, queue:[] };
const $ = s => document.querySelector(s);
const memoryKey = 'marine-auto-memory';
const roundKey = 'marine-auto-single-round';
const store = { get(){ return JSON.parse(localStorage.getItem(memoryKey) || '{}'); }, set(v){ localStorage.setItem(memoryKey, JSON.stringify(v)); } };
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function label(m){ return {known:'会了',wrong:'错题',star:'标星'}[m] || '未标记'; }
function chapters(){ return [...new Set(DATA.map(q=>q.chapter).filter(Boolean))]; }
function baseFiltered(){ const marks=store.get(); return DATA.filter(q=>{
  if(state.day !== 'all' && String(q.day)!==state.day) return false;
  if(state.chapter !== 'all' && q.chapter!==state.chapter) return false;
  if(state.mode !== 'all'){ const m=marks[q.id] || ''; if(state.mode==='todo' && m) return false; if(state.mode!=='todo' && m!==state.mode) return false; }
  if(state.query){ const hay=(q.id+' '+q.number+' '+q.chapter+' '+q.section+' '+q.raw).toLowerCase(); if(!hay.includes(state.query.toLowerCase())) return false; }
  return true;
}); }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function rebuildQueue(keepId, keepIndex){ const items = baseFiltered(); state.queue = state.order === 'shuffle' ? shuffle(items) : items; const found = keepId ? state.queue.findIndex(q=>q.id===keepId) : -1; if(found >= 0){ state.index = found; } else if(Number.isInteger(keepIndex)){ state.index = Math.min(Math.max(keepIndex, 0), Math.max(state.queue.length - 1, 0)); } else { state.index = 0; } state.answered=false; state.selected=''; persistRound(); render(); }
function current(){ return state.queue[state.index]; }
function mark(id, value){ const s=store.get(); if(value) s[id]=value; else delete s[id]; store.set(s); renderStats(); }
function choose(letter){ const q=current(); if(!q || state.answered) return; state.answered=true; state.selected=letter; if(letter===q.answer){ state.roundRight++; mark(q.id,'known'); } else { state.roundWrong++; mark(q.id,'wrong'); } persistRound(); render(); }
function toggleStar(){ const q=current(); if(!q) return; const s=store.get(); s[q.id] = s[q.id] === 'star' ? '' : 'star'; if(!s[q.id]) delete s[q.id]; store.set(s); render(); }
function nextQuestion(){ if(state.index < state.queue.length-1){ state.index++; state.answered=false; state.selected=''; persistRound(); render(); } }
function prevQuestion(){ if(state.index > 0){ state.index--; state.answered=false; state.selected=''; persistRound(); render(); } }
function resetRound(){ state.index=0; state.answered=false; state.selected=''; state.roundRight=0; state.roundWrong=0; rebuildQueue(); }
function persistRound(){ localStorage.setItem(roundKey, JSON.stringify({day:state.day, mode:state.mode, chapter:state.chapter, order:state.order, query:state.query, index:state.index, roundRight:state.roundRight, roundWrong:state.roundWrong})); }
function loadRound(){ try{ const saved=JSON.parse(localStorage.getItem(roundKey)||'{}'); Object.assign(state, saved); }catch(e){} }
function setDay(v){ state.day=v; document.querySelectorAll('[data-day]').forEach(b=>b.classList.toggle('active',b.dataset.day===v)); rebuildQueue(current()?.id); }
function setMode(v){ state.mode=v; document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===v)); rebuildQueue(); }
function setOrder(v){ state.order=v; document.querySelectorAll('[data-order]').forEach(b=>b.classList.toggle('active',b.dataset.order===v)); rebuildQueue(current()?.id); }
function toggleFilters(){ document.querySelector('.side').classList.toggle('open'); }
function renderStats(){ $('#total').textContent=state.queue.length; $('#pos').textContent=state.queue.length ? `${state.index+1}/${state.queue.length}` : '0'; $('#right').textContent=state.roundRight; $('#wrong').textContent=state.roundWrong; }
function render(){ renderStats(); const q=current(); if(!q){ $('#stage').innerHTML='<div class="empty">这个筛选条件下没有题。换一天、章节或题集试试。</div>'; return; }
  const marks=store.get(); const pct=Math.round(((state.index+1)/state.queue.length)*100);
  const opts=['A','B','C','D'].map(k=>{ if(!q.options[k]) return ''; let cls='option'; if(state.answered && k===q.answer) cls+=' correct'; if(state.answered && k===state.selected && k!==q.answer) cls+=' wrong'; return `<button class="${cls}" onclick="choose('${k}')"><span class="letter">${k}</span><span>${escapeHtml(q.options[k])}</span></button>`; }).join('');
  const ok = state.selected === q.answer;
  const result = state.answered ? `<div class="result ${ok?'ok':'bad'}">${ok?'答对了':'答错了'}，正确答案：${q.answer}${q.answerText?' - '+escapeHtml(q.answerText):''}</div>` : '<div class="hint">先选一个答案，不会就凭第一感觉选。选完才会显示正确答案。</div>';
  $('#stage').innerHTML = `<article class="card"><div class="progress"><div class="bar" style="width:${pct}%"></div></div><div class="meta"><span class="tag">Day ${q.day}</span><span class="tag">原题号 ${q.number}</span><span class="tag">${escapeHtml(q.chapter)}</span><span class="tag">${escapeHtml(q.section||'')}</span><span class="tag">${label(marks[q.id])}</span></div><div class="qtitle">${q.id}. 请选择答案</div><div class="stem">${escapeHtml(q.stem)}</div><div class="options">${opts}</div>${result}<div class="actions"><button onclick="prevQuestion()" ${state.index===0?'disabled':''}>上一题</button><button class="primary" onclick="nextQuestion()" ${state.index>=state.queue.length-1?'disabled':''}>下一题</button><button onclick="toggleStar()">标星/取消</button><button class="warn" onclick="mark(${q.id},'wrong'); nextQuestion()">不会，进错题</button></div><div class="hint">选项按钮会自动记录：答对进“会了”，答错进“错题”。</div></article>`;
}
function init(){ loadRound(); const savedIndex = Number.isInteger(state.index) ? state.index : 0; $('#chapter').innerHTML='<option value="all">全部章节</option>'+chapters().map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join(''); $('#chapter').value=state.chapter; $('#chapter').onchange=e=>{ state.chapter=e.target.value; rebuildQueue(); }; $('#query').value=state.query; $('#query').oninput=e=>{ state.query=e.target.value; rebuildQueue(); }; document.querySelectorAll('[data-day]').forEach(b=>b.classList.toggle('active',b.dataset.day===state.day)); document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===state.mode)); document.querySelectorAll('[data-order]').forEach(b=>b.classList.toggle('active',b.dataset.order===state.order)); rebuildQueue(null, savedIndex); }
document.addEventListener('keydown', e=>{ if(document.activeElement && ['INPUT','SELECT'].includes(document.activeElement.tagName)) return; const key=e.key.toLowerCase(); if(['a','b','c','d'].includes(key)) choose(key.toUpperCase()); if(['1','2','3','4'].includes(key)) choose(['A','B','C','D'][Number(key)-1]); if(e.key==='Enter') nextQuestion(); if(key==='s') toggleStar(); });
init();
if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {})); }
</script>
