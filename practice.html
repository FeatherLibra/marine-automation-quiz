章船舶自动控制基础", "section": "第二节 船舶机舱控制回路（压力水柜和 ENGARD 冷却水）", "stem": "ENGARD 中央冷却水温度控制系统中的自动控制主要是对_______ 的控制。", "options": {"A": "低温淡水温度和海水温度", "B": "低温淡水流量和海水流量", "C": "低温淡水温度和海水流量", "D": "低温淡水流量和海水温度"}, "answer": "C", "answerText": "低温淡水温度和海水流量", "raw": "ENGARD 中央冷却水温度控制系统中的自动控制主要是对_______ 的控制。\nA.低温淡水温度和海水温度\nB.低温淡水流量和海水流量\nC.低温淡水温度和海水流量\nD.低温淡水流量和海水温度", "day": 1}, {"id": 158, "number": 301, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "用热电偶检测温度的基本原理是当冷端温度保持恒定时，热端与冷端之间\n_______。", "options": {"A": "热电势随温度升高而升高", "B": "热电势随温度升高而降低", "C": "电阻值随温度升高而增大", "D": "电阻值随温度升高而减小"}, "answer": "A", "answerText": "热电势随温度升高而升高", "raw": "用热电偶检测温度的基本原理是当冷端温度保持恒定时，热端与冷端之间\n_______。\nA.热电势随温度升高而升高\nB.热电势随温度升高而降低\nC.电阻值随温度升高而增大\nD.电阻值随温度升高而减小", "day": 1}, {"id": 159, "number": 302, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在采用热电阻检测某一个系统温度值时， 常需要温度补偿， 其作用是_______\n①保证传感器输出与温度成线性关系；②克服环境温度变化对检测精度的影响；\n③克服外部干扰信号的影响；④使热电阻值随温度变化，特性稳定", "options": {"A": "①②", "B": "②", "C": "①④", "D": "③④"}, "answer": "B", "answerText": "②", "raw": "在采用热电阻检测某一个系统温度值时， 常需要温度补偿， 其作用是_______\n①保证传感器输出与温度成线性关系；②克服环境温度变化对检测精度的影响；\n③克服外部干扰信号的影响；④使热电阻值随温度变化，特性稳定\nA.①②\nB.②\nC.①④\nD.③④", "day": 1}, {"id": 160, "number": 303, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "船舶检测主机排烟温度的传感器不可采用_______ 式。\n①热电偶；②热敏电阻；③热电阻 Pt100；④光敏电阻", "options": {"A": "①", "B": "②③", "C": "②③④", "D": "①②④"}, "answer": "C", "answerText": "②③④", "raw": "船舶检测主机排烟温度的传感器不可采用_______ 式。\n①热电偶；②热敏电阻；③热电阻 Pt100；④光敏电阻\nA.①\nB.②③\nC.②③④\nD.①②④", "day": 1}, {"id": 161, "number": 304, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在用热电阻检测某监视点温度的电路中，采用三线制接法时使_______ 。", "options": {"A": "测温电桥有三根输出线", "B": "电源增加一根接地线", "C": "热电阻两根导线同在一个桥臂上", "D": "热电阻两根导线分别接在两个相邻桥臂上"}, "answer": "D", "answerText": "热电阻两根导线分别接在两个相邻桥臂上", "raw": "在用热电阻检测某监视点温度的电路中，采用三线制接法时使_______ 。\nA.测温电桥有三根输出线\nB.电源增加一根接地线\nC.热电阻两根导线同在一个桥臂上\nD.热电阻两根导线分别接在两个相邻桥臂上", "day": 1}, {"id": 162, "number": 305, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在三线制测温电桥电路中，若热电阻连接电源“-”极性的导线断路，则表头\n指针应指在___。", "options": {"A": "最大值", "B": "最小值", "C": "中间值", "D": "任意值"}, "answer": "B", "answerText": "最小值", "raw": "在三线制测温电桥电路中，若热电阻连接电源“-”极性的导线断路，则表头\n指针应指在___。\nA.最大值\nB.最小值\nC.中间值\nD.任意值", "day": 1}, {"id": 163, "number": 306, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在热电偶中，为保证所检测的温度值不受环境温度的影响，应采取的措施\n是______。", "options": {"A": "加装隔离放大器", "B": "加装光电隔离器", "C": "加装冷端补偿电路", "D": "加装抗干扰电路"}, "answer": "C", "answerText": "加装冷端补偿电路", "raw": "在热电偶中，为保证所检测的温度值不受环境温度的影响，应采取的措施\n是______。\nA.加装隔离放大器\nB.加装光电隔离器\nC.加装冷端补偿电路\nD.加装抗干扰电路", "day": 1}, {"id": 164, "number": 307, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "热电偶输出的电势差正比于______。", "options": {"A": "热端温度", "B": "冷端温度", "C": "热端与冷端温度之和", "D": "热端与冷端温度之差"}, "answer": "D", "answerText": "热端与冷端温度之差", "raw": "热电偶输出的电势差正比于______。\nA.热端温度\nB.冷端温度\nC.热端与冷端温度之和\nD.热端与冷端温度之差", "day": 1}, {"id": 165, "number": 308, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "热电偶可以用于检测_______ 信号，使用中须采用_______电路", "options": {"A": "温度；三线制", "B": "温度；温度补偿", "C": "温差；三线制", "D": "温差；温度补偿"}, "answer": "B", "answerText": "温度；温度补偿", "raw": "热电偶可以用于检测_______ 信号，使用中须采用_______电路\nA.温度；三线制\nB.温度；温度补偿\nC.温差；三线制\nD.温差；温度补偿", "day": 1}, {"id": 166, "number": 309, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在采用冷端温度补偿电桥的热电偶检测温度的电路中，若环境温度不变，\n随着检测点温度升高，其热电势 e 的变化、补偿电桥 Uab 的变化，及 U0 的变化\n分别为_______。", "options": {"A": "增大，减小，增大", "B": "增大，增大，基本不变", "C": "增大，基本不变，增大", "D": "减小，增大，减小"}, "answer": "C", "answerText": "增大，基本不变，增大", "raw": "在采用冷端温度补偿电桥的热电偶检测温度的电路中，若环境温度不变，\n随着检测点温度升高，其热电势 e 的变化、补偿电桥 Uab 的变化，及 U0 的变化\n分别为_______。\nA.增大，减小，增大\nB.增大，增大，基本不变\nC.增大，基本不变，增大\nD.减小，增大，减小", "day": 1}, {"id": 167, "number": 310, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "关于铜热电阻和铝热电阻两种温度传感器的工作原理，正确的是_______。", "options": {"A": "两者都是利用电阻丝的阻值随温度升高而增大的效应实现温度测量", "B": "两者都是利用电阻丝的阻值随温度升高而减小的效应实现温度测量", "C": "前者利用电阻丝的阻值随温度升高而减小的效应实现温度测量，后者反之", "D": "前者利用电阻丝的阻值随温度升高而增大的效应实现温度测量，后者反之"}, "answer": "A", "answerText": "两者都是利用电阻丝的阻值随温度升高而增大的效应实现温度测量", "raw": "关于铜热电阻和铝热电阻两种温度传感器的工作原理，正确的是_______。\nA. 两者都是利用电阻丝的阻值随温度升高而增大的效应实现温度测量\nB. 两者都是利用电阻丝的阻值随温度升高而减小的效应实现温度测量\nC. 前者利用电阻丝的阻值随温度升高而减小的效应实现温度测量，后者反之\nD.前者利用电阻丝的阻值随温度升高而增大的效应实现温度测量，后者反之", "day": 1}, {"id": 168, "number": 311, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "现在需要在增压器的后端安装一个热电偶以测量增压器后的主机排烟温\n度，下面的方案中温度的测量误差最小的是_______。", "options": {"A": "安装热电偶时，使用与其匹配的导线连接", "B": "安装热电偶时，在热端和冷端进行补偿", "C": "安装热电偶时，既采用与之匹配的导线连接又对热端进行补偿", "D": "安装热电偶时，既采用与之匹配的导线连接又对冷端进行补偿"}, "answer": "D", "answerText": "安装热电偶时，既采用与之匹配的导线连接又对冷端进行补偿", "raw": "现在需要在增压器的后端安装一个热电偶以测量增压器后的主机排烟温\n度，下面的方案中温度的测量误差最小的是_______。\nA. 安装热电偶时，使用与其匹配的导线连接\nB. 安装热电偶时，在热端和冷端进行补偿\nC. 安装热电偶时，既采用与之匹配的导线连接又对热端进行补偿\nD. 安装热电偶时，既采用与之匹配的导线连接又对冷端进行补偿", "day": 1}, {"id": 169, "number": 312, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "热电偶常用于船舶机舱有关设备的_______ 监测上。", "options": {"A": "液体黏度", "B": "压力", "C": "转速", "D": "温度"}, "answer": "D", "answerText": "温度", "raw": "热电偶常用于船舶机舱有关设备的_______ 监测上。\nA.液体黏度\nB.压力\nC.转速\nD.温度", "day": 1}, {"id": 170, "number": 313, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在温度传感器中，_______ 具有简单、可靠、精度高并适于远距离传送温\n度信号等优点，通常用来检测超过 300℃的高温气体或液体的温度。", "options": {"A": "铂铑 10-铂热电偶", "B": "铜热电阻", "C": "Pt100 铂热电阻", "D": "热敏电阻"}, "answer": "A", "answerText": "铂铑 10-铂热电偶", "raw": "在温度传感器中，_______ 具有简单、可靠、精度高并适于远距离传送温\n度信号等优点，通常用来检测超过 300℃的高温气体或液体的温度。\nA.铂铑 10-铂热电偶\nB.铜热电阻\nC.Pt100 铂热电阻\nD.热敏电阻", "day": 1}, {"id": 171, "number": 314, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "热敏电阻常用于船舶机舱有关设备的_______ 监测上。", "options": {"A": "油雾浓度", "B": "压力", "C": "转速", "D": "温度"}, "answer": "D", "answerText": "温度", "raw": "热敏电阻常用于船舶机舱有关设备的_______ 监测上。\nA.油雾浓度\nB.压力\nC.转速\nD.温度", "day": 1}, {"id": 172, "number": 315, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "以半导体材料为基体，用热压处理把锰、镍、铜、铁渗入半导体内，这种\n材料的阻值能随温度的升高而减小，利用这一负阻特性检测温度的传感器是\n________。", "options": {"A": "热电偶", "B": "铜热电阻", "C": "热敏电阻", "D": "铂热电阻"}, "answer": "C", "answerText": "热敏电阻", "raw": "以半导体材料为基体，用热压处理把锰、镍、铜、铁渗入半导体内，这种\n材料的阻值能随温度的升高而减小，利用这一负阻特性检测温度的传感器是\n________。\nA.热电偶\nB.铜热电阻\nC.热敏电阻\nD.铂热电阻", "day": 1}, {"id": 173, "number": 316, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "Pt100 温度传感器是_______ 的一种。", "options": {"A": "热敏电阻温度传感器", "B": "热电偶温度传感器", "C": "铂热电阻温度传感器", "D": "铜热电阻温度传感器"}, "answer": "C", "answerText": "铂热电阻温度传感器", "raw": "Pt100 温度传感器是_______ 的一种。\nA.热敏电阻温度传感器\nB.热电偶温度传感器\nC.铂热电阻温度传感器\nD.铜热电阻温度传感器", "day": 1}, {"id": 174, "number": 317, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "Pt100 温度传感器的电阻值_______", "options": {"A": "随着温度的升高而增大", "B": "随着温度的升高而降低", "C": "随着温度的降低而增大", "D": "不随温度而变"}, "answer": "A", "answerText": "随着温度的升高而增大", "raw": "Pt100 温度传感器的电阻值_______\nA.随着温度的升高而增大\nB.随着温度的升高而降低\nC.随着温度的降低而增大\nD.不随温度而变", "day": 1}, {"id": 175, "number": 318, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "主机排气温度的检测主要是使用_______ 来测量的，也有使用________来\n测量的。", "options": {"A": "热电偶；热敏电阻", "B": "热电偶；热电阻", "C": "热电阻；热敏电阻", "D": "金属应变片；差压变送器"}, "answer": "B", "answerText": "热电偶；热电阻", "raw": "主机排气温度的检测主要是使用_______ 来测量的，也有使用________来\n测量的。\nA.热电偶；热敏电阻\nB.热电偶；热电阻\nC.热电阻；热敏电阻\nD.金属应变片；差压变送器", "day": 1}, {"id": 176, "number": 319, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "Pt100 温度变送器的输出为 4-20 m.使用中注意________ 。", "options": {"A": "变送器防爆处理", "B": "Pt100 三线制连接", "C": "零点量程经常调整", "D": "使用环境恒温保持"}, "answer": "B", "answerText": "Pt100 三线制连接", "raw": "Pt100 温度变送器的输出为 4-20 m.使用中注意________ 。\nA.变送器防爆处理\nB. Pt100 三线制连接\nC.零点量程经常调整\nD.使用环境恒温保持", "day": 1}, {"id": 177, "number": 320, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "热电偶式温度传感器，热电偶是由两种不同的金属导体的端点焊接在一\n起，并插入护套制成，热端插入需要测温的_______ ，冷端置于_________，若\n热、冷两端温度不同，则在热电偶回路中产生热电势 e，该接法用来实现对环\n境温度变化的补偿，该方法采用两根材料、长度和截面积相同的导线分别接在\n测量桥臂和调零桥臂，以保证导线的电阻值相等。", "options": {"A": "室内；环境温度处", "B": "测量处；环境温度处", "C": "环境温度处；测量处", "D": "测量处；室内"}, "answer": "B", "answerText": "测量处；环境温度处", "raw": "热电偶式温度传感器，热电偶是由两种不同的金属导体的端点焊接在一\n起，并插入护套制成，热端插入需要测温的_______ ，冷端置于_________，若\n热、冷两端温度不同，则在热电偶回路中产生热电势 e，该接法用来实现对环\n境温度变化的补偿，该方法采用两根材料、长度和截面积相同的导线分别接在\n测量桥臂和调零桥臂，以保证导线的电阻值相等。\nA.室内；环境温度处\nB.测量处；环境温度处\nC.环境温度处；测量处\nD.测量处；室内", "day": 1}, {"id": 178, "number": 321, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "热电阻温度传感器通常采用_______ 接法来实现对环境温度变化的补偿。", "options": {"A": "“一线制”", "B": "“两线制”", "C": "“三线制”", "D": "“四线制”"}, "answer": "C", "answerText": "“三线制”", "raw": "热电阻温度传感器通常采用_______ 接法来实现对环境温度变化的补偿。\nA. “一线制”\nB. “两线制”\nC. “三线制”\nD. “四线制”", "day": 1}, {"id": 179, "number": 322, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在船上_______ 温度传感器，常用于测量主机缸套冷却水温度。", "options": {"A": "热电阻式", "B": "热电偶式", "C": "热敏电阻", "D": "半导体"}, "answer": "A", "answerText": "热电阻式", "raw": "在船上_______ 温度传感器，常用于测量主机缸套冷却水温度。\nA.热电阻式\nB.热电偶式\nC.热敏电阻\nD.半导体", "day": 1}, {"id": 180, "number": 323, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "下列关于热电偶式温度传感器说法错误的是_______。", "options": {"A": "热电偶式温度传感器是将两种不同金属导体的一个端点焊接在一起，并插入\n护套制成的", "B": "热电偶式温度传感器适用于检测高温的场合", "C": "为了消除热电偶式温度传感器冷端温度变化对测量精度的影响，可采用冷端\n温度补偿", "D": "由于测量点为高温，所以热电偶温度传感器设计得较短，以确保接线端为冷\n端，不受被测高温的影响"}, "answer": "D", "answerText": "由于测量点为高温，所以热电偶温度传感器设计得较短，以确保接线端为冷\n端，不受被测高温的影响", "raw": "下列关于热电偶式温度传感器说法错误的是_______。\nA. 热电偶式温度传感器是将两种不同金属导体的一个端点焊接在一起，并插入\n护套制成的\nB. 热电偶式温度传感器适用于检测高温的场合\nC. 为了消除热电偶式温度传感器冷端温度变化对测量精度的影响，可采用冷端\n温度补偿\nD. 由于测量点为高温，所以热电偶温度传感器设计得较短，以确保接线端为冷\n端，不受被测高温的影响", "day": 1}, {"id": 181, "number": 324, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在温度传感器中，船上常采用的热敏电阻温度传感器有 PTC 和 NTC 两\n种，当检测温度升高时，它们的阻值将分别_______ 。", "options": {"A": "增大，增大", "B": "减小，减小", "C": "增大，减小", "D": "减小，增大"}, "answer": "C", "answerText": "增大，减小", "raw": "在温度传感器中，船上常采用的热敏电阻温度传感器有 PTC 和 NTC 两\n种，当检测温度升高时，它们的阻值将分别_______ 。\nA.增大，增大\nB.减小，减小\nC.增大，减小\nD.减小，增大", "day": 1}, {"id": 182, "number": 325, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "关于热电阻式温度传感器说法错误的是_______。", "options": {"A": "在船上常用于测量冷却水温度和轴承温度", "B": "根据热电阻材料的电阻率随温度的增加而减小的原理工作的", "C": "通常采用“三线制”接法来实现对环境温度变化的补偿", "D": "常采用电桥电路将被测温度的变化转换成相应的电压输出"}, "answer": "B", "answerText": "根据热电阻材料的电阻率随温度的增加而减小的原理工作的", "raw": "关于热电阻式温度传感器说法错误的是_______。\nA. 在船上常用于测量冷却水温度和轴承温度\nB. 根据热电阻材料的电阻率随温度的增加而减小的原理工作的\nC. 通常采用“三线制”接法来实现对环境温度变化的补偿\nD. 常采用电桥电路将被测温度的变化转换成相应的电压输出", "day": 1}, {"id": 183, "number": 326, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在采用冷端补偿电桥的热电偶检测温度传感器中，其正确的说法是 _____。", "options": {"A": "冷端温度不变，热电偶产生的热电阻与热端温度成线性关系", "B": "热电偶与冷端补偿电桥并联", "C": "冷端补偿电桥中，有三个桥臂用铜丝绕制的电阻", "D": "热电偶是由两根电子密度不同的金属焊接而成的"}, "answer": "D", "answerText": "热电偶是由两根电子密度不同的金属焊接而成的", "raw": "在采用冷端补偿电桥的热电偶检测温度传感器中，其正确的说法是 _____。\nA. 冷端温度不变，热电偶产生的热电阻与热端温度成线性关系\nB. 热电偶与冷端补偿电桥并联\nC. 冷端补偿电桥中，有三个桥臂用铜丝绕制的电阻\nD. 热电偶是由两根电子密度不同的金属焊接而成的", "day": 1}, {"id": 184, "number": 327, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "温度 1000C 以下温度传感器及其测量电路板构成的温度传感器的调整方\n法，一般采用________。", "options": {"A": "通过实际对象的温度控制，达到设定的上、下限值", "B": "通过电位器调节其电阻值，然后根据其阻值推算出温度值", "C": "通过电压模拟信号，根据其分度表推算出温度值", "D": "通过电流模拟信号，根据其分度表推算出温度值"}, "answer": "A", "answerText": "通过实际对象的温度控制，达到设定的上、下限值", "raw": "温度 1000C 以下温度传感器及其测量电路板构成的温度传感器的调整方\n法，一般采用________。\nA. 通过实际对象的温度控制，达到设定的上、下限值\nB. 通过电位器调节其电阻值，然后根据其阻值推算出温度值\nC. 通过电压模拟信号，根据其分度表推算出温度值\nD. 通过电流模拟信号，根据其分度表推算出温度值", "day": 1}, {"id": 185, "number": 328, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "热电阻式温度传感器由_______ 组成。", "options": {"A": "热敏电阻和测温电桥", "B": "热电阻和测温电桥", "C": "电桥和温度补偿电路", "D": "热敏电阻和温度补偿电路"}, "answer": "B", "answerText": "热电阻和测温电桥", "raw": "热电阻式温度传感器由_______ 组成。\nA.热敏电阻和测温电桥\nB.热电阻和测温电桥\nC.电桥和温度补偿电路\nD.热敏电阻和温度补偿电路", "day": 1}, {"id": 186, "number": 329, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在如图所示的电阻式压力传感器中，当输入的压力信号减小时，滑针在变\n阻器上的滑动方向为_______ ，测量电桥输出的电压值变化为________ 。", "options": {"A": "顺时针；增大", "B": "逆时针；增大", "C": "顺时针；减小", "D": "逆时针；减小"}, "answer": "D", "answerText": "逆时针；减小", "raw": "在如图所示的电阻式压力传感器中，当输入的压力信号减小时，滑针在变\n阻器上的滑动方向为_______ ，测量电桥输出的电压值变化为________ 。\nA.顺时针；增大\nB.逆时针；增大\nC.顺时针；减小\nD.逆时针；减小", "day": 1}, {"id": 187, "number": 330, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "金属应变片式压力传感器在量程范围内，当测量压力_______ ，应变片长\n度________ ，电阻变小。", "options": {"A": "升高；缩短", "B": "升高；伸长", "C": "降低；缩短", "D": "降低；伸长"}, "answer": "C", "answerText": "降低；缩短", "raw": "金属应变片式压力传感器在量程范围内，当测量压力_______ ，应变片长\n度________ ，电阻变小。\nA.升高；缩短\nB.升高；伸长\nC.降低；缩短\nD.降低；伸长", "day": 1}, {"id": 188, "number": 331, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "压力传感器的作用是检测_______信号并将其转换成_______ 信号输出。", "options": {"A": "机械压力；位移", "B": "气（汽）压力；位移", "C": "液体压力；转角", "D": "压力；电"}, "answer": "D", "answerText": "压力；电", "raw": "压力传感器的作用是检测_______信号并将其转换成_______ 信号输出。\nA.机械压力；位移\nB.气（汽）压力；位移\nC.液体压力；转角\nD.压力；电", "day": 1}, {"id": 189, "number": 332, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "弹簧管和波纹管常用于船舶机舱有关设备的______监测上。", "options": {"A": "油雾浓度", "B": "压力", "C": "转速", "D": "盐度"}, "answer": "B", "answerText": "压力", "raw": "弹簧管和波纹管常用于船舶机舱有关设备的______监测上。\nA.油雾浓度\nB.压力\nC.转速\nD.盐度", "day": 1}, {"id": 190, "number": 333, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "变浮力式液位传感器的工作原理是随着液位的变化，浮筒位移发生变化带\n动差动变压器________ 。", "options": {"A": "铁芯产生位移变化，经过整流，输出与液位变化成比例的直流信号", "B": "线圈产生位移变化，经过整流，输出与液位变化成比例的直流信号", "C": "线圈产生位移变化，输出与液位变化成比例的交流信号", "D": "铁芯产生位移变化，输出与液位变化成比例的交流信号"}, "answer": "A", "answerText": "铁芯产生位移变化，经过整流，输出与液位变化成比例的直流信号", "raw": "变浮力式液位传感器的工作原理是随着液位的变化，浮筒位移发生变化带\n动差动变压器________ 。\nA. 铁芯产生位移变化，经过整流，输出与液位变化成比例的直流信号\nB. 线圈产生位移变化，经过整流，输出与液位变化成比例的直流信号\nC. 线圈产生位移变化，输出与液位变化成比例的交流信号\nD. 铁芯产生位移变化，输出与液位变化成比例的交流信号", "day": 1}, {"id": 191, "number": 334, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "变浮力式液位传感器的测量原理是在量程内_______。", "options": {"A": "被测液位越低，输出的脉冲频率越低", "B": "被测液位越低，输出的电流越小", "C": "被测液位越低，输出的电压越大", "D": "被测液位越低，输出的电压越小"}, "answer": "D", "answerText": "被测液位越低，输出的电压越小", "raw": "变浮力式液位传感器的测量原理是在量程内_______。\nA. 被测液位越低，输出的脉冲频率越低\nB. 被测液位越低，输出的电流越小\nC. 被测液位越低，输出的电压越大\nD. 被测液位越低，输出的电压越小", "day": 1}, {"id": 192, "number": 335, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在变浮力式液位传感器中，随着所检测的液位的升高，其输出为\n_______。", "options": {"A": "按比例得到增大的气压信号", "B": "按比例得到增大的电阻值", "C": "按比例得到增大的直流电压", "D": "按反比得到降低的电流大小"}, "answer": "C", "answerText": "按比例得到增大的直流电压", "raw": "在变浮力式液位传感器中，随着所检测的液位的升高，其输出为\n_______。\nA.按比例得到增大的气压信号\nB.按比例得到增大的电阻值\nC.按比例得到增大的直流电压\nD.按反比得到降低的电流大小", "day": 1}, {"id": 193, "number": 336, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在吹气式液位传感器中，随着液位的降低，平衡气室逸出的气泡量及导管\n压力的变化分别为_______。", "options": {"A": "增多，增大", "B": "减少，增大", "C": "增多，减小", "D": "减少，减少"}, "answer": "C", "answerText": "增多，减小", "raw": "在吹气式液位传感器中，随着液位的降低，平衡气室逸出的气泡量及导管\n压力的变化分别为_______。\nA.增多，增大\nB.减少，增大\nC.增多，减小\nD.减少，减少", "day": 1}, {"id": 194, "number": 337, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在吹气式液位传感器中，设平衡气室压力为 P1，导管压力为 P2，变送器输\n出压力为 Po，当液位升高时，这三者之间的关系是___。\nA P2>0，Po 增大", "options": {"B": "P2<P1 ，Po 减小", "C": "P2=P1，Po 增大", "D": "P2=P1，Po 减小"}, "answer": "C", "answerText": "P2=P1，Po 增大", "raw": "在吹气式液位传感器中，设平衡气室压力为 P1，导管压力为 P2，变送器输\n出压力为 Po，当液位升高时，这三者之间的关系是___。\nA P2>0，Po 增大\nB. P2<P1 ，Po 减小\nC.P2=P1，Po 增大\nD. P2=P1，Po 减小", "day": 1}, {"id": 195, "number": 338, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "关于吹气式液位传感器的描述，正确的是_______。", "options": {"A": "该种液位传感器测量液位非常准确，不需要进行校正", "B": "液体的静压仅与液位的高度有关", "C": "该种液位传感器测量液位时需根据液体比重的不同进行校正", "D": "该种液位传感器发生液位超限报警肯定是由于液位超出了极限"}, "answer": "C", "answerText": "该种液位传感器测量液位时需根据液体比重的不同进行校正", "raw": "关于吹气式液位传感器的描述，正确的是_______。\nA. 该种液位传感器测量液位非常准确，不需要进行校正\nB. 液体的静压仅与液位的高度有关\nC. 该种液位传感器测量液位时需根据液体比重的不同进行校正\nD. 该种液位传感器发生液位超限报警肯定是由于液位超出了极限", "day": 1}, {"id": 196, "number": 339, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "吹气式液位传感器是属于_______ 液位传感器。", "options": {"A": "动态式", "B": "静压式", "C": "静态式", "D": "差压式"}, "answer": "B", "answerText": "静压式", "raw": "吹气式液位传感器是属于_______ 液位传感器。\nA.动态式\nB.静压式\nC.静态式\nD.差压式", "day": 1}, {"id": 197, "number": 340, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "容积式流量传感器的测量原理是_______ ，输出的电脉冲频率越高。", "options": {"A": "被测介质流量越大", "B": "被测介质流量越小", "C": "被测介质比重越大", "D": "被测介质导电性越好"}, "answer": "A", "answerText": "被测介质流量越大", "raw": "容积式流量传感器的测量原理是_______ ，输出的电脉冲频率越高。\nA.被测介质流量越大\nB.被测介质流量越小\nC.被测介质比重越大\nD.被测介质导电性越好", "day": 1}, {"id": 198, "number": 341, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "流量传感器检测流量的方法，可利用_______ 。\n①电容式；②容积式；③电磁式；④差压式；⑤磁脉冲式；⑥静压吹气式", "options": {"A": "①②③", "B": "②③④", "C": "③④⑤", "D": "④⑤⑥"}, "answer": "B", "answerText": "②③④", "raw": "流量传感器检测流量的方法，可利用_______ 。\n①电容式；②容积式；③电磁式；④差压式；⑤磁脉冲式；⑥静压吹气式\nA.①②③\nB.②③④\nC.③④⑤\nD.④⑤⑥", "day": 1}, {"id": 199, "number": 342, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "容积式流量传感器中，干簧继电器的作用是_______。", "options": {"A": "在流量超限时闭合报警", "B": "在没有流量流过时，永远处于断开状态", "C": "通过其闭合和断开，将齿轮转速转化为一系列的电脉冲信号", "D": "通过其闭合和断开，来检测永久磁铁是否损坏"}, "answer": "C", "answerText": "通过其闭合和断开，将齿轮转速转化为一系列的电脉冲信号", "raw": "容积式流量传感器中，干簧继电器的作用是_______。\nA. 在流量超限时闭合报警\nB. 在没有流量流过时，永远处于断开状态\nC. 通过其闭合和断开，将齿轮转速转化为一系列的电脉冲信号\nD. 通过其闭合和断开，来检测永久磁铁是否损坏", "day": 1}, {"id": 200, "number": 343, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "关于流量传感器的说法，正确的是_______ 。\n①流量传感器均是将液体的流量成比例地转化为电信号或者气压信号的传感\n器；②电磁式流量传感器在测量导电液体时，相比测量非导电液体，会有更大\n的误差；③容积式流量传感器可以测量油和水的流量；④电磁式流量传感器也\n可以测量水的流量", "options": {"A": "②③", "B": "①③④", "C": "①②④", "D": "①②③④"}, "answer": "B", "answerText": "①③④", "raw": "关于流量传感器的说法，正确的是_______ 。\n①流量传感器均是将液体的流量成比例地转化为电信号或者气压信号的传感\n器；②电磁式流量传感器在测量导电液体时，相比测量非导电液体，会有更大\n的误差；③容积式流量传感器可以测量油和水的流量；④电磁式流量传感器也\n可以测量水的流量\nA.②③\nB.①③④\nC.①②④\nD.①②③④", "day": 1}, {"id": 201, "number": 344, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "电磁式流量传感器在机舱中通常不可用来测量_______ 的流量。\n①柴油；②润滑油；③海水；④制冷剂", "options": {"A": "①②③", "B": "①③④", "C": "①②④", "D": "②③④"}, "answer": "C", "answerText": "①②④", "raw": "电磁式流量传感器在机舱中通常不可用来测量_______ 的流量。\n①柴油；②润滑油；③海水；④制冷剂\nA.①②③\nB.①③④\nC.①②④\nD.②③④", "day": 1}, {"id": 202, "number": 345, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在变浮力式液位传感器中，如果推动铁芯移动的弹簧断裂，则液位指示仪\n表的指示值为________ 。", "options": {"A": "最高水位以上", "B": "最低水位以下", "C": "中间水位不变", "D": "任意水位"}, "answer": "B", "answerText": "最低水位以下", "raw": "在变浮力式液位传感器中，如果推动铁芯移动的弹簧断裂，则液位指示仪\n表的指示值为________ 。\nA.最高水位以上\nB.最低水位以下\nC.中间水位不变\nD.任意水位", "day": 1}, {"id": 203, "number": 346, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "吹气式液位传感器常用于检测________。", "options": {"A": "锅炉水位", "B": "舱底水水位", "C": "沉淀油柜油位", "D": "压载舱水位"}, "answer": "D", "answerText": "压载舱水位", "raw": "吹气式液位传感器常用于检测________。\nA.锅炉水位\nB.舱底水水位\nC.沉淀油柜油位\nD.压载舱水位", "day": 1}, {"id": 204, "number": 347, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "油船油舱的液位检测传感器安装需要考虑________。", "options": {"A": "不能使用交流电源", "B": "IP 等级高", "C": "本质安全及防爆", "D": "非接触式测量"}, "answer": "C", "answerText": "本质安全及防爆", "raw": "油船油舱的液位检测传感器安装需要考虑________。\nA.不能使用交流电源\nB. IP 等级高\nC.本质安全及防爆\nD.非接触式测量", "day": 1}, {"id": 205, "number": 348, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "气动差压变送器在船舶机舱较多，但是在_______ 检测中极少使用。", "options": {"A": "辅锅炉水位", "B": "压载水液位", "C": "空压机出口压力", "D": "主机增压器扫气压力"}, "answer": "C", "answerText": "空压机出口压力", "raw": "气动差压变送器在船舶机舱较多，但是在_______ 检测中极少使用。\nA.辅锅炉水位\nB.压载水液位\nC.空压机出口压力\nD.主机增压器扫气压力", "day": 1}, {"id": 206, "number": 349, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "电动差压变送器在船舶机舱中使用越来越多，但是在_______ 检测中极少\n使用。", "options": {"A": "辅锅炉水位", "B": "压载水液位", "C": "油船油舱液位", "D": "主机增压器扫气压力"}, "answer": "C", "answerText": "油船油舱液位", "raw": "电动差压变送器在船舶机舱中使用越来越多，但是在_______ 检测中极少\n使用。\nA.辅锅炉水位\nB.压载水液位\nC.油船油舱液位\nD.主机增压器扫气压力", "day": 1}, {"id": 207, "number": 350, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "电动变送器的类型很多，输出为 4~20mA 的变送器中，现在较为常见的是\n______。", "options": {"A": "二线制", "B": "三线制", "C": "四线制", "D": "五线制"}, "answer": "A", "answerText": "二线制", "raw": "电动变送器的类型很多，输出为 4~20mA 的变送器中，现在较为常见的是\n______。\nA.二线制\nB.三线制\nC.四线制\nD.五线制", "day": 1}, {"id": 208, "number": 351, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "如图为变浮力式液位传感器原理图，弹簧的位移变化与液位的变化相比\n______", "options": {"A": "弹簧的位移变化大", "B": "变化一样大", "C": "弹簧的位移变化小", "D": "不能确定，与液体密度有关"}, "answer": "C", "answerText": "弹簧的位移变化小", "raw": "如图为变浮力式液位传感器原理图，弹簧的位移变化与液位的变化相比\n______\nA.弹簧的位移变化大\nB.变化一样大\nC.弹簧的位移变化小\nD.不能确定，与液体密度有关", "day": 1}, {"id": 209, "number": 352, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "金属应变片式传感器，当测量压力增大时，应变片弯曲变形，电阻值\n______。.", "options": {"A": "减小", "B": "不变化", "C": "不一定变化，与变形形状有关", "D": "增大"}, "answer": "D", "answerText": "增大", "raw": "金属应变片式传感器，当测量压力增大时，应变片弯曲变形，电阻值\n______。.\nA.减小\nB.不变化\nC.不一定变化，与变形形状有关\nD.增大", "day": 1}, {"id": 210, "number": 353, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "如图为吹气式液位传感器，调整节流阀 2 使液位在______时，从平衡气室\n中有微量气泡溢出。", "options": {"A": "最高位置", "B": "最低位置", "C": "中间位置", "D": "中下位置"}, "answer": "A", "answerText": "最高位置", "raw": "如图为吹气式液位传感器，调整节流阀 2 使液位在______时，从平衡气室\n中有微量气泡溢出。\nA.最高位置\nB.最低位置\nC.中间位置\nD.中下位置", "day": 1}, {"id": 211, "number": 354, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "容积式流量传感器，调节流量的阀门应位于______，以便使被测介质总是\n充满流量计内部腔室。", "options": {"A": "管路中部", "B": "管路 2/3 处", "C": "流量计的上游", "D": "流量计的下游"}, "answer": "D", "answerText": "流量计的下游", "raw": "容积式流量传感器，调节流量的阀门应位于______，以便使被测介质总是\n充满流量计内部腔室。\nA.管路中部\nB.管路 2/3 处\nC.流量计的上游\nD.流量计的下游", "day": 1}, {"id": 212, "number": 355, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "船舶柴油机燃油黏度控制系统是_______ 。", "options": {"A": "定值控制系统", "B": "随动控制系统", "C": "程序控制系统", "D": "开环控制系统"}, "answer": "A", "answerText": "定值控制系统", "raw": "船舶柴油机燃油黏度控制系统是_______ 。\nA.定值控制系统\nB.随动控制系统\nC.程序控制系统\nD.开环控制系统", "day": 1}, {"id": 213, "number": 356, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在 QBC 型气动差压变送器中，波纹管作为________元件。", "options": {"A": "检测", "B": "反馈", "C": "放大", "D": "比较"}, "answer": "B", "answerText": "反馈", "raw": "在 QBC 型气动差压变送器中，波纹管作为________元件。\nA.检测\nB.反馈\nC.放大\nD.比较", "day": 1}, {"id": 214, "number": 357, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在 QBC 型气动差压变送器中，起反馈作用的是________ 。", "options": {"A": "喷嘴挡板机构", "B": "波纹管", "C": "弹簧", "D": ".密封簧片"}, "answer": "B", "answerText": "波纹管", "raw": "在 QBC 型气动差压变送器中，起反馈作用的是________ 。\nA.喷嘴挡板机构\nB.波纹管\nC.弹簧\nD..密封簧片", "day": 1}, {"id": 215, "number": 358, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "下图所示为 QBC 型单杠杆差压变送器，则_______ °", "options": {"A": "15 为正压室，其压力增大时，输出压力增大", "B": "17 为负压室，其压力增大时，输出压力增大", "C": "17 为正压室，其压力增大时，输出压力增大", "D": "15 为负压室，其压力减小时，输出压力增大"}, "answer": "A", "answerText": "15 为正压室，其压力增大时，输出压力增大", "raw": "下图所示为 QBC 型单杠杆差压变送器，则_______ °\nA. 15 为正压室，其压力增大时，输出压力增大\nB. 17 为负压室，其压力增大时，输出压力增大\nC. 17 为正压室，其压力增大时，输出压力增大\nD. 15 为负压室，其压力减小时，输出压力增大", "day": 1}, {"id": 216, "number": 359, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "对于差压变送器，放大系数和量程的关系为_______ 。", "options": {"A": "放大系数增大，量程减小", "B": "放大系数增大，量程增大", "C": "放大系数减小，量程减小", "D": "放大系数增减，量程不变"}, "answer": "A", "answerText": "放大系数增大，量程减小", "raw": "对于差压变送器，放大系数和量程的关系为_______ 。\nA.放大系数增大，量程减小\nB.放大系数增大，量程增大\nC.放大系数减小，量程减小\nD.放大系数增减，量程不变", "day": 1}, {"id": 217, "number": 360, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在单杠杆差压变送器中，放大系数 K 单和量程的关系为_______。", "options": {"A": "K 单 ↑，量程↑", "B": "K 单与量程没有关系", "C": "K 单 ↑量程↓", "D": "K 单 ↓，量程不变"}, "answer": "C", "answerText": "K 单 ↑量程↓", "raw": "在单杠杆差压变送器中，放大系数 K 单和量程的关系为_______。\nA. K 单 ↑，量程↑\nB. K 单与量程没有关系\nC. K 单 ↑量程↓\nD. K 单 ↓，量程不变", "day": 1}, {"id": 218, "number": 361, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "单杠杆差压变送器调零的目的是_______ 。\n①校对量程起点；②校准量程终点；③校准量程范围；④校准被控量在给定值\n上", "options": {"A": "①", "B": "②", "C": "①③", "D": "④"}, "answer": "A", "answerText": "①", "raw": "单杠杆差压变送器调零的目的是_______ 。\n①校对量程起点；②校准量程终点；③校准量程范围；④校准被控量在给定值\n上\nA.①\nB.②\nC.①③\nD.④", "day": 1}, {"id": 219, "number": 362, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "FCM 燃油组合控制单元中采用 EVT20C 黏度传感器，其采用的工作原理是\n_______ 在其共振频率下相应信号的阻尼与黏度的平方根成比例。", "options": {"A": "不同温度的燃油", "B": "不同温度的液体", "C": "不同密度的液体", "D": "不同黏度的液体"}, "answer": "D", "answerText": "不同黏度的液体", "raw": "FCM 燃油组合控制单元中采用 EVT20C 黏度传感器，其采用的工作原理是\n_______ 在其共振频率下相应信号的阻尼与黏度的平方根成比例。\nA.不同温度的燃油\nB.不同温度的液体\nC.不同密度的液体\nD.不同黏度的液体", "day": 1}, {"id": 220, "number": 363, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "如图所示，FCM 中燃油黏度控制系统采用 EVT20 黏度传感器，该传感器\n本体工作原理是_______ 。", "options": {"A": "基于燃油温度对热电阻阻值的影响作用", "B": "基于燃油压力对压感传感器的压力作用", "C": "基于流动燃油的黏性对钟摆的旋转振动有阻尼作用", "D": "基于流动燃油的黏性对钟摆的旋转振动有驱动作用"}, "answer": "C", "answerText": "基于流动燃油的黏性对钟摆的旋转振动有阻尼作用", "raw": "如图所示，FCM 中燃油黏度控制系统采用 EVT20 黏度传感器，该传感器\n本体工作原理是_______ 。\nA.基于燃油温度对热电阻阻值的影响作用\nB. 基于燃油压力对压感传感器的压力作用\nC. 基于流动燃油的黏性对钟摆的旋转振动有阻尼作用\nD. 基于流动燃油的黏性对钟摆的旋转振动有驱动作用", "day": 1}, {"id": 221, "number": 364, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "船舶机舱中，扭矩传感器一般用于检测________。", "options": {"A": "主机轴功率", "B": "发电柴油机轴功率", "C": "主机转速", "D": "发电柴油机转速"}, "answer": "A", "answerText": "主机轴功率", "raw": "船舶机舱中，扭矩传感器一般用于检测________。\nA.主机轴功率\nB.发电柴油机轴功率\nC.主机转速\nD.发电柴油机转速", "day": 1}, {"id": 222, "number": 365, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "下列物理变化量中可以用于测量机械输出轴扭矩的是_______ 。", "options": {"A": "频率", "C": "相位", "B": "频率差", "D": "相位差"}, "answer": "D", "answerText": "相位差", "raw": "下列物理变化量中可以用于测量机械输出轴扭矩的是_______ 。\nA.频率\nC.相位\nB.频率差\nD.相位差", "day": 1}, {"id": 223, "number": 366, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "下列选项中，相位差式扭矩传感器不可缺少的部件是_______ 。", "options": {"A": "转速测量仪", "B": "温度检测仪", "C": "磁脉冲传感器", "D": "拉力仪"}, "answer": "C", "answerText": "磁脉冲传感器", "raw": "下列选项中，相位差式扭矩传感器不可缺少的部件是_______ 。\nA.转速测量仪\nB.温度检测仪\nC.磁脉冲传感器\nD.拉力仪", "day": 1}, {"id": 224, "number": 367, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "相位差式扭矩传感器包括________", "options": {"A": "一个齿轮和一个磁脉冲传感器", "B": "一个齿轮和两个磁脉冲传感器", "C": "两个齿轮和一个磁脉冲传感器", "D": "两个齿轮和两个磁脉冲传感器"}, "answer": "D", "answerText": "两个齿轮和两个磁脉冲传感器", "raw": "相位差式扭矩传感器包括________\nA. 一个齿轮和一个磁脉冲传感器\nB. 一个齿轮和两个磁脉冲传感器\nC.两个齿轮和一个磁脉冲传感器\nD.两个齿轮和两个磁脉冲传感器", "day": 1}, {"id": 225, "number": 368, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "如图所示为相位差式扭矩测量传感器原理图，在主轴扭矩为零时，两个齿\n轮的齿顶和齿槽在轴线方向上应该________", "options": {"A": "错开半个轮齿", "B": "完全重合", "C": "错开四分之一个轮齿", "D": "没有要求"}, "answer": "B", "answerText": "完全重合", "raw": "如图所示为相位差式扭矩测量传感器原理图，在主轴扭矩为零时，两个齿\n轮的齿顶和齿槽在轴线方向上应该________\nA.错开半个轮齿\nB.完全重合\nC.错开四分之一个轮齿\nD.没有要求", "day": 1}, {"id": 226, "number": 369, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在相位差式扭矩传感器中，扭矩为零时，若从轴线看两个脉冲传感器磁头\n的相对位置，则它们的角度差为___。", "options": {"A": "0°", "B": "45°", "C": "90°", "D": "180°"}, "answer": "A", "answerText": "0°", "raw": "在相位差式扭矩传感器中，扭矩为零时，若从轴线看两个脉冲传感器磁头\n的相对位置，则它们的角度差为___。\nA. 0°\nB. 45°\nC. 90°\nD. 180°", "day": 1}, {"id": 227, "number": 370, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在相位差式扭矩传感器中，当扭矩从零逐渐增大时，两个磁头所感应的脉\n冲相位差的变化为___ 。", "options": {"A": "从 0°逐渐增大", "B": "从 90°逐渐增大", "C": "从 90°逐渐减小", "D": "从 180°逐渐减小"}, "answer": "A", "answerText": "从 0°逐渐增大", "raw": "在相位差式扭矩传感器中，当扭矩从零逐渐增大时，两个磁头所感应的脉\n冲相位差的变化为___ 。\nA.从 0°逐渐增大\nB.从 90°逐渐增大\nC.从 90°逐渐减小\nD.从 180°逐渐减小", "day": 1}, {"id": 228, "number": 371, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "滑动电阻式压力传感器是由_______ 组成的。\n①弹簧管；②电位器；③测量电桥；④金属应变片", "options": {"A": "②③④", "B": "①②③", "C": "①②④", "D": "①②③④"}, "answer": "B", "answerText": "①②③", "raw": "滑动电阻式压力传感器是由_______ 组成的。\n①弹簧管；②电位器；③测量电桥；④金属应变片\nA.②③④\nB.①②③\nC.①②④\nD.①②③④", "day": 1}, {"id": 229, "number": 372, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "滑动电阻式压力传感器和金属应变片式压力传感器分别采用_______ 和\n________ 电路进行信号转换。", "options": {"A": "电桥；运算放大器", "B": "电桥；电桥", "C": "运算放大器；电桥", "D": "运算放大器；运算放大器"}, "answer": "B", "answerText": "电桥；电桥", "raw": "滑动电阻式压力传感器和金属应变片式压力传感器分别采用_______ 和\n________ 电路进行信号转换。\nA.电桥；运算放大器\nB.电桥；电桥\nC.运算放大器；电桥\nD.运算放大器；运算放大器", "day": 1}, {"id": 230, "number": 373, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "下列_______ 不是电容式压力传感器基本类型。", "options": {"A": "变极距型", "B": "变介电常数型", "C": "变面积型", "D": "变频率型"}, "answer": "D", "answerText": "变频率型", "raw": "下列_______ 不是电容式压力传感器基本类型。\nA.变极距型\nB.变介电常数型\nC.变面积型\nD.变频率型", "day": 1}, {"id": 231, "number": 374, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "变浮力式液位传感器主要由_______ 组成。\n①浮筒；②平衡力弹簧；③差动变压器；④差压变送器", "options": {"A": "①②③", "B": "①②④", "C": "②③④", "D": "①②③④"}, "answer": "A", "answerText": "①②③", "raw": "变浮力式液位传感器主要由_______ 组成。\n①浮筒；②平衡力弹簧；③差动变压器；④差压变送器\nA.①②③\nB.①②④\nC.②③④\nD.①②③④", "day": 1}, {"id": 232, "number": 375, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "容积式流量传感器在船上主要用来检测油流体的流量，当流量增大时\n_______ 。", "options": {"A": "齿轮转速越快，电脉冲通断的频率越高", "B": "齿轮转速越快，电脉冲通断的频率越低", "C": "齿轮转速越慢，电脉冲通断的频率越高", "D": "齿轮转速越慢，电脉冲通断的频率越低"}, "answer": "A", "answerText": "齿轮转速越快，电脉冲通断的频率越高", "raw": "容积式流量传感器在船上主要用来检测油流体的流量，当流量增大时\n_______ 。\nA. 齿轮转速越快，电脉冲通断的频率越高\nB. 齿轮转速越快，电脉冲通断的频率越低\nC. 齿轮转速越慢，电脉冲通断的频率越高\nD. 齿轮转速越慢，电脉冲通断的频率越低", "day": 1}, {"id": 233, "number": 376, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在空气瓶压力双位自动控制系统中，若要求:①空气瓶压力从高压降低到某\n个压力时， 优先1 号空压机自动起动， 开始往气瓶补气；②当空气瓶压力仍然降\n低到另一个更低值时，2 号空压机后续起动，同时投入运行；③当空气瓶压力达\n到某个高压值时， 两台空压机同时停止工作。 符合上述要求的是1 号空压机的起\n动/停止压力调整为_______ ；2 号空压机的起动/停止压力调整为________。", "options": {"A": "2.3 MPa/3.0 MPa；2.1 MPa/3.0 MPa", "B": "2.1 MPa/2.5 MPa；2.1 MPa/2.5 MPa", "C": "2.1 MPa/3.0 MPa；2.0 MPa/2.5 MPa", "D": "2.1 MPa/3.0 MPa；2.1 MPa/2.5 MPa"}, "answer": "A", "answerText": "2.3 MPa/3.0 MPa；2.1 MPa/3.0 MPa", "raw": "在空气瓶压力双位自动控制系统中，若要求:①空气瓶压力从高压降低到某\n个压力时， 优先1 号空压机自动起动， 开始往气瓶补气；②当空气瓶压力仍然降\n低到另一个更低值时，2 号空压机后续起动，同时投入运行；③当空气瓶压力达\n到某个高压值时， 两台空压机同时停止工作。 符合上述要求的是1 号空压机的起\n动/停止压力调整为_______ ；2 号空压机的起动/停止压力调整为________。\nA. 2.3 MPa/3.0 MPa；2.1 MPa/3.0 MPa\nB. 2.1 MPa/2.5 MPa；2.1 MPa/2.5 MPa\nC. 2.1 MPa/3.0 MPa；2.0 MPa/2.5 MPa\nD. 2.1 MPa/3.0 MPa；2.1 MPa/2.5 MPa", "day": 1}, {"id": 234, "number": 377, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在空气瓶压力双位自动控制系统中，若要求:①空气瓶压力从高压降低到某\n个压力时，优先 1 号空压机自动起动，开始往气瓶补气；②当空气瓶压力仍然\n降低到另一个更低值时，2 号空压机后续起动，同时投入运行；③当空气瓶压\n力达到某个高压值时，两台空压机同时停止工作。符合上述要求的是 1 号空压\n机的起动/停止压力调整为_______ ；2 号空压机的起动/停止压力调整为\n________。", "options": {"A": "2.5 MPa/3.0 MPa；2.3 MPa/3.0 MPa", "B": "2.3 MPa/2.5 MPa；2.3 MPa/2.5 MPa", "C": "2.5 MPa/3.0 MPa；2.3 MPa/2.5 MPa", "D": "2.3 MPa/3.0 MPa；2.3 MPa/2.5 MPa"}, "answer": "A", "answerText": "2.5 MPa/3.0 MPa；2.3 MPa/3.0 MPa", "raw": "在空气瓶压力双位自动控制系统中，若要求:①空气瓶压力从高压降低到某\n个压力时，优先 1 号空压机自动起动，开始往气瓶补气；②当空气瓶压力仍然\n降低到另一个更低值时，2 号空压机后续起动，同时投入运行；③当空气瓶压\n力达到某个高压值时，两台空压机同时停止工作。符合上述要求的是 1 号空压\n机的起动/停止压力调整为_______ ；2 号空压机的起动/停止压力调整为\n________。\nA. 2.5 MPa/3.0 MPa；2.3 MPa/3.0 MPa\nB. 2.3 MPa/2.5 MPa；2.3 MPa/2.5 MPa\nC. 2.5 MPa/3.0 MPa；2.3 MPa/2.5 MPa\nD. 2.3 MPa/3.0 MPa；2.3 MPa/2.5 MPa", "day": 1}, {"id": 235, "number": 378, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "15PPm 水中含油量的检测常采用光散射法，传感器检测的管路使用中不需\n关注的是_______。", "options": {"A": "定期清洁", "B": "保持压缩空气的清洁与压力", "C": "本质安全及防爆", "D": "零位校对"}, "answer": "C", "answerText": "本质安全及防爆", "raw": "15PPm 水中含油量的检测常采用光散射法，传感器检测的管路使用中不需\n关注的是_______。\nA.定期清洁\nB.保持压缩空气的清洁与压力\nC.本质安全及防爆\nD.零位校对", "day": 1}, {"id": 236, "number": 379, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "分油机出口的油中含水量的检测常采用电容检测法，下列说法中，\n_______ 是正确的。", "options": {"A": "电容置于油中，所以两极间是没有电阻的", "B": "电容电极有防护，不用定期清洁处理", "C": "电容置于油中，所以应是防爆的", "D": "传感器及后续变换电路输出的是代表电容的信号"}, "answer": "D", "answerText": "传感器及后续变换电路输出的是代表电容的信号", "raw": "分油机出口的油中含水量的检测常采用电容检测法，下列说法中，\n_______ 是正确的。\nA. 电容置于油中，所以两极间是没有电阻的\nB. 电容电极有防护，不用定期清洁处理\nC. 电容置于油中，所以应是防爆的\nD. 传感器及后续变换电路输出的是代表电容的信号", "day": 1}, {"id": 237, "number": 380, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "关于喷嘴挡板机构静特性曲线的说法，错误的是_______。", "options": {"A": "当挡板处于全关时，背压室的压力只能接近于气源压力", "B": "在挡板全开时，由于喷嘴孔径远大于恒节流孔的孔径，使背压室压力接近大\n气压力", "C": "背压室的压力与挡板开度之间不是严格的线性关系，特别是静特性曲线上、\n下两端，是明显的非线性关系", "D": "为使喷嘴挡板机构能工作在静特性曲线的最佳工作段上，可通过调整恒节流\n孔孔径来实现"}, "answer": "D", "answerText": "为使喷嘴挡板机构能工作在静特性曲线的最佳工作段上，可通过调整恒节流\n孔孔径来实现", "raw": "关于喷嘴挡板机构静特性曲线的说法，错误的是_______。\nA. 当挡板处于全关时，背压室的压力只能接近于气源压力\nB. 在挡板全开时，由于喷嘴孔径远大于恒节流孔的孔径，使背压室压力接近大\n气压力\nC. 背压室的压力与挡板开度之间不是严格的线性关系，特别是静特性曲线上、\n下两端，是明显的非线性关系\nD. 为使喷嘴挡板机构能工作在静特性曲线的最佳工作段上，可通过调整恒节流\n孔孔径来实现", "day": 1}, {"id": 238, "number": 381, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "在气动仪表中，喷嘴挡板机构的主要作用是_______。", "options": {"A": "把输入的气压信号转换成挡板位移输出", "B": "把挡板微小位移变化转换成气压信号输出", "C": "对输入气压信号延时输出", "D": "把输入的气压信号进行功率放大输出"}, "answer": "B", "answerText": "把挡板微小位移变化转换成气压信号输出", "raw": "在气动仪表中，喷嘴挡板机构的主要作用是_______。\nA. 把输入的气压信号转换成挡板位移输出\nB. 把挡板微小位移变化转换成气压信号输出\nC. 对输入气压信号延时输出\nD. 把输入的气压信号进行功率放大输出", "day": 1}, {"id": 239, "number": 382, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "EVT10C 黏度传感器工作原理是基于流动燃油的_______ 的衰减来进行测\n量的。", "options": {"A": "黏性对其中振动杆振动幅度", "B": "温度对其中振动杆振动幅度", "C": "黏性对其中振动杆振动频率", "D": "温度对其中振动杆振动频率"}, "answer": "A", "answerText": "黏性对其中振动杆振动幅度", "raw": "EVT10C 黏度传感器工作原理是基于流动燃油的_______ 的衰减来进行测\n量的。\nA.黏性对其中振动杆振动幅度\nB.温度对其中振动杆振动幅度\nC.黏性对其中振动杆振动频率\nD.温度对其中振动杆振动频率", "day": 1}, {"id": 240, "number": 383, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "EVT10C 黏度传感器可以对 DO （柴油）_______ 进行控制，对 HFO（重\n油）进行________控制。", "options": {"A": "温度定值；温度或黏度", "B": "黏度定值；温度或黏度", "C": "温度或黏度；温度或黏度", "D": "温度或黏度；黏度"}, "answer": "A", "answerText": "温度定值；温度或黏度", "raw": "EVT10C 黏度传感器可以对 DO （柴油）_______ 进行控制，对 HFO（重\n油）进行________控制。\nA.温度定值；温度或黏度\nB.黏度定值；温度或黏度\nC.温度或黏度；温度或黏度\nD.温度或黏度；黏度", "day": 1}, {"id": 241, "number": 384, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "EPC50 分油机自动控制系统的水分传感器故障而又必_____须分油操作，可\n应急设置参数使装置进入“备用控制”工况，此时将导致_______ 。\n①水分传感器 MT50 功能被禁用；②系统将控制分油机每 15 min 排渣一次；③\nPrl 分油时间设定无效；④排渣过程不加冲洗水和置换水；⑤净油含水量将增加", "options": {"A": "①②③④", "B": "②③④⑤", "C": "①②③⑤", "D": "①③④⑤"}, "answer": "A", "answerText": "①②③④", "raw": "EPC50 分油机自动控制系统的水分传感器故障而又必_____须分油操作，可\n应急设置参数使装置进入“备用控制”工况，此时将导致_______ 。\n①水分传感器 MT50 功能被禁用；②系统将控制分油机每 15 min 排渣一次；③\nPrl 分油时间设定无效；④排渣过程不加冲洗水和置换水；⑤净油含水量将增加\nA.①②③④\nB.②③④⑤\nC.①②③⑤\nD.①③④⑤", "day": 1}, {"id": 242, "number": 385, "chapter": "第一章船舶自动控制基础", "section": "第三节 船舶传感器和执行器（传感器部分）", "stem": "电动差压变送器在日常使用中应注意的事项包括_______ 。\n①切勿用高于 36 V 电压加到变送器上；②切勿用高于 24 V 电压加到变送器\n上；③切勿用硬物碰触膜片；④被测介质不允许结冰；⑤测量蒸汽或其他高温\n介质时，其温度不应超过变送器使用的极限温度", "options": {"A": "①②③④", "B": "②③④⑤", "C": "①②③⑤", "D": "①③④⑤"}, "answer": "D", "answerText": "①③④⑤", "raw": "电动差压变送器在日常使用中应注意的事项包括_______ 。\n①切勿用高于 36 V 电压加到变送器上；②切勿用高于 24 V 电压加到变送器\n上；③切勿用硬物碰触膜片；④被测介质不允许结冰；⑤测量蒸汽或其他高温\n介质时，其温度不应超过变送器使用的极限温度\nA.①②③④\nB.②③④⑤\nC.①②③⑤\nD.①③④⑤", "day": 1}, {"id": 243, "number": 443, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "气动薄膜调节阀在控制系统中属于_______。", "options": {"A": "测量单元", "B": "调节单元", "C": "执行机构", "D": "控制对象"}, "answer": "C", "answerText": "执行机构", "raw": "气动薄膜调节阀在控制系统中属于_______。\nA.测量单元\nB.调节单元\nC.执行机构\nD.控制对象", "day": 1}, {"id": 244, "number": 444, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "气动薄膜调节阀的输入、输出信号分别是_______。", "options": {"A": "位移，位移", "B": "压力，位移", "C": "位移，压力", "D": "压力，压力"}, "answer": "B", "answerText": "压力，位移", "raw": "气动薄膜调节阀的输入、输出信号分别是_______。\nA.位移，位移\nB.压力，位移\nC.位移，压力\nD.压力，压力", "day": 1}, {"id": 245, "number": 445, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "气动薄膜调节阀，可以近似看成_______。\n①比例环节；②微分环节；③积分环节；④惯性环节", "options": {"A": "①", "B": "②", "C": "③", "D": "①④"}, "answer": "A", "answerText": "①", "raw": "气动薄膜调节阀，可以近似看成_______。\n①比例环节；②微分环节；③积分环节；④惯性环节\nA.①\nB.②\nC.③\nD.①④", "day": 1}, {"id": 246, "number": 446, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "对于气关式气动薄膜调节阀，当输入的控制信号增大时，则_______。", "options": {"A": "金属膜片向上弯", "B": "阀杆下移", "C": "调节阀开度增大", "D": "调节阀开度减小"}, "answer": "D", "answerText": "调节阀开度减小", "raw": "对于气关式气动薄膜调节阀，当输入的控制信号增大时，则_______。\nA.金属膜片向上弯\nB.阀杆下移\nC.调节阀开度增大\nD.调节阀开度减小", "day": 1}, {"id": 247, "number": 447, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "在气动反馈控制系统换新备件时不慎将气关式调节阀换成了气开式，则此\n系统的调节效果相当于_______ 控制。", "options": {"A": "开环", "B": "比例", "C": "正反馈", "D": "负反馈"}, "answer": "C", "answerText": "正反馈", "raw": "在气动反馈控制系统换新备件时不慎将气关式调节阀换成了气开式，则此\n系统的调节效果相当于_______ 控制。\nA.开环\nB.比例\nC.正反馈\nD.负反馈", "day": 1}, {"id": 248, "number": 448, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "在采用气关式调节阀调节蒸汽加热水柜水温的反馈控制系统中，若调节器\n发生故障而没有输出，这时被控量将________。", "options": {"A": "保持不变", "B": "达到最小值", "C": "达到最大值", "D": "波动变化"}, "answer": "C", "answerText": "达到最大值", "raw": "在采用气关式调节阀调节蒸汽加热水柜水温的反馈控制系统中，若调节器\n发生故障而没有输出，这时被控量将________。\nA.保持不变\nB.达到最小值\nC.达到最大值\nD.波动变化", "day": 1}, {"id": 249, "number": 449, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "如图所示为带阀门定位器的气动薄膜调节阀结构原理图，从控制器输出的\n压力信号送到定位器的输入端 E，当该信号增大时，推动阀杆 1 ________ 移\n动，杠杆 24 绕支点 F________。", "options": {"A": "向上；逆时针转动", "B": "向下；顺时针转动", "C": "向上；顺时针转动", "D": "向下；逆时针转动"}, "answer": "D", "answerText": "向下；逆时针转动", "raw": "如图所示为带阀门定位器的气动薄膜调节阀结构原理图，从控制器输出的\n压力信号送到定位器的输入端 E，当该信号增大时，推动阀杆 1 ________ 移\n动，杠杆 24 绕支点 F________。\nA.向上；逆时针转动\nB.向下；顺时针转动\nC.向上；顺时针转动\nD.向下；逆时针转动", "day": 1}, {"id": 250, "number": 450, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "如图所示为带阀门定位器的气动薄膜调节阀结构原理图，阀门定位器的作\n用是消除由膜片阀内的阀杆所引起的滞后现象，这种滞后现象是由于___ 造成\n的。", "options": {"A": "填料太紧或流动阻力太大而使其摩擦力过大", "B": "距离远，气压传递信号时延", "C": "电气(I/P)信号转换模块转换耗时", "D": "干扰信号引起的波动"}, "answer": "A", "answerText": "填料太紧或流动阻力太大而使其摩擦力过大", "raw": "如图所示为带阀门定位器的气动薄膜调节阀结构原理图，阀门定位器的作\n用是消除由膜片阀内的阀杆所引起的滞后现象，这种滞后现象是由于___ 造成\n的。\nA. 填料太紧或流动阻力太大而使其摩擦力过大\nB. 距离远，气压传递信号时延\nC. 电气(I/P)信号转换模块转换耗时\nD. 干扰信号引起的波动", "day": 1}, {"id": 251, "number": 451, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "下列关于气动薄膜调节阀的说法，错误的是_______。", "options": {"A": "气动薄膜调节阀是将调节器输出的气动控制信号转换为机械位移", "B": "气动薄膜调节阀具有结构简单、尺寸小、阀杆推力较大等特点", "C": "为使气动薄膜调节阀动作及时，并能准确动作到位，通常需要加装一个阀门\n定位器", "D": "气动薄膜调节阀由气动执行部分和调节阀两部分组成"}, "answer": "B", "answerText": "气动薄膜调节阀具有结构简单、尺寸小、阀杆推力较大等特点", "raw": "下列关于气动薄膜调节阀的说法，错误的是_______。\nA. 气动薄膜调节阀是将调节器输出的气动控制信号转换为机械位移\nB. 气动薄膜调节阀具有结构简单、尺寸小、阀杆推力较大等特点\nC. 为使气动薄膜调节阀动作及时，并能准确动作到位，通常需要加装一个阀门\n定位器\nD. 气动薄膜调节阀由气动执行部分和调节阀两部分组成", "day": 1}, {"id": 252, "number": 452, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "对于气关式气动薄膜调节阀，当输入的控制信号增大时，则_______ 。", "options": {"A": "金属膜片向上弯曲", "B": "调节阀开度减小", "C": "调节阀开度增大", "D": "调节阀杆上移"}, "answer": "B", "answerText": "调节阀开度减小", "raw": "对于气关式气动薄膜调节阀，当输入的控制信号增大时，则_______ 。\nA.金属膜片向上弯曲\nB.调节阀开度减小\nC.调节阀开度增大\nD.调节阀杆上移", "day": 1}, {"id": 253, "number": 453, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "在采用气开式气动薄膜调节阀调节生活热水柜水温的反馈控制系统中，若\n调节器发生故障而没有输出，这时被控量将_______ 。", "options": {"A": "保持不变", "B": "达到最大值", "C": "达到最小值", "D": "不能确定"}, "answer": "C", "answerText": "达到最小值", "raw": "在采用气开式气动薄膜调节阀调节生活热水柜水温的反馈控制系统中，若\n调节器发生故障而没有输出，这时被控量将_______ 。\nA.保持不变\nB.达到最大值\nC.达到最小值\nD.不能确定", "day": 1}, {"id": 254, "number": 454, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "气动薄膜调节阀配用阀门定位器的目的是克服_______。", "options": {"A": "阀杆卡死", "B": "阀杆推力过小", "C": "阀门输入信号不稳", "D": "阀杆所引起的滞后现象"}, "answer": "D", "answerText": "阀杆所引起的滞后现象", "raw": "气动薄膜调节阀配用阀门定位器的目的是克服_______。\nA.阀杆卡死\nB.阀杆推力过小\nC.阀门输入信号不稳\nD.阀杆所引起的滞后现象", "day": 1}, {"id": 255, "number": 455, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "在图中，如分相电容 CF 被击穿，则伺服电机将_______。", "options": {"A": "只能沿正方向转动", "B": "只能沿反方向转动", "C": "正反方向都可转动", "D": "正反方向都不能转动"}, "answer": "D", "answerText": "正反方向都不能转动", "raw": "在图中，如分相电容 CF 被击穿，则伺服电机将_______。\nA.只能沿正方向转动\nB.只能沿反方向转动\nC.正反方向都可转动\nD.正反方向都不能转动", "day": 1}, {"id": 256, "number": 456, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "在下图所示中，可控硅 SCR1 与 SCR2 的作用是________。", "options": {"A": "其中之一导通时控制伺服电机转动", "B": "两只同时导通时控制伺服电机转动", "C": "两只同时都不导通时控制伺服电机转动’", "D": "两只同时导通时控制伺服电机停止"}, "answer": "A", "answerText": "其中之一导通时控制伺服电机转动", "raw": "在下图所示中，可控硅 SCR1 与 SCR2 的作用是________。\nA. 其中之一导通时控制伺服电机转动\nB. 两只同时导通时控制伺服电机转动\nC. 两只同时都不导通时控制伺服电机转动’\nD. 两只同时导通时控制伺服电机停止", "day": 1}, {"id": 257, "number": 457, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "如图所示， 伺服放大器工作中， 当SCR2 导通，SCR1 截止时， 伺服电机的情\n况是_______。", "options": {"A": "一个方向转动", "B": "一个方向断续转动", "C": "等 SCR1 导通后再转动", "D": "等 SCR1 导通后再断续转动"}, "answer": "A", "answerText": "一个方向转动", "raw": "如图所示， 伺服放大器工作中， 当SCR2 导通，SCR1 截止时， 伺服电机的情\n况是_______。\nA. 一个方向转动\nB. 一个方向断续转动\nC. 等 SCR1 导通后再转动\nD. 等 SCR1 导通后再断续转动", "day": 1}, {"id": 258, "number": 458, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "电动执行机构中一般采用___作为执行器的动力部件，将伺服放大器输出的\n电功率转换成机械转矩，以实现自动控制。", "options": {"A": "力矩式自整角机", "B": "控制式自整角机", "C": "旋转变压器", "D": "两相电容异步伺服电机"}, "answer": "D", "answerText": "两相电容异步伺服电机", "raw": "电动执行机构中一般采用___作为执行器的动力部件，将伺服放大器输出的\n电功率转换成机械转矩，以实现自动控制。\nA.力矩式自整角机\nB.控制式自整角机\nC.旋转变压器\nD.两相电容异步伺服电机", "day": 1}, {"id": 259, "number": 459, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "在下图所示中伺服放大器组成电路，当_______ 时，伺服电机停止转动。", "options": {"A": "SCR1 和 SCR2 都不导通", "C": "SCR1 截止，SCR2 导通", "B": "SCR1 导通，SCR2 截止", "D": "SCR1 或 SCR2 任意一只截止"}, "answer": "A", "answerText": "SCR1 和 SCR2 都不导通", "raw": "在下图所示中伺服放大器组成电路，当_______ 时，伺服电机停止转动。\nA. SCR1 和 SCR2 都不导通\nC. SCR1 截止，SCR2 导通\nB. SCR1 导通，SCR2 截止\nD. SCR1 或 SCR2 任意一只截止", "day": 1}, {"id": 260, "number": 466, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "在柴油机气缸冷却水控制系统中， 采用WALTON恒温阀的缺点是________。", "options": {"A": "结构复杂", "B": "维护麻烦", "C": "只能实现位式控制", "D": "控制精度很低"}, "answer": "D", "answerText": "控制精度很低", "raw": "在柴油机气缸冷却水控制系统中， 采用WALTON恒温阀的缺点是________。\nA.结构复杂\nB.维护麻烦\nC.只能实现位式控制\nD.控制精度很低", "day": 1}, {"id": 261, "number": 467, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "WALTON恒温阀属于________作用式，是采用________平衡原理工作的。", "options": {"A": "间接；位移", "B": "间接；力", "C": "直接；力", "D": "直接；位移"}, "answer": "C", "answerText": "直接；力", "raw": "WALTON恒温阀属于________作用式，是采用________平衡原理工作的。\nA.间接；位移\nB.间接；力\nC.直接；力\nD.直接；位移", "day": 1}, {"id": 262, "number": 468, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "在 WALTON型冷却水温度控制系统中，当温度升高时_______。", "options": {"A": "石蜡体积膨胀，旁通阀开大", "B": "石蜡体积膨胀，旁通阀关小", "C": "石蜡体积缩小，旁通阀开大", "D": "石蜡体积缩小，旁通阀关小"}, "answer": "B", "answerText": "石蜡体积膨胀，旁通阀关小", "raw": "在 WALTON型冷却水温度控制系统中，当温度升高时_______。\nA.石蜡体积膨胀，旁通阀开大\nB.石蜡体积膨胀，旁通阀关小\nC.石蜡体积缩小，旁通阀开大\nD.石蜡体积缩小，旁通阀关小", "day": 1}, {"id": 263, "number": 469, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "在 WALTON冷却水温度控制系统中，若柴油机负荷突然降低，则经调节\n后，新稳态值与原稳态值相比_______。", "options": {"A": "略低", "B": "略高", "C": "不变", "D": "不定"}, "answer": "A", "answerText": "略低", "raw": "在 WALTON冷却水温度控制系统中，若柴油机负荷突然降低，则经调节\n后，新稳态值与原稳态值相比_______。\nA.略低\nB.略高\nC.不变\nD.不定", "day": 1}, {"id": 264, "number": 470, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "WALTON型恒温阀能实现_______。", "options": {"A": "双位控制", "B": "比例作用", "C": "PI 作用", "D": "PD 作用"}, "answer": "B", "answerText": "比例作用", "raw": "WALTON型恒温阀能实现_______。\nA.双位控制\nB.比例作用\nC. PI 作用\nD. PD 作用", "day": 1}, {"id": 265, "number": 471, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "如图所示的基本电路，下列叙述正确的是_______ 。", "options": {"A": "在线圈的两端并联的二极管，起到稳压作用", "B": "线路中使用的晶体管是 PNP 型三极管", "C": "控制信号为高电平时，电磁阀有电", "D": "当三极管控制信号失电时，通过电磁阀线圈放电，使得电磁阀迅速得电动作"}, "answer": "C", "answerText": "控制信号为高电平时，电磁阀有电", "raw": "如图所示的基本电路，下列叙述正确的是_______ 。\nA. 在线圈的两端并联的二极管，起到稳压作用\nB. 线路中使用的晶体管是 PNP 型三极管\nC. 控制信号为高电平时，电磁阀有电\nD. 当三极管控制信号失电时，通过电磁阀线圈放电，使得电磁阀迅速得电动作", "day": 1}, {"id": 266, "number": 472, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "在 PI 温度定值控制系统中，若温度的最大动态偏差太大，其原因可能是\n调节器的________。", "options": {"A": "放大倍数太大，比例作用太强", "B": "放大倍数太小，比例作用太弱", "C": "积分时间太小，积分作用太强", "D": "积分时间太大，积分作用太弱"}, "answer": "B", "answerText": "放大倍数太小，比例作用太弱", "raw": "在 PI 温度定值控制系统中，若温度的最大动态偏差太大，其原因可能是\n调节器的________。\nA. 放大倍数太大，比例作用太强\nB. 放大倍数太小，比例作用太弱\nC. 积分时间太小，积分作用太强\nD. 积分时间太大，积分作用太弱", "day": 1}, {"id": 267, "number": 473, "chapter": "第一章船舶自动控制基础", "section": "第三节船舶传感器和执行器（执行器部分）", "stem": "电动冷却水温度控制系统中，若三通调节阀中平板阀卡死在某一位置，其\n故障现象是________。", "options": {"A": "冷却水温度波动变小", "B": "冷却水温度波动加大，但是最后能稳定在给定值上", "C": "限位开关断开", "D": "热保护继电器可能动作，电机停转"}, "answer": "D", "answerText": "热保护继电器可能动作，电机停转", "raw": "电动冷却水温度控制系统中，若三通调节阀中平板阀卡死在某一位置，其\n故障现象是________。\nA. 冷却水温度波动变小\nB. 冷却水温度波动加大，但是最后能稳定在给定值上\nC. 限位开关断开\nD. 热保护继电器可能动作，电机停转", "day": 1}, {"id": 268, "number": 9, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "在金属应变片式压力传感器的测量电桥中，有一个桥臂的电阻 R4 是可调的，\n其作用是 _____ (电桥的输出电压为 u)。", "options": {"A": "调零，当测量压力为 0 时，u 达最小值", "B": "调零，当测量压力为 0 时，u 达最大值", "C": "调量程，当测量压力为满量程时，u 达最大值", "D": "当测量压力不变时，稳定电路输出"}, "answer": "A", "answerText": "调零，当测量压力为 0 时，u 达最小值", "raw": "在金属应变片式压力传感器的测量电桥中，有一个桥臂的电阻 R4 是可调的，\n其作用是 _____ (电桥的输出电压为 u)。\nA.调零，当测量压力为 0 时，u 达最小值\nB.调零，当测量压力为 0 时，u 达最大值\nC.调量程，当测量压力为满量程时，u 达最大值\nD.当测量压力不变时，稳定电路输出", "day": 1}, {"id": 269, "number": 10, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "金属应变片式压力传感器，如果测压管破裂，则压力指示值是________", "options": {"A": "最大值", "B": "最小值", "C": "中间值", "D": "任意值"}, "answer": "B", "answerText": "最小值", "raw": "金属应变片式压力传感器，如果测压管破裂，则压力指示值是________\nA.最大值\nB.最小值\nC.中间值\nD.任意值", "day": 1}, {"id": 270, "number": 11, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "传感器的测量需要定时效验，压力变送器的输出往往是_______", "options": {"A": "电阻值", "B": "电压值", "C": "电流值", "D": "数据通信"}, "answer": "C", "answerText": "电流值", "raw": "传感器的测量需要定时效验，压力变送器的输出往往是_______\nA.电阻值\nB.电压值\nC.电流值\nD.数据通信", "day": 1}, {"id": 271, "number": 12, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "压 力 传感 器 的测量 需 要可 调 压力 源，测 试 时主 要 是测 试压力 变 送器 的\n________。", "options": {"A": "零点与量程", "B": "精度", "C": "灵敏度", "D": "常态下的输出"}, "answer": "A", "answerText": "零点与量程", "raw": "压 力 传感 器 的测量 需 要可 调 压力 源，测 试 时主 要 是测 试压力 变 送器 的\n________。\nA.零点与量程\nB.精度\nC.灵敏度\nD.常态下的输出", "day": 1}, {"id": 272, "number": 13, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "扩散硅压力变送器的使用越来越多，标准输出且大多由环氧树脂密封处理，\n确定其是否正常，通过观察________。", "options": {"A": "其零点和量程是否正确", "B": "当前显示值是否正常", "C": "运行时间", "D": "使用的电源是否正常"}, "answer": "B", "answerText": "当前显示值是否正常", "raw": "扩散硅压力变送器的使用越来越多，标准输出且大多由环氧树脂密封处理，\n确定其是否正常，通过观察________。\nA.其零点和量程是否正确\nB.当前显示值是否正常\nC.运行时间\nD.使用的电源是否正常", "day": 1}, {"id": 273, "number": 14, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "压力变送器的内部电路大多由环氧树脂密封处理， 最多留有_______ 可供调\n整。", "options": {"A": "比例增益", "B": "下降斜率", "C": "零点和量程", "D": "灵敏度和死区"}, "answer": "C", "answerText": "零点和量程", "raw": "压力变送器的内部电路大多由环氧树脂密封处理， 最多留有_______ 可供调\n整。\nA.比例增益\nB.下降斜率\nC.零点和量程\nD.灵敏度和死区", "day": 1}, {"id": 274, "number": 17, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "传感器的测量需要定时校验，Pt100 的最常用检测方法是________", "options": {"A": "测量其 0 度时的阻值", "B": "测量其常温下的阻值", "C": "测量其 100 度时的阻值", "D": "观察显示仪表的温度是否正常"}, "answer": "B", "answerText": "测量其常温下的阻值", "raw": "传感器的测量需要定时校验，Pt100 的最常用检测方法是________\nA.测量其 0 度时的阻值\nB.测量其常温下的阻值\nC.测量其 100 度时的阻值\nD.观察显示仪表的温度是否正常", "day": 1}, {"id": 275, "number": 18, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "传感器的测量需要定时校验，热电偶的最常用检测方法是_______", "options": {"A": "测量其高温时的阻值", "B": "测量其常温下的阻值", "C": "测量其高温时的电动势", "D": "测量其常温下的电动势"}, "answer": "D", "answerText": "测量其常温下的电动势", "raw": "传感器的测量需要定时校验，热电偶的最常用检测方法是_______\nA.测量其高温时的阻值\nB.测量其常温下的阻值\nC.测量其高温时的电动势\nD.测量其常温下的电动势", "day": 1}, {"id": 276, "number": 19, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "传感器的测量需要定时校验，热敏电阻的最常用检测方法是_______", "options": {"A": "测量其高温时的阻值", "B": "测量其常温下的阻值", "C": "测量其常温和高温时的阻值", "D": "观察显示仪表的温度是否正常"}, "answer": "C", "answerText": "测量其常温和高温时的阻值", "raw": "传感器的测量需要定时校验，热敏电阻的最常用检测方法是_______\nA.测量其高温时的阻值\nB.测量其常温下的阻值\nC.测量其常温和高温时的阻值\nD.观察显示仪表的温度是否正常", "day": 1}, {"id": 277, "number": 20, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "温度变送器的内部电路大多由环氧树脂密封处理， 最多留有_______ 可供调\n整。", "options": {"A": "比例增益", "B": "下降斜率", "C": "零点和量程", "D": "灵敏度和死区"}, "answer": "C", "answerText": "零点和量程", "raw": "温度变送器的内部电路大多由环氧树脂密封处理， 最多留有_______ 可供调\n整。\nA.比例增益\nB.下降斜率\nC.零点和量程\nD.灵敏度和死区", "day": 1}, {"id": 278, "number": 21, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "Pt100 温度变送器的输出为 4〜20 mA，使用中通过_______ 来测试。", "options": {"A": "改变被测的实际温度", "B": "使用电阻模拟替代", "C": "环境温度保持不变", "D": "使用电压信号模拟"}, "answer": "B", "answerText": "使用电阻模拟替代", "raw": "Pt100 温度变送器的输出为 4〜20 mA，使用中通过_______ 来测试。\nA.改变被测的实际温度\nB.使用电阻模拟替代\nC.环境温度保持不变\nD.使用电压信号模拟", "day": 1}, {"id": 279, "number": 22, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "热电偶的变送器的输出为 4〜20 mA ，但是正常排温时，其输出值与实际值\n不符，相差较大， 校准方法是 。", "options": {"A": "用电阻器替代进行零点和量程的调校", "B": "用电压信号替代进行零点和量程的调校", "C": "用电动势替代进行当前显示的调校", "D": "仪表上进行零位调校"}, "answer": "B", "answerText": "用电压信号替代进行零点和量程的调校", "raw": "热电偶的变送器的输出为 4〜20 mA ，但是正常排温时，其输出值与实际值\n不符，相差较大， 校准方法是 。\nA.用电阻器替代进行零点和量程的调校\nB.用电压信号替代进行零点和量程的调校\nC.用电动势替代进行当前显示的调校\nD.仪表上进行零位调校", "day": 1}, {"id": 280, "number": 23, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "船上常用的具有负温度系数的热敏电阻传感器，可以用万用表检查其性能。\n出现 现象时，说明该传感器正常。", "options": {"A": "其阻值随温度升高而下降", "B": "其阻值随温度升高而升高", "C": "导线与外壳电阻随温度变化", "D": "其阻值不随温度而变化"}, "answer": "A", "answerText": "其阻值随温度升高而下降", "raw": "船上常用的具有负温度系数的热敏电阻传感器，可以用万用表检查其性能。\n出现 现象时，说明该传感器正常。\nA.其阻值随温度升高而下降\nB.其阻值随温度升高而升高\nC.导线与外壳电阻随温度变化\nD.其阻值不随温度而变化", "day": 1}, {"id": 281, "number": 24, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "船上常用的具有热电偶传感器测量高温，可以用万用表检查其性能。出现\n________现象时，说明该传感器正常。", "options": {"A": "其阻值随温度升高而下降", "B": "其阻值随温度升高而升高", "C": "导线与外壳电阻随温度变化", "D": "其阻值不随温度而变化，基本为零"}, "answer": "D", "answerText": "其阻值不随温度而变化，基本为零", "raw": "船上常用的具有热电偶传感器测量高温，可以用万用表检查其性能。出现\n________现象时，说明该传感器正常。\nA.其阻值随温度升高而下降\nB.其阻值随温度升高而升高\nC.导线与外壳电阻随温度变化\nD.其阻值不随温度而变化，基本为零", "day": 1}, {"id": 282, "number": 25, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "_______ 传感器的原理是基于塞贝克效应，即两种不同的导体或半导体组成\n的一个回路， 其两端互相连接，只要两节点处的温度不同，则回路中就有电流\n产生。", "options": {"A": "热电偶", "B": "压力式温度", "C": "电阻式温度", "D": "液晶式温度"}, "answer": "A", "answerText": "热电偶", "raw": "_______ 传感器的原理是基于塞贝克效应，即两种不同的导体或半导体组成\n的一个回路， 其两端互相连接，只要两节点处的温度不同，则回路中就有电流\n产生。\nA.热电偶\nB.压力式温度\nC.电阻式温度\nD.液晶式温度", "day": 1}, {"id": 283, "number": 26, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "磁脉冲传感器需要使用_______ 来判断安装间距是否合适。", "options": {"A": "脉冲电压", "B": "脉冲频率", "C": "脉冲波形", "D": "脉冲占空比"}, "answer": "C", "answerText": "脉冲波形", "raw": "磁脉冲传感器需要使用_______ 来判断安装间距是否合适。\nA.脉冲电压\nB.脉冲频率\nC.脉冲波形\nD.脉冲占空比", "day": 1}, {"id": 284, "number": 27, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "流量传感器有采用磁感应和信号变送器来实现的， 校正其零点和量程需要通\n过传感器的输出模拟_______来实现", "options": {"A": "电压信号", "B": "电流信号", "C": "频率信号", "D": "波形信号"}, "answer": "A", "answerText": "电压信号", "raw": "流量传感器有采用磁感应和信号变送器来实现的， 校正其零点和量程需要通\n过传感器的输出模拟_______来实现\nA.电压信号\nB.电流信号\nC.频率信号\nD.波形信号", "day": 1}, {"id": 285, "number": 28, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "流量传感器有采用差压变送器来实现的，零点与量程可通过 _______来调节，\n但是输出为中间值时，实际流量偏_______", "options": {"A": "变送器；大", "B": "变送器；小", "C": "传感器本身；大", "D": "传感器本身；一样"}, "answer": "A", "answerText": "变送器；大", "raw": "流量传感器有采用差压变送器来实现的，零点与量程可通过 _______来调节，\n但是输出为中间值时，实际流量偏_______\nA.变送器；大\nB.变送器；小\nC.传感器本身；大\nD.传感器本身；一样", "day": 1}, {"id": 286, "number": 29, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "吹气式液位传感器的量程范围调整是通过节流阀实现的，要求是_______", "options": {"A": "最低液位时，平衡室有微量气泡冒出", "B": "最低液位时，平衡室有大量气泡冒出", "C": "最高液位时，平衡室有微量气泡冒出", "D": "最高液位时，平衡室有大量气泡冒出"}, "answer": "C", "answerText": "最高液位时，平衡室有微量气泡冒出", "raw": "吹气式液位传感器的量程范围调整是通过节流阀实现的，要求是_______\nA.最低液位时，平衡室有微量气泡冒出\nB.最低液位时，平衡室有大量气泡冒出\nC.最高液位时，平衡室有微量气泡冒出\nD.最高液位时，平衡室有大量气泡冒出", "day": 1}, {"id": 287, "number": 30, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "变浮力液位传感器是由_______组成的。", "options": {"A": "浮筒和分压器", "B": "浮筒和测量电桥", "C": "浮筒和调压阀", "D": "浮筒和差动变压器"}, "answer": "D", "answerText": "浮筒和差动变压器", "raw": "变浮力液位传感器是由_______组成的。\nA.浮筒和分压器\nB.浮筒和测量电桥\nC.浮筒和调压阀\nD.浮筒和差动变压器", "day": 1}, {"id": 288, "number": 31, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "在吹气式液位传感器中，如果节流阀中的节流孔堵塞，则平衡室逸出的气泡\n量_______导管的压力_______ ，液位仪表的指示值为________ 。", "options": {"A": "没有；为零；最低液位以下", "B": "没有；最大；最高液位以上", "C": "最多；为零；最低液位以下", "D": "最多；最大；最高液位以上"}, "answer": "A", "answerText": "没有；为零；最低液位以下", "raw": "在吹气式液位传感器中，如果节流阀中的节流孔堵塞，则平衡室逸出的气泡\n量_______导管的压力_______ ，液位仪表的指示值为________ 。\nA.没有；为零；最低液位以下\nB.没有；最大；最高液位以上\nC.最多；为零；最低液位以下\nD.最多；最大；最高液位以上", "day": 1}, {"id": 289, "number": 32, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "船上常用的液位测量方法有 ________①磁脉冲装置；②浮子式；③电极式；\n④静压吹气式；⑤电磁式；⑥参考水位罐式", "options": {"A": "①③④⑤", "B": "②③④⑤", "C": "①②⑤⑥", "D": "②③④⑥"}, "answer": "D", "answerText": "②③④⑥", "raw": "船上常用的液位测量方法有 ________①磁脉冲装置；②浮子式；③电极式；\n④静压吹气式；⑤电磁式；⑥参考水位罐式\nA.①③④⑤\nB.②③④⑤\nC.①②⑤⑥\nD.②③④⑥", "day": 1}, {"id": 290, "number": 33, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "容积式流量传感器的测量原理是________。", "options": {"A": "被测介质流量越大，输出的电脉冲频率越高", "B": "被测介质流量越大，输出的电脉冲频率越低", "C": "被测介质流量越大，输出的电压越高", "D": "被测介质流量越大，输出的电压越低"}, "answer": "A", "answerText": "被测介质流量越大，输出的电脉冲频率越高", "raw": "容积式流量传感器的测量原理是________。\nA.被测介质流量越大，输出的电脉冲频率越高\nB. 被测介质流量越大，输出的电脉冲频率越低\nC. 被测介质流量越大，输出的电压越高\nD. 被测介质流量越大，输出的电压越低", "day": 1}, {"id": 291, "number": 34, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "容积式流量计不能检测的流量是_______ 。", "options": {"A": "辅锅炉的蒸汽流量", "B": "辅锅炉的燃用油流量", "C": "主机燃用油流量", "D": "造水机造水流量"}, "answer": "A", "answerText": "辅锅炉的蒸汽流量", "raw": "容积式流量计不能检测的流量是_______ 。\nA.辅锅炉的蒸汽流量\nB.辅锅炉的燃用油流量\nC.主机燃用油流量\nD.造水机造水流量", "day": 1}, {"id": 292, "number": 35, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "液位传感器的测量方法有很多种，但各种传感器经变换后的输出基本上是\n________", "options": {"A": "电阻值", "B": "电压值", "C": "电流值", "D": "电动势值"}, "answer": "C", "answerText": "电流值", "raw": "液位传感器的测量方法有很多种，但各种传感器经变换后的输出基本上是\n________\nA.电阻值\nB.电压值\nC.电流值\nD.电动势值", "day": 1}, {"id": 293, "number": 36, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "液位传感器用于保护控制时，模拟测试中通常不需要注意的是_______ 。", "options": {"A": "实际液位的变化", "B": "防止过高或过低信号引起设备的保护动作", "C": "输出不能短路或开路", "D": "传感器内部转换电路"}, "answer": "D", "answerText": "传感器内部转换电路", "raw": "液位传感器用于保护控制时，模拟测试中通常不需要注意的是_______ 。\nA.实际液位的变化\nB. 防止过高或过低信号引起设备的保护动作\nC. 输出不能短路或开路\nD.传感器内部转换电路", "day": 1}, {"id": 294, "number": 37, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "液位传感器有采用差压变送器来实现的， 零点与量程可通过_______来调节，\n但是输出为中间值时，实际液位_______ 。", "options": {"A": "变送器；有偏差", "B": "变送器；在中间", "C": "浮子本身；偏大", "D": "浮子本身；偏小"}, "answer": "B", "answerText": "变送器；在中间", "raw": "液位传感器有采用差压变送器来实现的， 零点与量程可通过_______来调节，\n但是输出为中间值时，实际液位_______ 。\nA.变送器；有偏差\nB.变送器；在中间\nC.浮子本身；偏大\nD.浮子本身；偏小", "day": 1}, {"id": 295, "number": 38, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "液位传感器有采用吹气式加差压变送器来实现的， 零点可通过_______ 来调\n节，量程可通过________来调节。", "options": {"A": "变送器；吹气管路节流阀", "B": "变送器；变送器", "C": "吹气管路节流阀；变送器", "D": "传感器；变送器"}, "answer": "B", "answerText": "变送器；变送器", "raw": "液位传感器有采用吹气式加差压变送器来实现的， 零点可通过_______ 来调\n节，量程可通过________来调节。\nA.变送器；吹气管路节流阀\nB.变送器；变送器\nC.吹气管路节流阀；变送器\nD.传感器；变送器", "day": 1}, {"id": 296, "number": 39, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "采用吹气式加差压变送器的液位传感器， 当液位最高时， 吹气管路_______ ，\n零点可通过 变送器来调节。", "options": {"A": "刚好没流量", "B": "有较大流量", "C": "有小流量", "D": "有最大流量"}, "answer": "C", "answerText": "有小流量", "raw": "采用吹气式加差压变送器的液位传感器， 当液位最高时， 吹气管路_______ ，\n零点可通过 变送器来调节。\nA.刚好没流量\nB.有较大流量\nC.有小流量\nD.有最大流量", "day": 1}, {"id": 297, "number": 40, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "液位传感器检测油舱液位时常采用气动静压式压力变送器，当最低位时，变\n送器的输出应为________，否则需调整 。", "options": {"A": "0.02 MPa；变送器的零点", "B": "0.02 MPa；变送器的零点和量程", "C": "0.1 MPa；变送器的零点", "D": "0.1 MPa；变送器的零点和量程"}, "answer": "B", "answerText": "0.02 MPa；变送器的零点和量程", "raw": "液位传感器检测油舱液位时常采用气动静压式压力变送器，当最低位时，变\n送器的输出应为________，否则需调整 。\nA. 0.02 MPa；变送器的零点\nB.0.02 MPa；变送器的零点和量程\nC. 0.1 MPa；变送器的零点\nD. 0.1 MPa；变送器的零点和量程", "day": 1}, {"id": 298, "number": 41, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "液位传感器检测油舱液位时常采用雷达测深，液位最高时，雷达测到的距离\n_______ ，应该调整雷达测深的_______ 。", "options": {"A": "最小；零点", "B": "最小；零点和量程", "C": "最大；量程", "D": "最大；零点和量程"}, "answer": "B", "answerText": "最小；零点和量程", "raw": "液位传感器检测油舱液位时常采用雷达测深，液位最高时，雷达测到的距离\n_______ ，应该调整雷达测深的_______ 。\nA.最小；零点\nB.最小；零点和量程\nC.最大；量程\nD.最大；零点和量程", "day": 1}, {"id": 299, "number": 42, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "主机转动时，齿顶和齿谷交替经过，引起磁脉冲测速装置线圈内的磁通交替\n变化， 使线圈感应出一系列脉冲信号。 磁脉冲测速装置可用_______ 分别表示转\n速大小和转向的信号。", "options": {"A": "脉冲幅值和极性", "B": "脉冲幅值和相位", "C": "脉冲频率和相位", "D": "脉冲频率和极性"}, "answer": "C", "answerText": "脉冲频率和相位", "raw": "主机转动时，齿顶和齿谷交替经过，引起磁脉冲测速装置线圈内的磁通交替\n变化， 使线圈感应出一系列脉冲信号。 磁脉冲测速装置可用_______ 分别表示转\n速大小和转向的信号。\nA.脉冲幅值和极性\nB.脉冲幅值和相位\nC.脉冲频率和相位\nD.脉冲频率和极性", "day": 1}, {"id": 300, "number": 43, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "用脉冲式转速传感器检测主机转速和转向时，若将两个传感器位置颠倒，则\n_______ 。", "options": {"A": "转速表指示转速偏低，转向与主机相反", "B": "转速表指示转速偏低，转向与主机相同", "C": "转速表指示与主机相同，转向与主机相同", "D": "转速表指示与主机相同，转向与主机相反"}, "answer": "D", "answerText": "转速表指示与主机相同，转向与主机相反", "raw": "用脉冲式转速传感器检测主机转速和转向时，若将两个传感器位置颠倒，则\n_______ 。\nA.转速表指示转速偏低，转向与主机相反\nB.转速表指示转速偏低，转向与主机相同\nC.转速表指示与主机相同，转向与主机相同\nD.转速表指示与主机相同，转向与主机相反", "day": 1}, {"id": 301, "number": 44, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "用磁脉冲传感器检测主机转速与转向时，需安装两个磁头，且它们之间错位\n1/4 齿距。 若将两个磁头相距为1/4 齿距改为 3/4 齿距， 其他条件不变， 则检测结\n果为_______ 。", "options": {"A": "转速大小相同，转向相同", "B": "转速大小相同，转向相反", "C": "转速大小不同，转向相同", "D": "转速大小不同，转向相反"}, "answer": "B", "answerText": "转速大小相同，转向相反", "raw": "用磁脉冲传感器检测主机转速与转向时，需安装两个磁头，且它们之间错位\n1/4 齿距。 若将两个磁头相距为1/4 齿距改为 3/4 齿距， 其他条件不变， 则检测结\n果为_______ 。\nA.转速大小相同，转向相同\nB.转速大小相同，转向相反\nC.转速大小不同，转向相同\nD.转速大小不同，转向相反", "day": 1}, {"id": 302, "number": 45, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "关于磁脉冲式测速装置， 说法正确的是_______ 。 ①磁脉冲式测速装置可以\n用来检测柴油机的转速和转向；②磁脉冲式测速装置是一种非接触式测速装置；\n③磁脉冲式测速装置需要同安装在飞轮上的测速齿轮配合才能完成转速的测量；\n④磁脉冲式测速装置和测速发电机一样， 输出信号都要经过整流才能保证馈送到\n电子调速器的信号是负反馈信号", "options": {"A": "①③④", "B": "②③④", "C": "①②③", "D": "①②④"}, "answer": "C", "answerText": "①②③", "raw": "关于磁脉冲式测速装置， 说法正确的是_______ 。 ①磁脉冲式测速装置可以\n用来检测柴油机的转速和转向；②磁脉冲式测速装置是一种非接触式测速装置；\n③磁脉冲式测速装置需要同安装在飞轮上的测速齿轮配合才能完成转速的测量；\n④磁脉冲式测速装置和测速发电机一样， 输出信号都要经过整流才能保证馈送到\n电子调速器的信号是负反馈信号\nA.①③④\nB.②③④\nC.①②③\nD.①②④", "day": 1}, {"id": 303, "number": 46, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "磁脉冲式测速装置检测柴油机转向是通过_______ 。", "options": {"A": "对磁脉冲测速装置的输出电压进行相敏整流来检测柴油机转向的", "B": "安装两个不同位置的磁脉冲探头， 检测两者的脉冲相位差达到鉴别转向的目的", "C": "根据磁脉冲测速装置输出的电动势的方向来检测转向的", "D": "磁脉冲式测速装置无法检测柴油机的转向，需通过其他附加的装置来完成"}, "answer": "B", "answerText": "安装两个不同位置的磁脉冲探头， 检测两者的脉冲相位差达到鉴别转向的目的", "raw": "磁脉冲式测速装置检测柴油机转向是通过_______ 。\nA.对磁脉冲测速装置的输出电压进行相敏整流来检测柴油机转向的\nB.安装两个不同位置的磁脉冲探头， 检测两者的脉冲相位差达到鉴别转向的目的\nC.根据磁脉冲测速装置输出的电动势的方向来检测转向的\nD.磁脉冲式测速装置无法检测柴油机的转向，需通过其他附加的装置来完成", "day": 1}, {"id": 304, "number": 47, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "如下图所示，用脉冲式转速传感器检测主机转速时，若 0 保持 1 信号，表示\n________。", "options": {"A": "主机处于正车运行", "B": "主机处于倒车运行", "C": "主机处于停车状态", "D": "主机处于备车状态"}, "answer": "B", "answerText": "主机处于倒车运行", "raw": "如下图所示，用脉冲式转速传感器检测主机转速时，若 0 保持 1 信号，表示\n________。\nA.主机处于正车运行\nB. 主机处于倒车运行\nC.主机处于停车状态\nD.主机处于备车状态", "day": 1}, {"id": 305, "number": 48, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "常用监测船舶柴油发电机转速的非接触式转速传感器是_______", "options": {"A": "磁电脉冲式", "B": "交流测速发电机式", "C": "直流测速发电机式", "D": "离心式"}, "answer": "A", "answerText": "磁电脉冲式", "raw": "常用监测船舶柴油发电机转速的非接触式转速传感器是_______\nA.磁电脉冲式\nB.交流测速发电机式\nC.直流测速发电机式\nD.离心式", "day": 1}, {"id": 306, "number": 49, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "在用磁脉冲传感器检测主机转向中，两个磁头布置的位置要相差_______", "options": {"A": "1/4 个齿距", "B": "1/2 个齿距", "C": "1 个齿距", "D": "2 个齿距"}, "answer": "A", "answerText": "1/4 个齿距", "raw": "在用磁脉冲传感器检测主机转向中，两个磁头布置的位置要相差_______\nA. 1/4 个齿距\nB. 1/2 个齿距\nC. 1 个齿距\nD. 2 个齿距", "day": 1}, {"id": 307, "number": 50, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "采用磁脉冲传感器检测主机转速时， 如果大齿轮共有60 个齿， 且在60 r/mm\n时，频率电压 转换器输出的电压为 5 V，那么在 90 \"min 时，磁感应电势的频率\n是_______ ，频率电压转换器输出的电压值是________", "options": {"A": "90Hz；7.5V", "B": "60Hz；7.5 V", "C": "60 Hz；9 V", "D": "90 Hz；9 V"}, "answer": "A", "answerText": "90Hz；7.5V", "raw": "采用磁脉冲传感器检测主机转速时， 如果大齿轮共有60 个齿， 且在60 r/mm\n时，频率电压 转换器输出的电压为 5 V，那么在 90 \"min 时，磁感应电势的频率\n是_______ ，频率电压转换器输出的电压值是________\nA. 90Hz；7.5V\nB. 60Hz；7.5 V\nC. 60 Hz；9 V\nD. 90 Hz；9 V", "day": 1}, {"id": 308, "number": 51, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "在用磁脉冲传感器检测主机转速时，若主机在高速时测量准确，在低速时测\n量值不稳定，其原因可能是________", "options": {"A": "磁头与齿顶之间间隙过小", "B": "磁头与齿顶之间间隙过大", "C": "由于船舶振荡引起", "D": "外界干扰信号引起"}, "answer": "B", "answerText": "磁头与齿顶之间间隙过大", "raw": "在用磁脉冲传感器检测主机转速时，若主机在高速时测量准确，在低速时测\n量值不稳定，其原因可能是________\nA.磁头与齿顶之间间隙过小\nB.磁头与齿顶之间间隙过大\nC.由于船舶振荡引起\nD.外界干扰信号引起", "day": 1}, {"id": 309, "number": 52, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "测量主机转速时，在下列选项中通常采用的有_______ 测速计。", "options": {"A": "离心式", "B": "磁力式", "C": "磁脉冲式", "D": "机械式"}, "answer": "C", "answerText": "磁脉冲式", "raw": "测量主机转速时，在下列选项中通常采用的有_______ 测速计。\nA.离心式\nB.磁力式\nC.磁脉冲式\nD.机械式", "day": 1}, {"id": 310, "number": 53, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "交流测速发电机设置相敏整流的目的是_______", "options": {"A": "判断电流方向", "B": "判断主机转向", "C": "测量主机转速", "D": "测量主机曲轴角速度"}, "answer": "B", "answerText": "判断主机转向", "raw": "交流测速发电机设置相敏整流的目的是_______\nA.判断电流方向\nB.判断主机转向\nC.测量主机转速\nD.测量主机曲轴角速度", "day": 1}, {"id": 311, "number": 54, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "磁脉冲传感器检测转速的特点是_______", "options": {"A": "非接触式，无相对摩擦部件，检测精度高", "B": "非接触式，有相对摩擦部件，检测精度高", "C": "接触式，无相对摩擦部件，检测精度不高", "D": "接触式，有相对摩擦部件，检测精度不高"}, "answer": "A", "answerText": "非接触式，无相对摩擦部件，检测精度高", "raw": "磁脉冲传感器检测转速的特点是_______\nA.非接触式，无相对摩擦部件，检测精度高\nB.非接触式，有相对摩擦部件，检测精度高\nC.接触式，无相对摩擦部件，检测精度不高\nD.接触式，有相对摩擦部件，检测精度不高", "day": 1}, {"id": 312, "number": 55, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "在磁脉冲传感器的转换电路中，单稳态触发电路的作用是_______", "options": {"A": "输出幅值与宽度均与转速成比例的矩形波", "B": "输出宽度不变，幅值与转速成比例的矩形波", "C": "输出幅值不变，宽度与转速成比例的矩形波", "D": "输出幅值与宽度均为恒定的矩形波，单位时间矩形波密度与转速成比例"}, "answer": "D", "answerText": "输出幅值与宽度均为恒定的矩形波，单位时间矩形波密度与转速成比例", "raw": "在磁脉冲传感器的转换电路中，单稳态触发电路的作用是_______\nA.输出幅值与宽度均与转速成比例的矩形波\nB.输出宽度不变，幅值与转速成比例的矩形波\nC.输出幅值不变，宽度与转速成比例的矩形波\nD.输出幅值与宽度均为恒定的矩形波，单位时间矩形波密度与转速成比例", "day": 1}, {"id": 313, "number": 56, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "测速传感器使用测速发电机，检修时发现该发电机只有两根线，可初步判断\n这是________", "options": {"A": "直流测速发电机", "B": "同步测速发电机", "C": "异步测速发电机", "D": "自整角机"}, "answer": "A", "answerText": "直流测速发电机", "raw": "测速传感器使用测速发电机，检修时发现该发电机只有两根线，可初步判断\n这是________\nA.直流测速发电机\nB.同步测速发电机\nC.异步测速发电机\nD.自整角机", "day": 1}, {"id": 314, "number": 57, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "传统柴油机上自带测速传感器来实现显示和保护，显示是否准确，可以通过\n_______ 来判断。", "options": {"A": "发动机声音", "B": "手持转速计", "C": "万用表测信号", "D": "自整角机的角度"}, "answer": "B", "answerText": "手持转速计", "raw": "传统柴油机上自带测速传感器来实现显示和保护，显示是否准确，可以通过\n_______ 来判断。\nA.发动机声音\nB.手持转速计\nC.万用表测信号\nD.自整角机的角度", "day": 1}, {"id": 315, "number": 58, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "发电柴油机上自带测速传感器来实现显示和保护，显示是否准确，可以通过\n观察________ 来判断。", "options": {"A": "发电机频率", "B": "发电机电压", "C": "万用表测信号", "D": "信号的波形"}, "answer": "A", "answerText": "发电机频率", "raw": "发电柴油机上自带测速传感器来实现显示和保护，显示是否准确，可以通过\n观察________ 来判断。\nA.发电机频率\nB.发电机电压\nC.万用表测信号\nD.信号的波形", "day": 1}, {"id": 316, "number": 59, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "现代船舶柴油机上自带测速传感器常用_______来实现， 其________ 与转速\n成比例。", "options": {"A": "磁脉冲感应装置；波形", "B": "磁脉冲感应装置；相位", "C": "编码器；波形", "D": "编码器；频率"}, "answer": "A", "answerText": "磁脉冲感应装置；波形", "raw": "现代船舶柴油机上自带测速传感器常用_______来实现， 其________ 与转速\n成比例。\nA.磁脉冲感应装置；波形\nB.磁脉冲感应装置；相位\nC.编码器；波形\nD.编码器；频率", "day": 1}, {"id": 317, "number": 60, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "现代船舶柴油机上自带测速传感器常用磁脉冲感应装置来实现， 但在磁脉冲\n感应装置_______时，频率偏低。", "options": {"A": "安装间距过大", "B": "安装间距过小", "C": "齿顶宽度过大", "D": "齿顶宽度过小"}, "answer": "A", "answerText": "安装间距过大", "raw": "现代船舶柴油机上自带测速传感器常用磁脉冲感应装置来实现， 但在磁脉冲\n感应装置_______时，频率偏低。\nA.安装间距过大\nB.安装间距过小\nC.齿顶宽度过大\nD.齿顶宽度过小", "day": 1}, {"id": 318, "number": 61, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "现代船舶柴油机上自带测速传感器常用磁脉冲感应装置来实现， 在做超速保\n护试验时，通常是________", "options": {"A": "加速柴油机至超速", "B": "减小磁脉冲感应装置的安装间距", "C": "调整一周齿数的设定值来模拟提高转速测量值", "D": "调小超速设定值，加上增加柴油机实际转速，然后再调回去"}, "answer": "D", "answerText": "调小超速设定值，加上增加柴油机实际转速，然后再调回去", "raw": "现代船舶柴油机上自带测速传感器常用磁脉冲感应装置来实现， 在做超速保\n护试验时，通常是________\nA.加速柴油机至超速\nB.减小磁脉冲感应装置的安装间距\nC.调整一周齿数的设定值来模拟提高转速测量值\nD.调小超速设定值，加上增加柴油机实际转速，然后再调回去", "day": 1}, {"id": 319, "number": 62, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "如图为磁脉冲式转速传感器，为了检测主机的转向，需安装两个磁头，且它\n们之间错位 _______ 齿距， 使两个磁头所产生的脉冲信号在相位上相差_______\n周期。", "options": {"A": "1/2；1/2", "B": "1/4；1/2", "C": "1/2； 1/4", "D": "1/4； 1/4"}, "answer": "D", "answerText": "1/4； 1/4", "raw": "如图为磁脉冲式转速传感器，为了检测主机的转向，需安装两个磁头，且它\n们之间错位 _______ 齿距， 使两个磁头所产生的脉冲信号在相位上相差_______\n周期。\nA. 1/2；1/2\nB. 1/4；1/2\nC. 1/2； 1/4\nD. 1/4； 1/4", "day": 1}, {"id": 320, "number": 63, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "如图为磁脉冲式转速传感器，为了检测主机的转向，需安装两个磁头，当齿\n轮沿正车方向转动时，D 型触发器 D 端的正脉冲总比 CP 端____ 周期。", "options": {"A": "超前 1/2", "B": "超前 1/4", "C": "滞后 1/2", "D": "滞后 1/4"}, "answer": "B", "answerText": "超前 1/4", "raw": "如图为磁脉冲式转速传感器，为了检测主机的转向，需安装两个磁头，当齿\n轮沿正车方向转动时，D 型触发器 D 端的正脉冲总比 CP 端____ 周期。\nA.超前 1/2\nB.超前 1/4\nC.滞后 1/2\nD.滞后 1/4", "day": 1}, {"id": 321, "number": 64, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "磁电式传感器测量转速时，是通过_______ 原理实现的。", "options": {"A": "塞贝克效应", "B": "位移平衡", "C": "电磁感应", "D": "电磁振荡"}, "answer": "C", "answerText": "电磁感应", "raw": "磁电式传感器测量转速时，是通过_______ 原理实现的。\nA.塞贝克效应\nB.位移平衡\nC.电磁感应\nD.电磁振荡", "day": 1}, {"id": 322, "number": 65, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "关于磁脉冲式转速传感器，正确的说法是________", "options": {"A": "磁脉冲传感器输出的脉冲近似三角波", "B": "磁脉冲传感器输出的脉冲近似正弦波", "C": "用感应电势的频率反映转速的高低", "D": "用感应电势的幅值反映转速的高低"}, "answer": "C", "answerText": "用感应电势的频率反映转速的高低", "raw": "关于磁脉冲式转速传感器，正确的说法是________\nA.磁脉冲传感器输出的脉冲近似三角波\nB.磁脉冲传感器输出的脉冲近似正弦波\nC.用感应电势的频率反映转速的高低\nD.用感应电势的幅值反映转速的高低", "day": 1}, {"id": 323, "number": 66, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "在船舶上，可以用磁脉冲传感器检测________", "options": {"A": "流量", "B": "液位", "C": "二氧化碳含量", "D": "扭矩"}, "answer": "D", "answerText": "扭矩", "raw": "在船舶上，可以用磁脉冲传感器检测________\nA.流量\nB.液位\nC.二氧化碳含量\nD.扭矩", "day": 1}, {"id": 324, "number": 67, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "现代黏度传感器基于流动燃油的黏性对钟摆的旋转振动有阻尼作用来实现，\n转换将检测到的信号转换为 4〜20 mA，对应的黏度为________", "options": {"A": "4〜40cSt", "B": "0〜20cSt", "C": "0〜50cSt", "D": "0〜10cSt"}, "answer": "C", "answerText": "0〜50cSt", "raw": "现代黏度传感器基于流动燃油的黏性对钟摆的旋转振动有阻尼作用来实现，\n转换将检测到的信号转换为 4〜20 mA，对应的黏度为________\nA. 4〜40cSt\nB. 0〜20cSt\nC. 0〜50cSt\nD. 0〜10cSt", "day": 1}, {"id": 325, "number": 68, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "现代黏度传感器将检测到的信号转换为 4~20 mA ，分别采用_______ 进行零\n点与量程的测试。", "options": {"A": "黏度为 0 和黏度为 50cSt 的样品燃油", "B": "对应黏度为 0 和黏度为 20 cSt 的燃油温度控制值", "C": "对应黏度为 0 和黏度为 20 cSt 的滑油温度控制值", "D": "黏度为 0 和黏度为 50 cSt 的样品滑油"}, "answer": "A", "answerText": "黏度为 0 和黏度为 50cSt 的样品燃油", "raw": "现代黏度传感器将检测到的信号转换为 4~20 mA ，分别采用_______ 进行零\n点与量程的测试。\nA.黏度为 0 和黏度为 50cSt 的样品燃油\nB.对应黏度为 0 和黏度为 20 cSt 的燃油温度控制值\nC.对应黏度为 0 和黏度为 20 cSt 的滑油温度控制值\nD.黏度为 0 和黏度为 50 cSt 的样品滑油", "day": 1}, {"id": 326, "number": 69, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "EVT20 黏度传感器还内置 Ptl00，其作用是_______ 。", "options": {"A": "黏度控制失效时，可选温度控制", "B": "黏度为检测值需要使用的温度校正", "C": "对应黏度 50 cSt 所需的补偿值", "D": "是黏度检测的后备，当黏度失效时，可根据温度值推算黏度值"}, "answer": "B", "answerText": "黏度为检测值需要使用的温度校正", "raw": "EVT20 黏度传感器还内置 Ptl00，其作用是_______ 。\nA.黏度控制失效时，可选温度控制\nB.黏度为检测值需要使用的温度校正\nC.对应黏度 50 cSt 所需的补偿值\nD.是黏度检测的后备，当黏度失效时，可根据温度值推算黏度值", "day": 1}, {"id": 327, "number": 70, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "在 FCM 系统中，将 EVT-20 的电路板安装在 EPC-50B 主控制板上，正常情\n况下，黏度传感器电路板上显示的是________。", "options": {"A": "黏度值", "B": "传感器的状态", "C": "传感器的故障代码", "D": "传感器的硬件状态"}, "answer": "B", "answerText": "传感器的状态", "raw": "在 FCM 系统中，将 EVT-20 的电路板安装在 EPC-50B 主控制板上，正常情\n况下，黏度传感器电路板上显示的是________。\nA.黏度值\nB.传感器的状态\nC.传感器的故障代码\nD.传感器的硬件状态", "day": 1}, {"id": 328, "number": 71, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "EVT20 黏度传感器的工作原理是基于流动燃油的黏性对钟摆的旋转振动有阻\n尼作用，该阻尼与黏度的_______ 成比例。", "options": {"A": "平方根", "B": "平方", "C": "立方", "D": "一次方"}, "answer": "A", "answerText": "平方根", "raw": "EVT20 黏度传感器的工作原理是基于流动燃油的黏性对钟摆的旋转振动有阻\n尼作用，该阻尼与黏度的_______ 成比例。\nA.平方根\nB.平方\nC.立方\nD. 一次方", "day": 1}, {"id": 329, "number": 72, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "EVT20 黏度传感器，当由于燃油系统夹杂有空气而导致黏度信号太低时，应\n该_______ 来消除故障现象。", "options": {"A": "降低燃油管路油温", "B": "增加燃油管路油温", "C": "提高燃油管路供油泵转速", "D": "系统排气"}, "answer": "D", "answerText": "系统排气", "raw": "EVT20 黏度传感器，当由于燃油系统夹杂有空气而导致黏度信号太低时，应\n该_______ 来消除故障现象。\nA.降低燃油管路油温\nB.增加燃油管路油温\nC.提高燃油管路供油泵转速\nD.系统排气", "day": 1}, {"id": 330, "number": 73, "chapter": "第一章船舶自动控制基础", "section": "第五节 校准和调整变送器和控制器（传感器使用）", "stem": "EVT20 黏度传感器，会导致无黏度信号的可能原因是 EVT-20 没有电源或者\n故障、电流接头损坏、________。", "options": {"A": "燃油加热器蒸汽流量低", "B": "起动期间燃油温度太低", "C": "空气夹杂在燃油系统中", "D": "燃油管路泵压低"}, "answer": "C", "answerText": "空气夹杂在燃油系统中", "raw": "EVT20 黏度传感器，会导致无黏度信号的可能原因是 EVT-20 没有电源或者\n故障、电流接头损坏、________。\nA.燃油加热器蒸汽流量低\nB.起动期间燃油温度太低\nC.空气夹杂在燃油系统中\nD.燃油管路泵压低", "day": 1}, {"id": 331, "number": 367, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "气动差压变送器（标准气压信号为 0.02~0.1 MPa）的零点是指________。", "options": {"A": "变送器输出为 0 时的输入值", "B": "变送器输入为 0.02 MPa 时的输出值", "C": "变送器输出为 0.02 MPa 时的输入值", "D": "变送器输入为 0 时的输出值"}, "answer": "C", "answerText": "变送器输出为 0.02 MPa 时的输入值", "raw": "气动差压变送器（标准气压信号为 0.02~0.1 MPa）的零点是指________。\nA. 变送器输出为 0 时的输入值\nB. 变送器输入为 0.02 MPa 时的输出值\nC. 变送器输出为 0.02 MPa 时的输入值\nD. 变送器输入为 0 时的输出值", "day": 2}, {"id": 332, "number": 368, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "若要减小 QBC 型单杠杆差压变送器的量程，则应_______ 。", "options": {"A": "上移反馈波纹管", "B": "进行正迁移", "C": "下移反馈波纹管", "D": "进行负迁移"}, "answer": "C", "answerText": "下移反馈波纹管", "raw": "若要减小 QBC 型单杠杆差压变送器的量程，则应_______ 。\nA.上移反馈波纹管\nB.进行正迁移\nC.下移反馈波纹管\nD.进行负迁移", "day": 2}, {"id": 333, "number": 0, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "1 MPa） 如图所示， 零点调好后， 增大输入压力， 当P 入=0.9 MPa 时，P 出=0.1MPa。\n为使量程符合要求，应当______。", "options": {"A": "下移 10", "B": "调整 8 使挡板离开喷嘴一点", "C": "上移 10", "D": "调整 8 使挡板靠近喷嘴一点"}, "answer": "C", "answerText": "上移 10", "raw": "1 MPa） 如图所示， 零点调好后， 增大输入压力， 当P 入=0.9 MPa 时，P 出=0.1MPa。\n为使量程符合要求，应当______。\nA.下移 10\nB.调整 8 使挡板离开喷嘴一点\nC.上移 10\nD.调整 8 使挡板靠近喷嘴一点", "day": 2}, {"id": 334, "number": 370, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "有一台量程为 20〜100 度的 QBC 单杠杆差压变送器（标准气压信号为 0.02\n〜0.1MPa） 如图所示， 在测试时得到的数据为输入20°C 时 P 出=0.02MPa， 100°C\n时 P 出=0.09 MPa，应当首先调节_______ 。", "options": {"A": "上移 10", "B": "下移 10", "C": "调整 8，使挡板离开喷嘴", "D": "调整 8，使挡板靠近喷嘴"}, "answer": "B", "answerText": "下移 10", "raw": "有一台量程为 20〜100 度的 QBC 单杠杆差压变送器（标准气压信号为 0.02\n〜0.1MPa） 如图所示， 在测试时得到的数据为输入20°C 时 P 出=0.02MPa， 100°C\n时 P 出=0.09 MPa，应当首先调节_______ 。\nA.上移 10\nB.下移 10\nC.调整 8，使挡板离开喷嘴\nD.调整 8，使挡板靠近喷嘴", "day": 2}, {"id": 335, "number": 371, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "QBC 型单杠杆差压变送器调零和调量程时，错误的做法是______。", "options": {"A": "输入为零时，应使输出为 0.02 MPa", "B": "先调零点再调量程，并反复多次", "C": "扩大量程时应上移反馈波纹管", "D": "先调量程再调零点，反复多次"}, "answer": "D", "answerText": "先调量程再调零点，反复多次", "raw": "QBC 型单杠杆差压变送器调零和调量程时，错误的做法是______。\nA. 输入为零时，应使输出为 0.02 MPa\nB. 先调零点再调量程，并反复多次\nC. 扩大量程时应上移反馈波纹管\nD. 先调量程再调零点，反复多次", "day": 2}, {"id": 336, "number": 372, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "若测量压力 p 的范围是 0.6~ 1.0 MPa， 而选用的压力变送器的量程为0〜1.0\nMPa，这需要对变送器进行迁移，迁移后的零点为_______ 。", "options": {"A": "p= -0.6 MPa", "B": "p = 0", "C": "p=0.6 MPa", "D": "p = 1.0MPa"}, "answer": "C", "answerText": "p=0.6 MPa", "raw": "若测量压力 p 的范围是 0.6~ 1.0 MPa， 而选用的压力变送器的量程为0〜1.0\nMPa，这需要对变送器进行迁移，迁移后的零点为_______ 。\nA. p= -0.6 MPa\nB. p = 0\nC. p=0.6 MPa\nD. p = 1.0MPa", "day": 2}, {"id": 337, "number": 373, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "对变送器迁移的正确理解是_____ 。\n①迁移后量程起点改变；②迁移后量程终点不变；③迁移后量程终点改变；④迁\n移后量程不变；⑤迁移后量程改变", "options": {"A": "①②", "B": "①③④", "C": "①③⑤", "D": "②⑤"}, "answer": "B", "answerText": "①③④", "raw": "对变送器迁移的正确理解是_____ 。\n①迁移后量程起点改变；②迁移后量程终点不变；③迁移后量程终点改变；④迁\n移后量程不变；⑤迁移后量程改变\nA.①②\nB.①③④\nC.①③⑤\nD.②⑤", "day": 2}, {"id": 338, "number": 374, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "现要测量的温度范围是 40-100 °. 选用的温度变送器的量程是 0〜100°.，这\n时需要对变送器进行迁移，迁移后的零点是_______ 。", "options": {"A": "100 °C", "B": "40 °C", "C": "0 °C", "D": "-40 °C"}, "answer": "B", "answerText": "40 °C", "raw": "现要测量的温度范围是 40-100 °. 选用的温度变送器的量程是 0〜100°.，这\n时需要对变送器进行迁移，迁移后的零点是_______ 。\nA. 100 °C\nB. 40 °C\nC. 0 °C\nD. -40 °C", "day": 2}, {"id": 339, "number": 375, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "现有一台 0~ 1.0 MPa 量程的差压变送器，打算测量 0.2〜1.0 MPa 的压力信\n号，其调节方法是________。", "options": {"A": "减小其量程为 0-0.8 MPa，再进行正迁移 0.2 MPa", "B": "减小其量程为 0~0.4 MPa，再进行正迁移 0.6 MPa", "C": "减小其量程为 0~0.8 MPa，再进行负迁移 0.2 MPa", "D": "减小其量程为 0〜0.4 MPa，再进行负迁移 0.6 MPa"}, "answer": "A", "answerText": "减小其量程为 0-0.8 MPa，再进行正迁移 0.2 MPa", "raw": "现有一台 0~ 1.0 MPa 量程的差压变送器，打算测量 0.2〜1.0 MPa 的压力信\n号，其调节方法是________。\nA. 减小其量程为 0-0.8 MPa，再进行正迁移 0.2 MPa\nB. 减小其量程为 0~0.4 MPa，再进行正迁移 0.6 MPa\nC. 减小其量程为 0~0.8 MPa，再进行负迁移 0.2 MPa\nD. 减小其量程为 0〜0.4 MPa，再进行负迁移 0.6 MPa", "day": 2}, {"id": 340, "number": 376, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "有一台量程为 0〜0.6 MPa 的压力变送器，现要测量 1.0~ 1.6 MPa 的压力信\n号，需对变送器进行迁移，其迁移量为_______ 及迁移方向为________。", "options": {"A": "1.0 MPa；正迁移", "B": "-1.6 MPa；正迁移", "C": "1.6 MPa；负迁移", "D": "-1.0 MPa；负迁移"}, "answer": "A", "answerText": "1.0 MPa；正迁移", "raw": "有一台量程为 0〜0.6 MPa 的压力变送器，现要测量 1.0~ 1.6 MPa 的压力信\n号，需对变送器进行迁移，其迁移量为_______ 及迁移方向为________。\nA. 1.0 MPa；正迁移\nB. -1.6 MPa；正迁移\nC. 1.6 MPa；负迁移\nD. -1.0 MPa；负迁移", "day": 2}, {"id": 341, "number": 377, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "现有一台 0-1.0 MPa 量程的差压变送器，打算测量 0.6〜1.0 MPa 的差压信\n号，其调节方法是 _____。", "options": {"A": "减小其量程为 0〜0.6 MPa，再正迁移 1.0 MPa", "B": "减小其量程为 0~0.4 MPa，再正迁移 0.6 MPa", "C": "减小其量程为 0〜0.6 MPa，再负迁移 1.0 MPa", "D": "减小其量程为 0〜0.4 MPa，再负迁移 0.6 MPa"}, "answer": "B", "answerText": "减小其量程为 0~0.4 MPa，再正迁移 0.6 MPa", "raw": "现有一台 0-1.0 MPa 量程的差压变送器，打算测量 0.6〜1.0 M  和\n振荡周期 Ts\nC. 切除比例、微分作用，调节积分时间 4 使出现等幅振荡，记录 Ti 和振荡周期\nTs\nD. 切除比例、微分作用，调节积分时间 Ti 使动态过程符合 4:1 衰减比，记录 Ti\n和振荡周期 Ts", "day": 2}, {"id": 372, "number": 408, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "对无自平衡能力的控制对象组成的控制系统， 在实际工程整定中， 其调节器\n参数整定不宜采用的方法是_______ 。", "options": {"A": "经验法", "B": "临界比例带法", "C": "反应曲线法", "D": "衰减曲线法"}, "answer": "C", "answerText": "反应曲线法", "raw": "对无自平衡能力的控制对象组成的控制系统， 在实际工程整定中， 其调节器\n参数整定不宜采用的方法是_______ 。\nA.经验法\nB.临界比例带法\nC.反应曲线法\nD.衰减曲线法", "day": 2}, {"id": 373, "number": 409, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "对无自平衡能力的控制对象组成的控制系统，其调节器参数整定实际宜采\n用的方法是________。", "options": {"A": "理论计算法", "B": "动态过程曲线比较法", "C": "反应曲线法", "D": "衰减曲线法"}, "answer": "D", "answerText": "衰减曲线法", "raw": "对无自平衡能力的控制对象组成的控制系统，其调节器参数整定实际宜采\n用的方法是________。\nA.理论计算法\nB.动态过程曲线比较法\nC.反应曲线法\nD.衰减曲线法", "day": 2}, {"id": 374, "number": 410, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "自动控制系统中若采用 PID 调节器，当过渡过程出现振荡时，可采用的措\n施是_______。", "options": {"A": "首先应 Ti 调到无穷大，再调节比例带使其接近要求值", "B": "首先应将 Ti 调到无穷大，再调节 Ti 使其接近要求值", "C": "首先应将比例带调到无穷大，再调节 Ti 使其稳定下来", "D": "首先应将 Ti 调到最小，再调节比例带使其稳定下来"}, "answer": "A", "answerText": "首先应 Ti 调到无穷大，再调节比例带使其接近要求值", "raw": "自动控制系统中若采用 PID 调节器，当过渡过程出现振荡时，可采用的措\n施是_______。\nA. 首先应 Ti 调到无穷大，再调节比例带使其接近要求值\nB. 首先应将 Ti 调到无穷大，再调节 Ti 使其接近要求值\nC. 首先应将比例带调到无穷大，再调节 Ti 使其稳定下来\nD. 首先应将 Ti 调到最小，再调节比例带使其稳定下来", "day": 2}, {"id": 375, "number": 411, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "自动控制系统中若采用 PID 调节器， 当过渡过程出现振荡时， 可采用的措施\n是_______ 。", "options": {"A": "首先应将 Ti 调到无穷大，再减小比例带使其稳定下来", "B": "首先应将 Ti 调到无穷大，若仍然有振荡，再调节比例带到满以后，再减小使\n其接近要求值", "C": "首先应将比例带调到无穷大，再减小 Ti 使其稳定下来", "D": "首先应将比例带调到无穷大，若仍然有振荡，再调节Ti 到满以后，再减小比\n例带，使其接近要求值"}, "answer": "B", "answerText": "首先应将 Ti 调到无穷大，若仍然有振荡，再调节比例带到满以后，再减小使\n其接近要求值", "raw": "自动控制系统中若采用 PID 调节器， 当过渡过程出现振荡时， 可采用的措施\n是_______ 。\nA. 首先应将 Ti 调到无穷大，再减小比例带使其稳定下来\nB. 首先应将 Ti 调到无穷大，若仍然有振荡，
