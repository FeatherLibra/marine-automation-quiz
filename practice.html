膜盒内充满硅油\nC.喷嘴挡板沾污\nD.负载容积太小", "day": 2}, {"id": 381, "number": 422, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "在单杠杆气动差压变送器测量信号变化时， 若输入特性不好， 灵敏限大， 可\n能原因是_______。", "options": {"A": "恒节流孔堵塞", "B": "调零弹簧刚度不足", "C": "喷嘴挡板堵塞", "D": "膜盒漏油"}, "answer": "D", "answerText": "膜盒漏油", "raw": "在单杠杆气动差压变送器测量信号变化时， 若输入特性不好， 灵敏限大， 可\n能原因是_______。\nA.恒节流孔堵塞\nB.调零弹簧刚度不足\nC.喷嘴挡板堵塞\nD.膜盒漏油", "day": 2}, {"id": 382, "number": 423, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "变送器故障检测方法中， 分部检测是将_______ 分割成几个部分， 由简到繁、\n由表及里查找故障。", "options": {"A": "变送器", "B": "变送器元件", "C": "测量回路", "D": "变送器输出信号"}, "answer": "C", "answerText": "测量回路", "raw": "变送器故障检测方法中， 分部检测是将_______ 分割成几个部分， 由简到繁、\n由表及里查找故障。\nA.变送器\nB.变送器元件\nC.测量回路\nD.变送器输出信号", "day": 2}, {"id": 383, "number": 424, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "________ 不是导致压力变送器在使用过程中输出大于 20 mA 的原因。", "options": {"A": "实际压力超过满量程上限", "B": "差压变送器负压室引压管漏泄严重", "C": "差压变送器正压室引压管漏泄严重", "D": "传感器单元故障"}, "answer": "C", "answerText": "差压变送器正压室引压管漏泄严重", "raw": "________ 不是导致压力变送器在使用过程中输出大于 20 mA 的原因。\nA. 实际压力超过满量程上限\nB. 差压变送器负压室引压管漏泄严重\nC. 差压变送器正压室引压管漏泄严重\nD. 传感器单元故障", "day": 2}, {"id": 384, "number": 425, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "PID 调节器的测试可用如图闭环测试方法， 在测试确定比例增益时， 采取的\n步骤不正确的是________。", "options": {"A": "将调节器的积分时间置于无限大", "B": "将调节器的微分时间置于零", "C": "调节定值器增加或减少给定值信号，使输出发生变化", "D": "接入调节器输出至调节器输入端的测量信号"}, "answer": "D", "answerText": "接入调节器输出至调节器输入端的测量信号", "raw": "PID 调节器的测试可用如图闭环测试方法， 在测试确定比例增益时， 采取的\n步骤不正确的是________。\nA. 将调节器的积分时间置于无限大\nB. 将调节器的微分时间置于零\nC. 调节定值器增加或减少给定值信号，使输出发生变化\nD. 接入调节器输出至调节器输入端的测量信号", "day": 2}, {"id": 385, "number": 426, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "PID 调节器的测试可用如图闭环测试方法， 在测试确定积分增益时， 采取的\n步骤不正确的是_______。", "options": {"A": "将调节器的比例带调整至 0%", "B": "将调节器的微分时间置于零", "C": "调节定值器于仪表信号范围 1/4 或 3/4 位置上", "D": "接入调节器输出至调节器输入端的测量信号"}, "answer": "A", "answerText": "将调节器的比例带调整至 0%", "raw": "PID 调节器的测试可用如图闭环测试方法， 在测试确定积分增益时， 采取的\n步骤不正确的是_______。\nA.将调节器的比例带调整至 0%\nB. 将调节器的微分时间置于零\nC. 调节定值器于仪表信号范围 1/4 或 3/4 位置上\nD. 接入调节器输出至调节器输入端的测量信号", "day": 2}, {"id": 386, "number": 427, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "一体式温度变送器输出信号小于 4 mA 的原因可能是_______ 。", "options": {"A": "温度传感器断路", "B": "温度传感器短路", "C": "传感器温包外表脏污", "D": "供电电压过高"}, "answer": "A", "answerText": "温度传感器断路", "raw": "一体式温度变送器输出信号小于 4 mA 的原因可能是_______ 。\nA.温度传感器断路\nB.温度传感器短路\nC.传感器温包外表脏污\nD.供电电压过高", "day": 2}, {"id": 387, "number": 428, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "QBC 单杠杆差压变送器无迁移使用，当正负压室压差为 0 时，变送器输出\n压力为 0，说法正确的是_______。", "options": {"A": "输出压力正确，无须调整该变送器", "B": "输出压力偏高，需要调整该变送器迁移弹簧", "C": "输出压力偏高，需要调整该变送器的调零弹簧", "D": "输出压力偏低，需要调整该变送器的调零弹簧"}, "answer": "D", "answerText": "输出压力偏低，需要调整该变送器的调零弹簧", "raw": "QBC 单杠杆差压变送器无迁移使用，当正负压室压差为 0 时，变送器输出\n压力为 0，说法正确的是_______。\nA. 输出压力正确，无须调整该变送器\nB. 输出压力偏高，需要调整该变送器迁移弹簧\nC. 输出压力偏高，需要调整该变送器的调零弹簧\nD. 输出压力偏低，需要调整该变送器的调零弹簧", "day": 2}, {"id": 388, "number": 429, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "若 QBC 单杠杆差压变送器没有输入而输出却大于 0.02 MPa， 其原因可能是\n____。", "options": {"A": "恒节流孔脏堵", "B": "气源管路漏气", "C": "喷嘴脏堵", "D": "反馈波纹管刚性大"}, "answer": "C", "answerText": "喷嘴脏堵", "raw": "若 QBC 单杠杆差压变送器没有输入而输出却大于 0.02 MPa， 其原因可能是\n____。\nA.恒节流孔脏堵\nB.气源管路漏气\nC.喷嘴脏堵\nD.反馈波纹管刚性大", "day": 2}, {"id": 389, "number": 430, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "在采用浮子式锅炉水位双位控制系统中，当水位下降到危险低水位时，给水\n泵电机仍未通电，可能的原因是________。", "options": {"A": "调节板上的上面销钉离浮子杆太远", "B": "调节板上的上面销钉离浮子杆太近", "C": "调节板上的下面销钉脱落", "D": "调节板上的上面销钉脱落"}, "answer": "C", "answerText": "调节板上的下面销钉脱落", "raw": "在采用浮子式锅炉水位双位控制系统中，当水位下降到危险低水位时，给水\n泵电机仍未通电，可能的原因是________。\nA. 调节板上的上面销钉离浮子杆太远\nB. 调节板上的上面销钉离浮子杆太近\nC. 调节板上的下面销钉脱落\nD. 调节板上的上面销钉脱落", "day": 2}, {"id": 390, "number": 431, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "在用浮子式锅炉水位双位控制系统中，若给水泵电机起动频繁，应做的工作\n是________。", "options": {"A": "把调节板上的上、下销钉一起上移", "B": "把调节板上的上、下销钉一起下移", "C": "调节板上的上销钉下移，下销钉上移", "D": "调节板上的上销钉上移，下销钉下移"}, "answer": "D", "answerText": "调节板上的上销钉上移，下销钉下移", "raw": "在用浮子式锅炉水位双位控制系统中，若给水泵电机起动频繁，应做的工作\n是________。\nA. 把调节板上的上、下销钉一起上移\nB. 把调节板上的上、下销钉一起下移\nC. 调节板上的上销钉下移，下销钉上移\nD. 调节板上的上销钉上移，下销钉下移", "day": 2}, {"id": 391, "number": 432, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "用浮子式双位调节器控制锅炉水位时， 如果水位到上限不停泵或到下限不起\n动泵，那么可能的原因是_______。", "options": {"A": "调节板上、下销钉距离太近", "B": "调节板上、下销钉距离太远", "C": "永久磁铁磁性降低", "D": "锅炉汽压变动频繁"}, "answer": "C", "answerText": "永久磁铁磁性降低", "raw": "用浮子式双位调节器控制锅炉水位时， 如果水位到上限不停泵或到下限不起\n动泵，那么可能的原因是_______。\nA.调节板上、下销钉距离太近\nB.调节板上、下销钉距离太远\nC.永久磁铁磁性降低\nD.锅炉汽压变动频繁", "day": 2}, {"id": 392, "number": 433, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "在浮子式辅锅炉水位控制系统中，若调节器的浮球破裂，则可能会导致\n________。", "options": {"A": "锅炉水位在中间水位振荡", "B": "锅炉水位在低水位振荡", "C": "锅炉水位在高水位振荡", "D": "锅炉满水"}, "answer": "D", "answerText": "锅炉满水", "raw": "在浮子式辅锅炉水位控制系统中，若调节器的浮球破裂，则可能会导致\n________。\nA.锅炉水位在中间水位振荡\nB.锅炉水位在低水位振荡\nC.锅炉水位在高水位振荡\nD.锅炉满水", "day": 2}, {"id": 393, "number": 434, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "电气控制线路装配的一般步骤中，最后应________。", "options": {"A": "画出接线图", "B": "连接电源、电动机等控制板外部的导线", "C": "根据电路图检验控制板内部布线的正确性", "D": "通电试验"}, "answer": "D", "answerText": "通电试验", "raw": "电气控制线路装配的一般步骤中，最后应________。\nA. 画出接线图\nB. 连接电源、电动机等控制板外部的导线\nC. 根据电路图检验控制板内部布线的正确性\nD. 通电试验", "day": 2}, {"id": 394, "number": 435, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "根据被监控过程量度的不同，控制系统故障诊断方法大致可分为三类:基于\n模型解析的方法、基于冗余知识的方法和_______ 的方法。", "options": {"A": "数据驱动", "B": "性能检测", "C": "硬件冗余", "D": "参数估计"}, "answer": "A", "answerText": "数据驱动", "raw": "根据被监控过程量度的不同，控制系统故障诊断方法大致可分为三类:基于\n模型解析的方法、基于冗余知识的方法和_______ 的方法。\nA.数据驱动\nB.性能检测\nC.硬件冗余\nD.参数估计", "day": 2}, {"id": 395, "number": 436, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "在控制系统故障查找方法中，基于模型解析的方法主要利用 _______ 之间\n的瞬态关系集合实现故障检测和诊断。", "options": {"A": "被控过程、故障和故障残差三者", "B": "测量变量（输入/输出、输出/输出或输入/输入）", "C": "与故障有关的变量和受故障影响的变量", "D": "故障现象与故障原因"}, "answer": "B", "answerText": "测量变量（输入/输出、输出/输出或输入/输入）", "raw": "在控制系统故障查找方法中，基于模型解析的方法主要利用 _______ 之间\n的瞬态关系集合实现故障检测和诊断。\nA. 被控过程、故障和故障残差三者\nB. 测量变量（输入/输出、输出/输出或输入/输入）\nC. 与故障有关的变量和受故障影响的变量\nD. 故障现象与故障原因", "day": 2}, {"id": 396, "number": 437, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "控制系统故障查找方法中， 基于模型解析的方法是_______ 故障诊断方法，\n基于冗余知识的方法是_______ 故障诊断方法。", "options": {"A": "定性；定性", "B": "定量；定量", "C": "定性；定量", "D": "定量；定性"}, "answer": "D", "answerText": "定量；定性", "raw": "控制系统故障查找方法中， 基于模型解析的方法是_______ 故障诊断方法，\n基于冗余知识的方法是_______ 故障诊断方法。\nA.定性；定性\nB.定量；定量\nC.定性；定量\nD.定量；定性", "day": 2}, {"id": 397, "number": 438, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "因电子调速器故障导致柴油机转速不稳的可能原因是伺服马达的输出与调\n油机构之间的传动杆系卡滞或间隙过大、_______ 、转速传感器安装间隙过大、\n控制器参数调整不当。", "options": {"A": "调速器电源中断或电极接反", "B": "外负荷过大", "C": "油量调节机构卡死在供油位置", "D": "位置传感器松动或磨损"}, "answer": "D", "answerText": "位置传感器松动或磨损", "raw": "因电子调速器故障导致柴油机转速不稳的可能原因是伺服马达的输出与调\n油机构之间的传动杆系卡滞或间隙过大、_______ 、转速传感器安装间隙过大、\n控制器参数调整不当。\nA.调速器电源中断或电极接反\nB.外负荷过大\nC.油量调节机构卡死在供油位置\nD.位置传感器松动或磨损", "day": 2}, {"id": 398, "number": 439, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "电子调速器出现问题会引起调速不稳定，导致柴油机不能起动故障现象的\n原因可能是转速信号中断、调速器电源中断或电极接反、________。", "options": {"A": "调速机构传动杆系卡死在零位", "B": "调速器本身设定转速过高", "C": "位置传感器松动或磨损", "D": "油量调节机构在供油位置卡死"}, "answer": "A", "answerText": "调速机构传动杆系卡死在零位", "raw": "电子调速器出现问题会引起调速不稳定，导致柴油机不能起动故障现象的\n原因可能是转速信号中断、调速器电源中断或电极接反、________。\nA.调速机构传动杆系卡死在零位\nB.调速器本身设定转速过高\nC.位置传感器松动或磨损\nD.油量调节机构在供油位置卡死", "day": 2}, {"id": 399, "number": 440, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "电子调速器出现问题会引起调速不稳定，导致柴油机不能停车的原因可能\n是_______ 油量调节机构在供油位置卡死。", "options": {"A": "调速机构传动杆系卡死在零位", "B": "调速器本身设定转速过高", "C": "位置传感器松动或磨损", "D": "伺服马达与柴油机的调油机构的零点位置不匹配"}, "answer": "D", "answerText": "伺服马达与柴油机的调油机构的零点位置不匹配", "raw": "电子调速器出现问题会引起调速不稳定，导致柴油机不能停车的原因可能\n是_______ 油量调节机构在供油位置卡死。\nA. 调速机构传动杆系卡死在零位\nB. 调速器本身设定转速过高\nC. 位置传感器松动或磨损\nD. 伺服马达与柴油机的调油机构的零点位置不匹配", "day": 2}, {"id": 400, "number": 441, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "电子调速器出现问题会引起调速不稳定，当由于控制器参数调整不当导致\n柴油机转速不稳时，需要________ 。", "options": {"A": "检查并重新调整安装", "B": "检查外部连接，消除过大的阻力", "C": "重新调整，适当调整增益和微分值", "D": "重新设定伺服马达设定代码"}, "answer": "C", "answerText": "重新调整，适当调整增益和微分值", "raw": "电子调速器出现问题会引起调速不稳定，当由于控制器参数调整不当导致\n柴油机转速不稳时，需要________ 。\nA. 检查并重新调整安装\nB. 检查外部连接，消除过大的阻力\nC. 重新调整，适当调整增益和微分值\nD. 重新设定伺服马达设定代码", "day": 2}, {"id": 401, "number": 442, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "在 DGS8800e 数字电子调速系统中，若发生提供到数字调速系统的 24 V 直\n流电源断电，则会出现_______。", "options": {"A": "主机立即停车", "B": "主机故障减速，执行越控", "C": "主机转速降到最低稳定转速", "D": "主机仍能维持在原先的油门开度下运转"}, "answer": "D", "answerText": "主机仍能维持在原先的油门开度下运转", "raw": "在 DGS8800e 数字电子调速系统中，若发生提供到数字调速系统的 24 V 直\n流电源断电，则会出现_______。\nA. 主机立即停车\nB. 主机故障减速，执行越控\nC. 主机转速降到最低稳定转速\nD. 主机仍能维持在原先的油门开度下运转", "day": 2}, {"id": 402, "number": 443, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "在 DGS8800e 数字电子调速系统中，若发生驾驶台控制系统出现故障，则\n会出现 ______。", "options": {"A": "主机仍能维持在原先的油门开度下运转", "B": "主机故障停车，执行越控", "C": "主机转速自动升高至最大转速", "D": "主机故障减速，执行越控"}, "answer": "A", "answerText": "主机仍能维持在原先的油门开度下运转", "raw": "在 DGS8800e 数字电子调速系统中，若发生驾驶台控制系统出现故障，则\n会出现 ______。\nA. 主机仍能维持在原先的油门开度下运转\nB. 主机故障停车，执行越控\nC.主机转速自动升高至最大转速\nD.主机故障减速，执行越控", "day": 2}, {"id": 403, "number": 444, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除（传感器调整及 PID 参", "stem": "DGS88OOe 数字调速器报警指示栏显示“RPM DETECT FAIL”表示________。", "options": {"A": "测速系统硬件故障", "B": "调速器控制面板显示故障", "C": "执行器位置测量装置故障", "D": "调速器调节部分和执行部分通信故障"}, "answer": "A", "answerText": "测速系统硬件故障", "raw": "DGS \nD. 6；4", "day": 2}, {"id": 413, "number": 83, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "对电容式压力变送器的变化趋势进行现场测试时， 当缓慢打开正压室的排污\n阀后，变送器输出应为________。", "options": {"A": "输入为低限值时对应的零点输出值(4 mA)", "B": "输入为高限值时对应的满量程输出值(20 mA)", "C": "最小饱和输出值(3.9 mA)", "D": "最大饱和输出值(20.8 mA)"}, "answer": "C", "answerText": "最小饱和输出值(3.9 mA)", "raw": "对电容式压力变送器的变化趋势进行现场测试时， 当缓慢打开正压室的排污\n阀后，变送器输出应为________。\nA. 输入为低限值时对应的零点输出值(4 mA)\nB. 输入为高限值时对应的满量程输出值(20 mA)\nC. 最小饱和输出值(3.9 mA)\nD. 最大饱和输出值(20.8 mA)", "day": 2}, {"id": 414, "number": 84, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "电容式液位变送器校准程序中采用两点法进行校准。在通过 LED 表头的 3\n个按键写入高点液位和低点液位时，两点液位值间的距离应满足________。", "options": {"A": "大于满量程的 2/3", "B": "大于满量程的 3/4", "C": "等于满量程", "D": "略小于满量程"}, "answer": "A", "answerText": "大于满量程的 2/3", "raw": "电容式液位变送器校准程序中采用两点法进行校准。在通过 LED 表头的 3\n个按键写入高点液位和低点液位时，两点液位值间的距离应满足________。\nA.大于满量程的 2/3\nB.大于满量程的 3/4\nC.等于满量程\nD.略小于满量程", "day": 2}, {"id": 415, "number": 85, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "超速保护装置是设备的重要保护单元，完备的测试是_______。", "options": {"A": "必须用实际设备提供的转速信号", "B": "可用模拟设备提供的模拟转速", "C": "设定保护值下降到正常速度值，观察保护是否动作", "D": "更改信号转换电路，使显示转速高于实际转速"}, "answer": "B", "answerText": "可用模拟设备提供的模拟转速", "raw": "超速保护装置是设备的重要保护单元，完备的测试是_______。\nA. 必须用实际设备提供的转速信号\nB. 可用模拟设备提供的模拟转速\nC. 设定保护值下降到正常速度值，观察保护是否动作\nD. 更改信号转换电路，使显示转速高于实际转速", "day": 2}, {"id": 416, "number": 86, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "超速保护装置是设备的重要保护单元，测试时_______。", "options": {"A": "必须保证运行设备不会停止", "B": "确保运行设备已停止工作", "C": "必须保证设备保护动作后，设备能够停止", "D": "更改信号转换电路，使显示转速高于实际转速"}, "answer": "C", "answerText": "必须保证设备保护动作后，设备能够停止", "raw": "超速保护装置是设备的重要保护单元，测试时_______。\nA. 必须保证运行设备不会停止\nB. 确保运行设备已停止工作\nC. 必须保证设备保护动作后，设备能够停止\nD. 更改信号转换电路，使显示转速高于实际转速", "day": 2}, {"id": 417, "number": 87, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "超速保护装置是运行设备的重要保护单元，设备正常运行中，出现超速保护\n情况，则______。", 采集电路 C.微机输入电路 D.微机输出电路", "day": 2}, {"id": 422, "number": 95, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "可用于辅锅炉火焰检测的元件是_______ 。", "options": {"A": "热敏电阻", "B": "热电阻", "C": "光电池", "D": "低熔点合金"}, "answer": "C", "answerText": "光电池", "raw": "可用于辅锅炉火焰检测的元件是_______ 。\nA.热敏电阻\nB.热电阻\nC.光电池\nD.低熔点合金", "day": 2}, {"id": 423, "number": 96, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "光电池常被用作辅锅炉火焰探测器中的感光元件， 其特点中不包括________", "options": {"A": "光照时电阻变小", "B": "使用寿命长", "C": "光谱敏感范围内不包括红外线", "D": "光照时正、负两极间产生电压"}, "answer": "A", "answerText": "光照时电阻变小", "raw": "光电池常被用作辅锅炉火焰探测器中的感光元件， 其特点中不包括________\nA.光照时电阻变小\nB.使用寿命长\nC.光谱敏感范围内不包括红外线\nD.光照时正、负两极间产生电压", "day": 2}, {"id": 424, "number": 97, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "光敏电阻常被用作辅锅炉火焰探测器中的感光元件，其特点是_______", "options": {"A": "光照时电阻变小", "B": "光照时电阻变大", "C": "光谱敏感范围内不包括红外线", "D": "能承受较高温度"}, "answer": "A", "answerText": "光照时电阻变小", "raw": "光敏电阻常被用作辅锅炉火焰探测器中的感光元件，其特点是_______\nA.光照时电阻变小\nB.光照时电阻变大\nC.光谱敏感范围内不包括红外线\nD.能承受较高温度", "day": 2}, {"id": 425, "number": 98, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "2CR Ⅱ型光电池和 RAR 型硒光电池在光照时产生的电压分别是_______ 。", "options": {"A": "0.5 V 和 1 V", "B": "1 V 和小于 0.5 V", "C": "0.5 V 和小于 1V", "D": "1V 和大于 1 V"}, "answer": "C", "answerText": "0.5 V 和小于 1V", "raw": "2CR Ⅱ型光电池和 RAR 型硒光电池在光照时产生的电压分别是_______ 。\nA. 0.5 V 和 1 V\nB. 1 V 和小于 0.5 V\nC. 0.5 V 和小于 1V\nD. 1V 和大于 1 V", "day": 2}, {"id": 426, "number": 99, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "不可用于辅锅炉火焰感受器的元件是________。", "options": {"A": "光敏电阻", "B": "光电池", "C": "紫外线灯管", "D": "红外线灯管"}, "answer": "D", "answerText": "红外线灯管", "raw": "不可用于辅锅炉火焰感受器的元件是________。\nA.光敏电阻\nB.光电池\nC.紫外线灯管\nD.红外线灯管", "day": 2}, {"id": 427, "number": 100, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "可用来作为辅锅炉火焰感受器的元件是_______ 。 ①红外线灯管；②紫外\n线灯管；③光敏电阻；④热敏电阻；⑤光电池⑥光电三极管", "options": {"A": "①③⑤⑥", "B": "①②③④", "C": "②③⑤", "D": "①②③④⑤⑥"}, "answer": "C", "answerText": "②③⑤", "raw": "可用来作为辅锅炉火焰感受器的元件是_______ 。 ①红外线灯管；②紫外\n线灯管；③光敏电阻；④热敏电阻；⑤光电池⑥光电三极管\nA.①③⑤⑥\nB.①②③④\nC.②③⑤\nD.①②③④⑤⑥", "day": 2}, {"id": 428, "number": 102, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "关于辅锅炉火焰感受器，错误的说法是________。", "options": {"A": "常用光敏元件有光敏电阻、光电池和紫外线灯泡", "B": "光电池有光照时两极产生电压", "C": "光敏电阻在有光照时阻值增大", "D": "紫外线灯泡可接于直流或交流电路"}, "answer": "C", "answerText": "光敏电阻在有光照时阻值增大", "raw": "关于辅锅炉火焰感受器，错误的说法是________。\nA.常用光敏元件有光敏电阻、光电池和紫外线灯泡\nB. 光电池有光照时两极产生电压\nC. 光敏电阻在有光照时阻值增大\nD. 紫外线灯泡可接于直流或交流电路", "day": 2}, {"id": 429, "number": 103, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "当光照强度变小时， 光敏电阻的阻值_______ ， 光电池产生的电流________。", "options": {"A": "增大；增大", "B": "减小；减小", "C": "减小；增大", "D": "增大；减小"}, "answer": "D", "answerText": "增大；减小", "raw": "当光照强度变小时， 光敏电阻的阻值_______ ， 光电池产生的电流________。\nA.增大；增大\nB.减小；减小\nC.减小；增大\nD.增大；减小", "day": 2}, {"id": 430, "number": 104, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "火 焰 探 测 器 是 辅 锅 炉 等 运 行 设 备 中 的 重 要 火 焰 检 测 传 感 器 亭 常 使 用\n_______ 来判断光敏 电阻的好坏。", "options": {"A": "测量电阻阻值", "B": "观察设备运行状态", "C": "测量其电压值", "D": "观察线路的好坏"}, "answer": "A", "answerText": "测量电阻阻值", "raw": "火 焰 探 测 器 是 辅 锅 炉 等 运 行 设 备 中 的 重 要 火 焰 检 测 传 感 器 亭 常 使 用\n_______ 来判断光敏 电阻的好坏。\nA.测量电阻阻值\nB.观察设备运行状态\nC.测量其电压值\nD.观察线路的好坏", "day": 2}, {"id": 431, "number": 105, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "火焰探测器是辅锅炉等运行设备中的重要火焰检测传感器，如使用光电池\n来测光，则需要使用_______ 来模拟。", "options": {"A": "红外线光源", "B": "紫外线光源", "C": "可见光光源", "D": "输出电压的周低"}, "answer": "C", "answerText": "可见光光源", "raw": "火焰探测器是辅锅炉等运行设备中的重要火焰检测传感器，如使用光电池\n来测光，则需要使用_______ 来模拟。\nA.红外线光源\nB.紫外线光源\nC.可见光光源\nD.输出电压的周低", "day": 2}, {"id": 432, "number": 106, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "火焰探测器是辅锅炉等运行设备中的重要火焰检测传感器，如使用光敏电\n阻来测光，则往往需要使用_______ 。", "options": {"A": "隔热隔红外线测量", "B": "隔紫外线测量", "C": "mV 放大电路", "D": "冷端补偿电路"}, "answer": "A", "answerText": "隔热隔红外线测量", "raw": "火焰探测器是辅锅炉等运行设备中的重要火焰检测传感器，如使用光敏电\n阻来测光，则往往需要使用_______ 。\nA.隔热隔红外线测量\nB.隔紫外线测量\nC. mV 放大电路\nD.冷端补偿电路", "day": 2}, {"id": 433, "number": 107, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "采用光电管的火焰监测器， 功能测试是使用手电筒照射探头， 测量其输出的\n_______ 来 观察。", "options": {"A": "高压回路开关状态", "B": "电阻值变化", "C": "电压值变化", "D": "电流值变化"}, "answer": "A", "answerText": "高压回路开关状态", "raw": "采用光电管的火焰监测器， 功能测试是使用手电筒照射探头， 测量其输出的\n_______ 来 观察。\nA.高压回路开关状态\nB.电阻值变化\nC.电压值变化\nD.电流值变化", "day": 2}, {"id": 434, "number": 108, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "采用光电池的火焰监测器， 功能测试是使用手电筒照射探头， 测量其输出的\n_______ 来 观察。", "options": {"A": "开关状态", "B": "电阻值变化或电容变化", "C": "电压值变化或短路电流值", "D": "气压值变化"}, "answer": "C", "answerText": "电压值变化或短路电流值", "raw": "采用光电池的火焰监测器， 功能测试是使用手电筒照射探头， 测量其输出的\n_______ 来 观察。\nA.开关状态\nB.电阻值变化或电容变化\nC.电压值变化或短路电流值\nD.气压值变化", "day": 2}, {"id": 435, "number": 109, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "采用光敏电阻的火焰监测器， 功能测试是使用手电筒照射探头， 测量其输出\n的 _____ .来观察。", "options": {"A": "开关状态", "B": "电阻值变化", "C": "电压值变化", "D": "气压值变化"}, "answer": "B", "answerText": "电阻值变化", "raw": "采用光敏电阻的火焰监测器， 功能测试是使用手电筒照射探头， 测量其输出\n的 _____ .来观察。\nA.开关状态\nB.电阻值变化\nC.电压值变化\nD.气压值变化", "day": 2}, {"id": 436, "number": 110, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "实船上，火焰监测器的功能测试通常使用_______照射探头来进行。", "options": {"A": "火把", "B": "手电筒", "C": "打火机", "D": "探照灯"}, "answer": "B", "answerText": "手电筒", "raw": "实船上，火焰监测器的功能测试通常使用_______照射探头来进行。\nA.火把\nB.手电筒\nC.打火机\nD.探照灯", "day": 2}, {"id": 437, "number": 111, "chapter": "第一章船舶自动控制基础", "section": "第六节 控制系统的测试和故障排除 （传感器+主机+锅炉火", "stem": "锅炉火焰监测器的功能测试一般在________进行。", "options": {"A": "锅炉点火升汽时", "B": "锅炉运行过程中", "C": "锅炉停止工作时", "D": "锅炉预扫风期间"}, "answer": "C", "answerText": "锅炉停止工作时", "raw": "锅炉火焰监测器的功能测试一般在________进行。\nA.锅炉点火升汽时\nB.锅炉运行过程中\nC.锅炉停止工作时\nD.锅炉预扫风期间", "day": 2}, {"id": 438, "number": 1, "chapter": "第一章船舶自动控制基础", "section": "第六节控制系统的测试和故障排除（监控系统故障诊断）", "stem": "船舶厨房设备的防护措施中，最为关键的是____ 。", "options": {"A": "防止抽烟", "B": "防止积水、漏电", "C": "防止通风不畅", "D": "防止积尘"}, "answer": "B", "answerText": "防止积水、漏电", "raw": "船舶厨房设备的防护措施中，最为关键的是____ 。\nA.防止抽烟\nB.防止积水、漏电\nC.防止通风不畅\nD.防止积尘", "day": 2}, {"id": 439, "number": 2, "chapter": "第一章船舶自动控制基础", "section": "第六节控制系统的测试和故障排除（监控系统故障诊断）", "stem": "船舶厨房设备的环境，对电气影响最大的是________ 。", "options": {"A": "过于潮湿", "B": "温度过高", "C": "油腻不洁", "D": "摇晃溢水"}, "answer": "A", "answerText": "过于潮湿", "raw": "船舶厨房设备的环境，对电气影响最大的是________ 。\nA.过于潮湿\nB.温度过高\nC.油腻不洁\nD.摇晃溢水", "day": 2}, {"id": 440, "number": 3, "chapter": "第一章船舶自动控制基础", "section": "第六节控制系统的测试和故障排除（监控系统故障诊断）", "stem": "在 DATACHIEF C20/K-Chief 500 监视与报警系统的故障诊断与处理系统中，\n确定故障所在部位应遵循_______ 思路进行摸排。", "options": {"A": "从里到外，从模块到设备", "B": "从大到小，从粗到细", "C": "从近到远，从模块到传感器", "D": "从简单到复杂，从里到外"}, "answer": "B", "answerText": "从大到小，从粗到细", "raw": "在 DATACHIEF C20/K-Chief 500 监视与报警系统的故障诊断与处理系统中，\n确定故障所在部位应遵循_______ 思路进行摸排。\nA.从里到外，从模块到设备\nB.从大到小，从粗到细\nC.从近到远，从模块到传感器\nD.从简单到复杂，从里到外", "day": 2}, {"id": 441, "number": 4, "chapter": "第一章船舶自动控制基础", "section": "第六节控制系统的测试和故障排除（监控系统故障诊断）", "stem": "在 DATACHIEF C20/K-Chief 500 监视与报警系统的故障诊断与处理系统中，\n分析故障，确定故障所处部位，用_______ 方法被认为是不可行的。", "options": {"A": "插拔法", "B": "交换法", "C": "详细查找可能故障模块的具体损坏元件", "D": "用“被确认可用的”备件进行替换"}, "answer": "C", "answerText": "详细查找可能故障模块的具体损坏元件", "raw": "在 DATACHIEF C20/K-Chief 500 监视与报警系统的故障诊断与处理系统中，\n分析故障，确定故障所处部位，用_______ 方法被认为是不可行的。\nA. 插拔法\nB. 交换法\nC. 详细查找可能故障模块的具体损坏元件\nD.用“被确认可用的”备件进行替换", "day": 2}, {"id": 442, "number": 5, "chapter": "第一章船舶自动控制基础", "section": "第六节控制系统的测试和故障排除（监控系统故障诊断）", "stem": "在 DATACHIEF C20 监视与报警系统的故障诊断与处理系统中，为确定是否\n为某一个具体 的输入设备或通道故障，采用________ 是最有效的办法。", "options": {"A": "交换法", "B": "经验法", "C": "隔离法", "D": "插拔法"}, "answer": "D", "answerText": "插拔法", "raw": "在 DATACHIEF C20 监视与报警系统的故障诊断与处理系统中，为确定是否\n为某一个具体 的输入设备或通道故障，采用________ 是最有效的办法。\nA.交换法\nB.经验法\nC.隔离法\nD.插拔法", "day": 2}, {"id": 443, "number": 6, "chapter": "第一章船舶自动控制基础", "section": "第六节控制系统的测试和故障排除（监控系统故障诊断）", "stem": "在 DATACHIEF C20/K-Chief 500 监视与报警系统中， 现场操作站LOS 故障查\n找流程图如下图， 当出现现场操作站故障， 但报警菜单中未显示系统故障， 则可\n能的原因是_______", "options": {"A": "24 V 电源故障，如保险丝烧坏或断路器跳闸", "B": "当框架内接线板 LED 指示灯灭，可能接线错误", "C": "当框架内接线板 LED 指示灯亮，可能现场操作站 DPU 单元故障", "D": "LOS 脱开与现场中线 CAN 的连接"}, "answer": "A", "answerText": "24 V 电源故障，如保险丝烧坏或断路器跳闸", "raw": "在 DATACHIEF C20/K-Chief 500 监视与报警系统中， 现场操作站LOS 故障查\n找流程图如下图， 当出现现场操作站故障， 但报警菜单中未显示系统故障， 则可\n能的原因是_______\nA. 24 V 电源故障，如保险丝烧坏或断路器跳闸\nB.当框架内接线板 LED 指示灯灭，可能接线错误\nC.当框架内接线板 LED 指示灯亮，可能现场操作站 DPU 单元故障\nD. LOS 脱开与现场中线 CAN 的连接", "day": 2}, {"id": 444, "number": 7, "chapter": "第一章船舶自动控制基础", "section": "第六节控制系统的测试和故障排除（监控系统故障诊断）", "stem": "在 DATACHIEF C20机舱监视与报警系统中， 当系统网关SGW 故障， 则可能\n导致_______ 。", "options": {"A": "不能对 CAN 网络进行扩展", "B": "在集控室远程操作站能只能对分布式处理单元进行运行监视，不能控制 DPU\n的运行和参数修改", "C": "远程操作站 ROS 与现场分布式处理单元 DPU 之间的通信中断", "D": "在 MOS 和 LOS 上也不能控制现场分布式处理单元 DPU"}, "answer": "C", "answerText": "远程操作站 ROS 与现场分布式处理单元 DPU 之间的通信中断", "raw": "在 DATACHIEF C20机舱监视与报警系统中， 当系统网关SGW 故障， 则可能\n导致_______ 。\nA.不能对 CAN 网络进行扩展\nB.在集控室远程操作站能只能对分布式处理单元进行运行监视，不能控制 DPU\n的运行和参数修改\nC.远程操作站 ROS 与现场分布式处理单元 DPU 之间的通信中断\nD.在 MOS 和 LOS 上也不能控制现场分布式处理单元 DPU", "day": 2}, {"id": 445, "number": 8, "chapter": "第一章船舶自动控制基础", "section": "第六节控制系统的测试和故障排除（监控系统故障诊断）", "stem": "在 DATACHIEF C20 机舱监视与报警系统中，DPU 的状态指示灯中的\"Watch\nDog”灯显示为红色，则不可能的原因是________", "options": {"A": "应用程序未加载", "B": "电源极性接反", "C": "未初始化", "D": "DPU 停止工作"}, "answer": "B", "answerText": "电源极性接反", "raw": "在 DATACHIEF C20 机舱监视与报警系统中，DPU 的状态指示灯中的\"Watch\nDog”灯显示为红色，则不可能的原因是________\nA.应用程序未加载\nB.电源极性接反\nC.未初始化\nD. DPU 停止工作", "day": 2}, {"id": 446, "number": 55, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第二节 主机遥控系统的结构和功能 （主要是气电转换器和", "stem": "主机遥控系统安全保护及紧急操纵功能通常包括_______ 。\n①应急运行；②机旁应急操纵；③自动报警；④应急停车；⑤主机故障自动减\n速及停车控制；⑥最大油量限制", "options": {"A": "①③⑤⑥", "B": "①②④⑤", "C": "②③④⑥", "D": "②③⑤⑥"}, "answer": "B", "answerText": "①②④⑤", "raw": "主机遥控系统安全保护及紧急操纵功能通常包括_______ 。\n①应急运行；②机旁应急操纵；③自动报警；④应急停车；⑤主机故障自动减\n速及停车控制；⑥最大油量限制\nA.①③⑤⑥\nB.①②④⑤\nC.②③④⑥\nD.②③⑤⑥", "day": 2}, {"id": 447, "number": 56, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第二节 主机遥控系统的结构和功能 （主要是气电转换器和", "stem": "在主机遥控系统中，逻辑程序控制功能通常包括________。\n①停车时的换向控制；②正常起动控制；③重起动控制；④慢转起动控制；⑤\n转速与负荷控制；⑥机旁应急操纵", "options": {"A": "①③④⑤", "B": "①②③④", "C": "②③④⑥", "D": "②③⑤⑥"}, "answer": "B", "answerText": "①②③④", "raw": "在主机遥控系统中，逻辑程序控制功能通常包括________。\n①停车时的换向控制；②正常起动控制；③重起动控制；④慢转起动控制；⑤\n转速与负荷控制；⑥机旁应急操纵\nA.①③④⑤\nB.①②③④\nC.②③④⑥\nD.②③⑤⑥", "day": 2}, {"id": 448, "number": 57, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第二节 主机遥控系统的结构和功能 （主要是气电转换器和", "stem": "在船舶主要自动控制装置中的传感器、变送器和参数转换，一般控制用的\n与报警_____监视用的________。", "options": {"A": "采用同一套", "B": "是分开独立的两套", "C": "传感器是一套，变送器和参数转换是两套", "D": "传感器是两套，变送器和参数转换是一套"}, "answer": "B", "answerText": "是分开独立的两套", "raw": "在船舶主要自动控制装置中的传感器、变送器和参数转换，一般控制用的\n与报警_____监视用的________。\nA. 采用同一套\nB. 是分开独立的两套\nC. 传感器是一套，变送器和参数转换是两套\nD. 传感器是两套，变送器和参数转换是一套", "day": 2}, {"id": 449, "number": 58, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第二节 主机遥控系统的结构和功能 （主要是气电转换器和", "stem": "在电气结合的主机遥控系统中，若采用 PGA 液压调速器，为使主机达到车\n令所要求的运行状态，必须设有_______ 。", "options": {"A": "电/液伺服器", "B": "电/气转换器", "C": "气/电转换器", "D": "位移伺服器"}, "answer": "B", "answerText": "电/气转换器", "raw": "在电气结合的主机遥控系统中，若采用 PGA 液压调速器，为使主机达到车\n令所要求的运行状态，必须设有_______ 。\nA.电/液伺服器\nB.电/气转换器\nC.气/电转换器\nD.位移伺服器", "day": 2}, {"id": 450, "number": 59, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第二节 主机遥控系统的结构和功能 （主要是气电转换器和", "stem": "电/气转换器中如图所示，脉冲信号发生器 G 有输出脉冲的时间为_______。", "options": {"A": "转速设定值 Us 与压力传感器 P/U 输出的电压信号 UR 差值较大时", "B": "转速设定值 Us 与压力传感器 P/U 输出的电压信号 UR 差值不大时", "C": "在整个控制过程中", "D": "在整个加、减速控制过程中"}, "answer": "C", "answerText": "在整个控制过程中", "raw": "电/气转换器中如图所示，脉冲信号发生器 G 有输出脉冲的时间为_______。\nA. 转速设定值 Us 与压力传感器 P/U 输出的电压信号 UR 差值较大时\nB. 转速设定值 Us 与压力传感器 P/U 输出的电压信号 UR 差值不大时\nC. 在整个控制过程中\nD. 在整个加、减速控制过程中", "day": 2}, {"id": 451, "number": 故障"}, "answer": "C", "answerText": "滤器太脏", "raw": "在 Hagenuk 电/液伺服器中，若主阀不能跟踪先导阀运动，其原因可能是\n_______ 。\nA.平衡泵故障\nB.主泵故障\nC.滤器太脏\nD.油压控制阀故障", "day": 2}, {"id": 461, "number": 70, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第二节 主机遥控系统的结构和功能 （主要是气电转换器和", "stem": "使 Hagenuk 电/液伺服器的伺服活塞保持不变的条件是_______ 。", "options": {"A": "主阀控制活塞上、下油腔压力相等", "B": "主阀 A 孔泄油，B 孔进油", "C": "主阀 A 孔进油，B 孔泄油", "D": "电磁作用力与反馈弹簧力平衡"}, "answer": "D", "answerText": "电磁作用力与反馈弹簧力平衡", "raw": "使 Hagenuk 电/液伺服器的伺服活塞保持不变的条件是_______ 。\nA. 主阀控制活塞上、下油腔压力相等\nB. 主阀 A 孔泄油，B 孔进油\nC. 主阀 A 孔进油，B 孔泄油\nD. 电磁作用力与反馈弹簧力平衡", "day": 2}, {"id": 462, "number": 71, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第二节 主机遥控系统的结构和功能 （主要是气电转换器和", "stem": "Hagenuk 电/液伺服器如图所示，如平衡泵 16 发生故障而没有油压输出测\n______。", "options": {"A": "在对主机进行加、减速控制过程中不能加速", "B": "在对主机进行加、减速控制过程中不能减速", "C": "在对主机进行加、减速控制过程中动作缓慢或不稳", "D": "不能对主机进行加、减速控制"}, "answer": "C", "answerText": "在对主机进行加、减速控制过程中动作缓慢或不稳", "raw": "Hagenuk 电/液伺服器如图所示，如平衡泵 16 发生故障而没有油压输出测\n______。\nA. 在对主机进行加、减速控制过程中不能加速\nB. 在对主机进行加、减速控制过程中不能减速\nC. 在对主机进行加、减速控制过程中动作缓慢或不稳\nD. 不能对主机进行加、减速控制", "day": 2}, {"id": 463, "number": 72, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第二节 主机遥控系统的结构和功能 （主要是气电转换器和", "stem": "在驾驶台用全自动主机遥控系统机动操作主机过程中，如突然发现 Hagenuk\n电/液伺服器失灵，应该采取的应急措施是立即____。", "options": {"A": "将主机操作部位转到机旁", "B": "将主机操作部位转到集控室", "C": "通知轮机长处理", "D": "通知船长和值班驾驶员"}, "answer": "A", "answerText": "将主机操作部位转到机旁", "raw": "在驾驶台用全自动主机遥控系统机动操作主机过程中，如突然发现 Hagenuk\n电/液伺服器失灵，应该采取的应急措施是立即____。\nA.将主机操作部位转到机旁\nB.将主机操作部位转到集控室\nC.通知轮机长处理\nD.通知船长和值班驾驶员", "day": 2}, {"id": 464, "number": 73, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第二节 主机遥控系统的结构和功能 （主要是气电转换器和", "stem": "在 Hagenuk 电/液伺服器中， 线圈的工作电流为4~20 mA， 当输入电流为4 mA\n时，油门处于最低稳定转速开度，当输入电流为 20 mA 时，油门达不到全速开\n度测应___ 。", "options": {"A": "调节调零弹簧，使其弹力减小", "B": "增加反馈弹簧预紧力", "C": "减小反馈弹簧预紧力", "D": "增加主泵排出油压力"}, "answer": "C", "answerText": "减小反馈弹簧预紧力", "raw": "在 Hagenuk 电/液伺服器中， 线圈的工作电流为4~20 mA， 当输入电流为4 mA\n时，油门处于最低稳定转速开度，当输入电流为 20 mA 时，油门达不到全速开\n度测应___ 。\nA. 调节调零弹簧，使其弹力减小\nB. 增加反馈弹簧预紧力\nC. 减小反馈弹簧预紧力\nD. 增加主泵排出油压力", "day": 2}, {"id": 465, "number": 74, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第二节 主机遥控系统的结构和功能 （主要是气电转换器和", "stem": "在 Hagenuk 电/液伺服器中，线圈的工作电流为 4-20 mA，当主机转速从最低\n稳定转速达到额定转速时，线圈的输入电流从 4mA 达到 16mA，首先应____。", "options": {"A": "旋松调零螺钉，改变线圈的初始位置来调整", "B": "上紧调零螺钉，改变线圈的初始位置来调整", "C": "上紧反馈弹簧调节螺钉，增大反馈弹簧的预紧力", "D": "旋松反馈弹簧调节螺钉，减小反馈弹簧的预紧力"}, "answer": "C", "answerText": "上紧反馈弹簧调节螺钉，增大反馈弹簧的预紧力", "raw": "在 Hagenuk 电/液伺服器中，线圈的工作电流为 4-20 mA，当主机转速从最低\n稳定转速达到额定转速时，线圈的输入电流从 4mA 达到 16mA，首先应____。\nA. 旋松调零螺钉，改变线圈的初始位置来调整\nB. 上紧调零螺钉，改变线圈的初始位置来调整\nC. 上紧反馈弹簧调节螺钉，增大反馈弹簧的预紧力\nD. 旋松反馈弹簧调节螺钉，减小反馈弹簧的预紧力", "day": 2}, {"id": 466, "number": 75, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第二节 主机遥控系统的结构和功能 （主要是气电转换器和", "stem": "在 Hagenuk 电/液伺服器中，线圈的工作电流为 4-20 mA ，当线圈输入电流为\n4mA 时主机运行很不稳定甚至导致停车，其调整方法是____ 。", "options": {"A": "扭紧反馈弹簧调节螺钉，增大反馈弹簧预紧力", "B": "扭松反馈弹簧调节螺钉，减小反馈弹簧预紧力", "C": "扭松调零螺钉，减小调零弹簧预紧力", "D": "扭紧调零螺钉，增大调零弹簧预紧力"}, "answer": "D", "answerText": "扭紧调零螺钉，增大调零弹簧预紧力", "raw": "在 Hagenuk 电/液伺服器中，线圈的工作电流为 4-20 mA ，当线圈输入电流为\n4mA 时主机运行很不稳定甚至导致停车，其调整方法是____ 。\nA. 扭紧反馈弹簧调节螺钉，增大反馈弹簧预紧力\nB. 扭松反馈弹簧调节螺钉，减小反馈弹簧预紧力\nC. 扭松调零螺钉，减小调零弹簧预紧力\nD. 扭紧调零螺钉，增大调零弹簧预紧力", "day": 2}, {"id": 467, "number": 77, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第二节 主机遥控系统的结构和功能 （主要是气电转换器和", "stem": "Hagenuk 电/液伺服器的零点是指当输入电流为 0 mA（或 4 mA）时，动力活\n塞所在位置应保证供____ 油量。", "options": {"A": "重起动", "B": "起动", "C": "最低转速", "D": "最低稳定转速"}, "answer": "D", "answerText": "最低稳定转速", "raw": "Hagenuk 电/液伺服器的零点是指当输入电流为 0 mA（或 4 mA）时，动力活\n塞所在位置应保证供____ 油量。\nA. 重起动\nB.起动\nC.最低转速\nD.最低稳定转速", "day": 2}, {"id": 468, "number": 78, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第二节 主机遥控系统的结构和功能 （主要是气电转换器和", "stem": "用电动逻辑和控制回路组成的主机遥控系统的主要缺点是_______ 。", "options": {"A": "信号传递滞后", "B": "对主机转速控制不易稳定", "C": "管理复杂", "D": "对主机变工况适应能力差"}, "answer": "C", "answerText": "管理复杂", "raw": "用电动逻辑和控制回路组成的主机遥控系统的主要缺点是_______ 。\nA.信号传递滞后\nB.对主机转速控制不易稳定\nC.管理复杂\nD.对主机变工况适应能力差", "day": 2}, {"id": 469, "number": 79, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第二节 主机遥控系统的结构和功能 （主要是气电转换器和", "stem": "在船舶正常航行过程中，主机控制系统出现扫气压力限制，造成主机转速下\n降现象，应急的操纵方法是____。", "options": {"A": "空压机手动控制", "B": "辅助鼓风机手动控制", "C": "轮机长最大转速提高", "D": "燃油供油压力提高"}, "answer": "B", "answerText": "辅助鼓风机手动控制", "raw": "在船舶正常航行过程中，主机控制系统出现扫气压力限制，造成主机转速下\n降现象，应急的操纵方法是____。\nA.空压机手动控制\nB.辅助鼓风机手动控制\nC.轮机长最大转速提高\nD.燃油供油压力提高", "day": 2}, {"id": 470, "number": 80, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第二节 主机遥控系统的结构和功能 （主要是气电转换器和", "stem": "航行中，出现恶劣海况，选择“恶劣海况控制模式”后，主机出现断油，则\n应_______。", "options": {"A": "使主机降速运行至半速以下", "B": "适当降低转速设定值", "C": "立即复位，回复转速到原设定值", "D": "按取消限制按钮"}, "answer": "B", "answerText": "适当降低转速设定值", "raw": "航行中，出现恶劣海况，选择“恶劣海况控制模式”后，主机出现断油，则\n应_______。\nA. 使主机降速运行至半速以下\nB. 适当降低转速设定值\nC. 立即复位，回复转速到原设定值\nD. 按取消限制按钮", "day": 2}, {"id": 471, "number": 81, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第二节 主机遥控系统的结构和功能 （主要是气电转换器和", "stem": "在船舶航行过程中，如出现油量控制环节执行机构卡死，转速不能有效调\n节。轮机员应_______。", "options": {"A": "电话告知驾驶员，小心驾驶", "B": "转为集控室控制，通过操纵杆直接控制油量", "C": "转为机旁控制", "D": "转为集控室控制，并使用负荷限制控制供油量"}, "answer": "C", "answerText": "转为机旁控制", "raw": "在船舶航行过程中，如出现油量控制环节执行机构卡死，转速不能有效调\n节。轮机员应_______。\nA. 电话告知驾驶员，小心驾驶\nB. 转为集控室控制，通过操纵杆直接控制油量\nC. 转为机旁控制\nD. 转为集控室控制，并使用负荷限制控制供油量", "day": 2}, {"id": 472, "number": 1, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动阀件)", "stem": "遥控系统中，常用的气动阀件可分为逻辑元件、时序元件和比例元件等。下列\n各类气动阀件中，_____ 属于逻辑元件。", "options": {"A": "单向节流阀", "B": "气控二位三通阀", "C": "速放阀", "D": "分级延时阀"}, "answer": "B", "answerText": "气控二位三通阀", "raw": "遥控系统中，常用的气动阀件可分为逻辑元件、时序元件和比例元件等。下列\n各类气动阀件中，_____ 属于逻辑元件。\nA.单向节流阀\nB.气控二位三通阀\nC.速放阀\nD.分级延时阀", "day": 2}, {"id": 473, "number": 2, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动阀件)", "stem": "气动主机遥控系统的常见逻辑控制元件有_______ 。\n①联动阀;②三位四通阀;③单向节流阀;④双座止回阀", "options": {"A": "①②", "B": "①②④", "C": "②③④", "D": "①③④"}, "answer": "B", "answerText": "①②④", "raw": "气动主机遥控系统的常见逻辑控制元件有_______ 。\n①联动阀;②三位四通阀;③单向节流阀;④双座止回阀\nA.①②\nB.①②④\nC.②③④\nD.①③④", "day": 2}, {"id": 474, "number": 3, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动阀件)", "stem": "在气动遥控系统中，三位四通阀常用作_______。", "options": {"A": "换向阀", "B": "调速控制阀", "C": "压力控制阀", "D": "换向检测"}, "answer": "A", "answerText": "换向阀", "raw": "在气动遥控系统中，三位四通阀常用作_______。\nA.换向阀\nB.调速控制阀\nC.压力控制阀\nD.换向检测", "day": 2}, {"id": 475, "number": 4, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动阀件)", "stem": "在放速阀中，橡胶膜片 2 的作用是______。", "options": {"A": "密封进气口 A", "B": "密封出气口 B", "C": "A 口压力大于 B 口时，密封通大气口 4", "D": "B 口压力大于 A 口时，密封通大气口 4"}, "answer": "C", "answerText": "A 口压力大于 B 口时，密封通大气口 4", "raw": "在放速阀中，橡胶膜片 2 的作用是______。\nA.密封进气口 A\nB.密封出气口 B\nC.A 口压力大于 B 口时，密封通大气口 4\nD.B 口压力大于 A 口时，密封通大气口 4", "day": 2}, {"id": 476, "number": 5, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动阀件)", "stem": "主机转速设定精密调压阀如图所示，当车钟手柄向加速方向扳动时，进排气球\n阀的状态是上球阀和下球阀的状态分别_____，使输出压力增大。", "options": {"A": "打开，打开", "B": "关闭，关闭", "C": "打开，关闭", "D": "关闭，打开"}, "answer": "C", "answerText": "打开，关闭", "raw": "主机转速设定精密调压阀如图所示，当车钟手柄向加速方向扳动时，进排气球\n阀的状态是上球阀和下球阀的状态分别_____，使输出压力增大。\nA.打开，打开\nB.关闭，关闭\nC.打开，关闭\nD.关闭，打开", "day": 2}, {"id": 477, "number": 6, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动阀件)", "stem": "主机遥控系统从结构上看应包括_______。\n①工况检测单元;②安全保护装置;③遥控装置;④遥控操纵台；⑤机旁操纵及执行\n机构;⑥参数调整单元", "options": {"A": "①②③⑤", "B": "①③④⑥", "C": "②③⑤⑥", "D": "②③④⑤"}, "answer": "D", "answerText": "②③④⑤", "raw": "主机遥控系统从结构上看应包括_______。\n①工况检测单元;②安全保护装置;③遥控装置;④遥控操纵台；⑤机旁操纵及执行\n机构;⑥参数调整单元\nA.①②③⑤\nB.①③④⑥\nC.②③⑤⑥\nD.②③④⑤", "day": 2}, {"id": 478, "number": 7, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动阀件)", "stem": "在主机遥控系统的功能中，应包括________。", "options": {"A": "主机滑油压力的监视与报警", "B": "主机转速的自动调节", "C": "主机冷却水温度的自动调节", "D": "燃油滤器的自动清洗"}, "answer": "B", "answerText": "主机转速的自动调节", "raw": "在主机遥控系统的功能中，应包括________。\nA.主机滑油压力的监视与报警\nB.主机转速的自动调节\nC.主机冷却水温度的自动调节\nD.燃油滤器的自动清洗", "day": 2}, {"id": 479, "number": 8, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动阀件)", "stem": "________不属于气动主机遥控系 簧螺钉 10", "C": "使顶锥与上滑阀之间垫片减薄", "D": "使顶锥与上滑阀之间垫片加厚"}, "answer": "A", "answerText": "扭松可调弹簧螺钉 10", "raw": "在转速设定精密调压阀中， 为使最小设定转速所对应的输出气压信号都略低\n一些，其调整方法通常是______。\nA.扭松可调弹簧螺钉 10\nB.扭紧可调弹簧螺钉 10\nC.使顶锥与上滑阀之间垫片减薄\nD.使顶锥与上滑阀之间垫片加厚", "day": 2}, {"id": 502, "number": 32, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动阀件)", "stem": "气动主机遥控系统的气源如图所示，通常在船舶进、出港情况下气源选择阀\n5 置________使用。", "options": {"A": "阀位 IV", "B": "阀位 II 或 BI", "C": "阀位 II 或 W", "D": "阀位 I"}, "answer": "D", "answerText": "阀位 I", "raw": "气动主机遥控系统的气源如图所示，通常在船舶进、出港情况下气源选择阀\n5 置________使用。\nA.阀位 IV\nB.阀位 II 或 BI\nC.阀位 II 或 W\nD.阀位 I", "day": 2}, {"id": 503, "number": 33, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动阀件)", "stem": "在 MAN B&W S -MC/MCE 主机操纵系统中，换向操作过程中出现单缸不能\n换向或换向不到位的异常情况时，主机_______。", "options": {"A": "其他缸换向动作受影响", "B": "换向后该缸不能发火", "C": "停车并报警", "D": "自动再次换向"}, "answer": "B", "answerText": "换向后该缸不能发火", "raw": "在 MAN B&W S -MC/MCE 主机操纵系统中，换向操作过程中出现单缸不能\n换向或换向不到位的异常情况时，主机_______。\nA.其他缸换向动作受影响\nB.换向后该缸不能发火\nC.停车并报警\nD.自动再次换向", "day": 2}, {"id": 504, "number": 34, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动阀件)", "stem": "在主机遥控系统中，三位四通阀两个控制端直接与_______连接。", "options": {"A": "凸轮轴在正、倒车位置信号", "B": "主机正、倒车转向信号", "C": "多路阀输出的信号", "D": "车钟手柄控制的正、倒车信号"}, "answer": "C", "answerText": "多路阀输出的信号", "raw": "在主机遥控系统中，三位四通阀两个控制端直接与_______连接。\nA.凸轮轴在正、倒车位置信号\nB.主机正、倒车转向信号\nC.多路阀输出的信号\nD.车钟手柄控制的正、倒车信号", "day": 2}, {"id": 505, "number": 35, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动阀件)", "stem": "在主机遥控系统中，把车钟手柄从正车扳到倒车位，在换向过程中，三位四\n通阀两个输出端 A 和 B 的状态分别为_______。", "options": {"A": "A=O， B=O", "C": "A=O， B=1", "B": "A=1， B=O", "D": "A=1， B=1"}, "answer": "C", "answerText": "A=O， B=1", "raw": "在主机遥控系统中，把车钟手柄从正车扳到倒车位，在换向过程中，三位四\n通阀两个输出端 A 和 B 的状态分别为_______。\nA. A=O， B=O\nC. A=O， B=1\nB. A=1， B=O\nD. A=1， B=1", "day": 2}, {"id": 506, "number": 36, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动阀件)", "stem": "在船舶机舱气动控制设备中常使用减压阀和滤器。如出现脏堵情况，系统运\n行中通常会出现_______。", "options": {"A": "阀门打不开", "C": "动作缓慢", "B": "动作停不下来", "D": "主空压机会因长时工作而过载"}, "answer": "C", "answerText": "动作缓慢", "raw": "在船舶机舱气动控制设备中常使用减压阀和滤器。如出现脏堵情况，系统运\n行中通常会出现_______。\nA.阀门打不开\nC.动作缓慢\nB.动作停不下来\nD.主空压机会因长时工作而过载", "day": 2}, {"id": 507, "number": 37, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动阀件)", "stem": "在船舶机舱气动控制设备中，如出现系统中一些阀件动作缓慢，有的甚至阀\n门不能打开，不需要检查______。", "options": {"A": "减压阀和滤器", "C": "空气瓶送来的空气压力", "B": "漏气的阀件", "D": "主空压机"}, "answer": "D", "answerText": "主空压机", "raw": "在船舶机舱气动控制设备中，如出现系统中一些阀件动作缓慢，有的甚至阀\n门不能打开，不需要检查______。\nA.减压阀和滤器\nC.空气瓶送来的空气压力\nB.漏气的阀件\nD.主空压机", "day": 2}, {"id": 508, "number": 38, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动阀件)", "stem": "在船舶机舱气动控制设备中常用气缸去推动机械动作。 如出现某个气缸出力\n不够，动作缓慢但能够动作，应检查______。", "options": {"A": "气源的减压阀", "B": "气缸弹簧", "C": "气缸密封老化而漏气", "D": "气路的滤器"}, "answer": "C", "answerText": "气缸密封老化而漏气", "raw": "在船舶机舱气动控制设备中常用气缸去推动机械动作。 如出现某个气缸出力\n不够，动作缓慢但能够动作，应检查______。\nA.气源的减压阀\nB.气缸弹簧\nC.气缸密封老化而漏气\nD.气路的滤器", "day": 2}, {"id": 509, "number": 39, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动阀件)", "stem": "气动主机遥控系统的气源如图所示， 通常在船舶海上正常航行状态下气源选\n择阀 5 置______使用。", "options": {"A": "阀位 IV", "B": "阀位 II 或Ⅲ", "C": "阀位 I 或Ⅳ", "D": "阀位 I"}, "answer": "B", "answerText": "阀位 II 或Ⅲ", "raw": "气动主机遥控系统的气源如图所示， 通常在船舶海上正常航行状态下气源选\n择阀 5 置______使用。\nA.阀位 IV\nB.阀位 II 或Ⅲ\nC.阀位 I 或Ⅳ\nD.阀位 I", "day": 2}, {"id": 510, "number": 1, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "________是全气动主机遥控系统的缺点。", "options": {"A": "易受振动影响", "B": "管理复杂", "C": "易受温度影响", "D": "可能产生滞后现象"}, "answer": "D", "answerText": "可能产生滞后现象", "raw": "________是全气动主机遥控系统的缺点。\nA.易受振动影响\nB.管理复杂\nC.易受温度影响\nD.可能产生滞后现象", "day": 2}, {"id": 511, "number": 2, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "主机遥控系统依据所用元部件类型，主要分为_______ 。 ①气动式主机遥控\n系统；②微机式主机遥控系统；③电气混合式主机遥控系统；④转矩限制主机遥\n控系统；⑤自动组合式主机遥控系统；⑥电动式主机遥控系统", "options": {"A": "①②③⑤", "B": "①②③⑥", "C": "②③④⑤", "D": "①②③⑤⑥"}, "answer": "B", "answerText": "①②③⑥", "raw": "主机遥控系统依据所用元部件类型，主要分为_______ 。 ①气动式主机遥控\n系统；②微机式主机遥控系统；③电气混合式主机遥控系统；④转矩限制主机遥\n控系统；⑤自动组合式主机遥控系统；⑥电动式主机遥控系统\nA.①②③⑤\nB.①②③⑥\nC.②③④⑤\nD.①②③⑤⑥", "day": 2}, {"id": 512, "number": 3, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "电动式主机遥控系统的遥控装置及执行机构由________组成。", "options": {"A": "气动元件", "B": "液动元件", "C": "电动元件", "D": "热力元件"}, "answer": "C", "answerText": "电动元件", "raw": "电动式主机遥控系统的遥控装置及执行机构由________组成。\nA.气动元件\nB.液动元件\nC.电动元件\nD.热力元件", "day": 2}, {"id": 513, "number": 4, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在气动遥控系统中，机旁应急操纵台未设置________。", "options": {"A": "油门调节手轮", "B": "锁紧手柄", "C": "压紧手轮", "D": "驾控/机旁转换阀"}, "answer": "D", "answerText": "驾控/机旁转换阀", "raw": "在气动遥控系统中，机旁应急操纵台未设置________。\nA.油门调节手轮\nB.锁紧手柄\nC.压紧手轮\nD.驾控/机旁转换阀", "day": 2}, {"id": 514, "number": 5, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在 MAN B&W MC 气动操纵系统中，在集控室遥控主机时，驾驶室与集控室\n的遥控主车钟作 用是_____", "options": {"A": "驾驶室主车钟用作主机的操纵控制", "B": "驾驶室主车钟既作为传令车钟又用作主机的操纵控制", "C": "集控主车钟仅用作传令车钟", "D": "集控室主车钟不仅用于传令车钟，而且还用作正、倒车操纵控制"}, "answer": "D", "answerText": "集控室主车钟不仅用于传令车钟，而且还用作正、倒车操纵控制", "raw": "在 MAN B&W MC 气动操纵系统中，在集控室遥控主机时，驾驶室与集控室\n的遥控主车钟作 用是_____\nA.驾驶室主车钟用作主机的操纵控制\nB.驾驶室主车钟既作为传令车钟又用作主机的操纵控制\nC.集控主车钟仅用作传令车钟\nD.集控室主车钟不仅用于传令车钟，而且还用作正、倒车操纵控制", "day": 2}, {"id": 515, "number": 6, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "气动主机遥控系统中，遥控车钟或手柄下面的控制阀有_______ 。", "options": {"A": "正、倒车控制阀", "B": "正、倒车控制阀和停车阀", "C": "正、倒车控制阀和设定转速精密调压阀", "D": "正、倒车控制阀、停车阀、设定转速精密调压阀"}, "answer": "C", "answerText": "正、倒车控制阀和设定转速精密调压阀", "raw": "气动主机遥控系统中，遥控车钟或手柄下面的控制阀有_______ 。\nA.正、倒车控制阀\nB.正、倒车控制阀和停车阀\nC.正、倒车控制阀和设定转速精密调压阀\nD.正、倒车控制阀、停车阀、设定转速精密调压阀", "day": 2}, {"id": 516, "number": 7, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在气动主机遥控系统中，转速发讯装置常采用______ ，手柄在停车位置时其\n输出为_________ 。", "options": {"A": "比例阀；0", "B": "转速设定精密调压阀；0", "C": "比例阀；0.05 MPa", "D": "转速设定精密调压阀；0.05 MPa"}, "answer": "D", "answerText": "转速设定精密调压阀；0.05 MPa", "raw": "在气动主机遥控系统中，转速发讯装置常采用______ ，手柄在停车位置时其\n输出为_________ 。\nA.比例阀；0\nB.转速设定精密调压阀；0\nC.比例阀；0.05 MPa\nD.转速设定精密调压阀；0.05 MPa", "day": 2}, {"id": 517, "number": 8, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在 AUTOCHIEF-Ⅳ型主机遥控系统中，驾驶台遥控车钟用作转向车令发讯和\n转速车令发讯元件是 。", "options": {"A": "电子开关和精密转速设定电位器", "B": "微动开关和精密转速设定电位器", "C": "电子开关和精密转速调节器", "D": "微动开关和精密转速控制器"}, "answer": "B", "answerText": "微动开关和精密转速设定电位器", "raw": "在 AUTOCHIEF-Ⅳ型主机遥控系统中，驾驶台遥控车钟用作转向车令发讯和\n转速车令发讯元件是 。\nA.电子开关和精密转速设定电位器\nB.微动开关和精密转速设定电位器\nC.电子开关和精密转速调节器\nD.微动开关和精密转速控制器", "day": 2}, {"id": 518, "number": 9, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在船舶上通常设有主、副车钟，副车钟的作用是_______ 。", "options": {"A": "当主车钟出现故障时代替主车钟", "B": "与主车钟轮换使用", "C": "仅用于驾驶室与机旁之间的备车、完车和定速航行三个车令的联系", "D": "用于驾驶室与集控室之间的备车、完车和定速航行三个车令的联系"}, "answer": "D", "answerText": "用于驾驶室与集控室之间的备车、完车和定速航行三个车令的联系", "raw": "在船舶上通常设有主、副车钟，副车钟的作用是_______ 。\nA.当主车钟出现故障时代替主车钟\nB.与主车钟轮换使用\nC.仅用于驾驶室与机旁之间的备车、完车和定速航行三个车令的联系\nD.用于驾驶室与集控室之间的备车、完车和定速航行三个车令的联系", "day": 2}, {"id": 519, "number": 10, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "主机遥控系统中，副车钟的作用为_______ 。", "options": {"A": "发送正车、停车", "B": "发送前进、后退", "C": "发送停车、前进、后退各挡车令", "D": "发送备车、完车、定速航行等指令"}, "answer": "D", "answerText": "发送备车、完车、定速航行等指令", "raw": "主机遥控系统中，副车钟的作用为_______ 。\nA.发送正车、停车\nB.发送前进、后退\nC.发送停车、前进、后退各挡车令\nD.发送备车、完车、定速航行等指令", "day": 2}, {"id": 520, "number": 11, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "主机遥控系统中，副车钟的作用为 _____", "options": {"A": "完成控制主机转速的作用", "B": "实现通信作用", "C": "传送与主机操纵有关的联络信息", "D": "发送停车、前进、后退各挡车令"}, "answer": "C", "answerText": "传送与主机操纵有关的联络信息", "raw": "主机遥控系统中，副车钟的作用为 _____\nA.完成控制主机转速的作用\nB.实现通信作用\nC.传送与主机操纵有关的联络信息\nD.发送停车、前进、后退各挡车令", "day": 2}, {"id": 521, "number": 制阀不受控\nD.起动控制阀不受控、停油控制阀受控", "day": 2}, {"id": 526, "number": 17, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在 MAN B&W S -MC/MCE 主机气动操纵系统中，喷油定时自动调节机构的\n主要作用 是________", "options": {"A": "增大喷油提前角", "B": "减小喷油提前角", "C": "稳定爆压", "D": "降低油耗"}, "answer": "D", "answerText": "降低油耗", "raw": "在 MAN B&W S -MC/MCE 主机气动操纵系统中，喷油定时自动调节机构的\n主要作用 是________\nA.增大喷油提前角\nB.减小喷油提前角\nC.稳定爆压\nD.降低油耗", "day": 2}, {"id": 527, "number": 18, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "下列________不是 MAN B&W MC 型主机气动操纵系统的连锁保护。", "options": {"A": "换向-起动连锁", "B": "起动过程中空气分配器换向的锁定", "C": "起动过程中起动阀起动的锁定", "D": "盘车机连锁"}, "answer": "C", "answerText": "起动过程中起动阀起动的锁定", "raw": "下列________不是 MAN B&W MC 型主机气动操纵系统的连锁保护。\nA.换向-起动连锁\nB.起动过程中空气分配器换向的锁定\nC.起动过程中起动阀起动的锁定\nD.盘车机连锁", "day": 2}, {"id": 528, "number": 19, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "MAN B&W MC 型主机气动操纵系统中，主机在约 50%标定功率以下的低负\n荷区运行时， 喷油提前角________VIT 机构________ 。", "options": {"A": "最小；不起作用", "B": "最小；刚起作用", "C": "最大；不起作用", "D": "最大；刚起作用"}, "answer": "A", "answerText": "最小；不起作用", "raw": "MAN B&W MC 型主机气动操纵系统中，主机在约 50%标定功率以下的低负\n荷区运行时， 喷油提前角________VIT 机构________ 。\nA.最小；不起作用\nB.最小；刚起作用\nC.最大；不起作用\nD.最大；刚起作用", "day": 2}, {"id": 529, "number": 20, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "MAN B&W S -MC/MCE 主机操纵系统气路部分简图如下，停车阀 64 刚解除\n受压时操作手 柄 B 在________ 。", "options": {"A": "停车位置", "B": "只要离开停车位置", "C": "刚刚推过“起动（START）”位置", "D": "刚刚拉回“起动（START）”位置"}, "answer": "C", "answerText": "刚刚推过“起动（START）”位置", "raw": "MAN B&W S -MC/MCE 主机操纵系统气路部分简图如下，停车阀 64 刚解除\n受压时操作手 柄 B 在________ 。\nA.停车位置\nB.只要离开停车位置\nC.刚刚推过“起动（START）”位置\nD.刚刚拉回“起动（START）”位置", "day": 2}, {"id": 530, "number": 21, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "MAN B&W S-MC/MCE 主机操纵系统气路部分简图如下，慢转起动结束以后\n的起动过程 中主、辅起动阀的开度情况是___ 。", "options": {"A": "主阀关，辅阀开", "B": "主、辅阀全关", "C": "主、辅阀全开", "D": "主阀开，辅阀关"}, "answer": "C", "answerText": "主、辅阀全开", "raw": "MAN B&W S-MC/MCE 主机操纵系统气路部分简图如下，慢转起动结束以后\n的起动过程 中主、辅起动阀的开度情况是___ 。\nA.主阀关，辅阀开\nB.主、辅阀全关\nC.主、辅阀全开\nD.主阀开，辅阀关", "day": 2}, {"id": 531, "number": 22, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中，若想转到机旁操纵，则有效的操作是_______", "options": {"A": "把应急操纵台上调速手柄放在全速位置", "B": "把手动/自动转换开关转到自动", "C": "集控室控制台的调速手柄放在全速位置", "D": "应急操纵台上手动/自动转换开关转到手动"}, "answer": "D", "answerText": "应急操纵台上手动/自动转换开关转到手动", "raw": "在主机遥控系统中，若想转到机旁操纵，则有效的操作是_______\nA.把应急操纵台上调速手柄放在全速位置\nB.把手动/自动转换开关转到自动\nC.集控室控制台的调速手柄放在全速位置\nD.应急操纵台上手动/自动转换开关转到手动", "day": 2}, {"id": 532, "number": 23, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "主机操纵部位选择的优先级由低到高的是_______", "options": {"A": "驾驶室→集控室→机旁", "B": "集控室→驾驶室→机旁", "C": "机旁→集控室→驾驶室", "D": "机旁→驾驶室→集控室"}, "answer": "A", "answerText": "驾驶室→集控室→机旁", "raw": "主机操纵部位选择的优先级由低到高的是_______\nA.驾驶室→集控室→机旁\nB.集控室→驾驶室→机旁\nC.机旁→集控室→驾驶室\nD.机旁→驾驶室→集控室", "day": 2}, {"id": 533, "number": 24, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中，驾驶台不能单独进行的操作是_______ 。", "options": {"A": "主机起动", "B": "主机换向", "C": "应急操作", "D": "操作部位切换"}, "answer": "D", "answerText": "操作部位切换", "raw": "在主机遥控系统中，驾驶台不能单独进行的操作是_______ 。\nA.主机起动\nB.主机换向\nC.应急操作\nD.操作部位切换", "day": 2}, {"id": 534, "number": 25, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中，操纵部位转换阀有________，分别设在________", "options": {"A": "2 个；机旁、集中控制室", "B": "2 个；机旁、驾驶台", "C": "2 个；集中控制室、驾驶台", "D": "3 个；机旁、集中控制室、驾驶台"}, "answer": "A", "answerText": "2 个；机旁、集中控制室", "raw": "在主机遥控系统中，操纵部位转换阀有________，分别设在________\nA. 2 个；机旁、集中控制室\nB. 2 个；机旁、驾驶台\nC. 2 个；集中控制室、驾驶台\nD. 3 个；机旁、集中控制室、驾驶台", "day": 2}, {"id": 535, "number": 26, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在航行中，驾驶台与集中控制室操纵部位转换时做到无扰动切换的条件是\n_______", "options": {"A": "两处手柄都在停车位置", "B": "两处手柄在同一方向即可", "C": "两处手柄在同一方向，且设定转速相等", "D": "两处手柄非同一方向，且设定转速相等"}, "answer": "C", "answerText": "两处手柄在同一方向，且设定转速相等", "raw": "在航行中，驾驶台与集中控制室操纵部位转换时做到无扰动切换的条件是\n_______\nA. 两处手柄都在停车位置\nB. 两处手柄在同一方向即可\nC. 两处手柄在同一方向，且设定转速相等\nD. 两处手柄非同一方向，且设定转速相等", "day": 2}, {"id": 536, "number": 27, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "驾驶室与集控室之间的操纵部位转换必须满足的条件是_______", "options": {"A": "集控室遥控车钟发出的转速设定值必须与驾驶室遥控车钟发出的相等", "B": "集控室遥控车钟发出的车令必须与驾驶室遥控车钟发出的车令一致", "C": "机旁遥控车钟发出的转速设定值必须与驾驶室遥控车钟发出的相等", "D": "机旁遥控车钟发出的车令必须与驾驶室遥控车钟发出车令一致"}, "answer": "B", "answerText": "集控室遥控车钟发出的车令必须与驾驶室遥控车钟发出的车令一致", "raw": "驾驶室与集控室之间的操纵部位转换必须满足的条件是_______\nA. 集控室遥控车钟发出的转速设定值必须与驾驶室遥控车钟发出的相等\nB. 集控室遥控车钟发出的车令必须与驾驶室遥控车钟发出的车令一致\nC. 机旁遥控车钟发出的转速设定值必须与驾驶室遥控车钟发出的相等\nD. 机旁遥控车钟发出的车令必须与驾驶室遥控车钟发出车令一致", "day": 2}, {"id": 537, "number": 28, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "MAN B&W MC/MCE主机操纵系统气路原理图部分简图如下， 其中操纵部位\n转换阀 80 的种类和阀位的作用分别是_______ 。", "options": {"A": "二位三通阀；上位用于集控，下位用于驾控", "B": "二位三通阀；上位用于驾控，下位用于集控", "C": "二位五通阀；上位用于集控，下位用于驾控", "D": "二位五通阀；上位用于驾控，下位用于集控"}, "answer": "C", "answerText": "二位五通阀；上位用于集控，下位用于驾控", "raw": "MAN B&W MC/MCE主机操纵系统气路原理图部分简图如下， 其中操纵部位\n转换阀 80 的种类和阀位的作用分别是_______ 。\nA. 二位三通阀；上位用于集控，下位用于驾控\nB. 二位三通阀；上位用于驾控，下位用于集控\nC. 二位五通阀；上位用于集控，下位用于驾控\nD. 二位五通阀；上位用于驾控，下位用于集控", "day": 2}, {"id": 538, "number": 29, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中， 操纵部位有优先级之分， 其中优先级最低的是________，", "options": {"A": "驾驶台", "B": "机舱集控室", "C": "机旁", "D": "应急控制站"}, "answer": "A", "answerText": "驾驶台", "raw": "在主机遥控系统中， 操纵部位有优先级之分， 其中优先级最低的是________，\nA.驾驶台\nB.机舱集控室\nC.机旁\nD.应急控制站", "day": 2}, {"id": 539, "number": 30, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "主机如在从倒车向正车的换向操作过程结束后， 如凸轮轴正车位置指示灯闪\n烁，通常的处 理方法是________", "options": {"A": "请示船长后再重新起动", "B": "请示当班驾驶员后再重新起动", "C": "立即将操作手柄拉回到停车位置，重新起动", "D": "立即将操作手柄拉回到倒车位置，排除故障后再重新起动"}, "answer": "C", "answerText": "立即将操作手柄拉回到停车位置，重新起动", "raw": " 置重新起动\nD. 立即将车钟手柄扳回到停车位置重新起动", "day": 2}, {"id": 616, "number": 186, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中设置重复起动逻辑控制功能的主要目的是________。", "options": {"A": "加快主机起动过程", "B": "提高主机起动的成功率", "C": "保证主机起动成功后能自动转入转速控制", "D": "减少重复起动次数"}, "answer": "B", "answerText": "提高主机起动的成功率", "raw": "在主机遥控系统中设置重复起动逻辑控制功能的主要目的是________。\nA. 加快主机起动过程\nB. 提高主机起动的成功率\nC. 保证主机起动成功后能自动转入转速控制\nD. 减少重复起动次数", "day": 2}, {"id": 617, "number": 187, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "主机遥控系统的重复起动回路基本功能包括 _______ 。 ①取消慢转起动；\n②中断起动；③终止起动；④三次起动", "options": {"A": "①③④", "B": "②③④", "C": "①②④", "D": "①②③"}, "answer": "B", "answerText": "②③④", "raw": "主机遥控系统的重复起动回路基本功能包括 _______ 。 ①取消慢转起动；\n②中断起动；③终止起动；④三次起动\nA.①③④\nB.②③④\nC.①②④\nD.①②③", "day": 2}, {"id": 618, "number": 188, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在有三次重复起动的主机遥控系统中， 若三次起动均失败， 排除故障后要重\n新起动，必 须_______ 。", "options": {"A": "把车钟手柄搬到停车位置再起动", "B": "把车钟手柄搬到起动位置再采用重起动", "C": "把车钟手柄搬到倒车位置进行重起动", "D": "把车钟手柄搬到正车位置进行重起动"}, "answer": "A", "answerText": "把车钟手柄搬到停车位置再起动", "raw": "在有三次重复起动的主机遥控系统中， 若三次起动均失败， 排除故障后要重\n新起动，必 须_______ 。\nA. 把车钟手柄搬到停车位置再起动\nB. 把车钟手柄搬到起动位置再采用重起动\nC. 把车钟手柄搬到倒车位置进行重起动\nD. 把车钟手柄搬到正车位置进行重起动", "day": 2}, {"id": 619, "number": 189, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机气动重复起动系统中，若第一次起动成功测重复起动回路的工作\n_______", "options": {"A": "立即停止", "B": "延时至第二次起动前", "C": "延时至第三次起动前", "D": "延时至第三次重复总计时结束"}, "answer": "D", "answerText": "延时至第三次重复总计时结束", "raw": "在主机气动重复起动系统中，若第一次起动成功测重复起动回路的工作\n_______\nA.立即停止\nB.延时至第二次起动前\nC.延时至第三次起动前\nD.延时至第三次重复总计时结束", "day": 2}, {"id": 620, "number": 190, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "主机控制系统中，_______不会引起起动闭锁。", "options": {"A": "重复起动失败", "B": "起动空气压力低", "C": "主滑油泵未运行", "D": "淡水压力低"}, "answer": "D", "answerText": "淡水压力低", "raw": "主机控制系统中，_______不会引起起动闭锁。\nA.重复起动失败\nB.起动空气压力低\nC.主滑油泵未运行\nD.淡水压力低", "day": 2}, {"id": 621, "number": 191, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "主机控制系统中，_______情况下， 主机遥控系统起动失败信号才能被复位。", "options": {"A": "换到机旁控制", "B": "还在遥控，但是车钟回停车位", "C": "集控室控制时，操纵杆回到停车位置", "D": "驾驶室控制时，按下复位按钮"}, "answer": "B", "answerText": "还在遥控，但是车钟回停车位", "raw": "主机控制系统中，_______情况下， 主机遥控系统起动失败信号才能被复位。\nA. 换到机旁控制\nB. 还在遥控，但是车钟回停车位\nC. 集控室控制时，操纵杆回到停车位置\nD. 驾驶室控制时，按下复位按钮", "day": 2}, {"id": 622, "number": 192, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在船舶主机自动控制装置中， 如出现三次重复起动仍起动失败， 遥控系统应\n能_______ 。", "options": {"A": "停止，延时后再次起动", "B": "闭锁起动，给出报警，等待复位", "C": "控制起动回路断电后再次送电起动", "D": "报警并在车钟回零时自动复位"}, "answer": "B", "answerText": "闭锁起动，给出报警，等待复位", "raw": "在船舶主机自动控制装置中， 如出现三次重复起动仍起动失败， 遥控系统应\n能_______ 。\nA. 停止，延时后再次起动\nB. 闭锁起动，给出报警，等待复位\nC. 控制起动回路断电后再次送电起动\nD. 报警并在车钟回零时自动复位", "day": 2}, {"id": 623, "number": 193, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在船舶主机自动控制装置中， 如出现起动过程速度上升缓慢， 遥控系统应能\n_______", "options": {"A": "停止延时后，再次起动", "B": "闭锁起动，给出报警，等待复位", "C": "停止起动，转为集控室起动", "D": "继续起动，直至空气压力不够"}, "answer": "B", "answerText": "闭锁起动，给出报警，等待复位", "raw": "在船舶主机自动控制装置中， 如出现起动过程速度上升缓慢， 遥控系统应能\n_______\nA. 停止延时后，再次起动\nB. 闭锁起动，给出报警，等待复位\nC. 停止起动，转为集控室起动\nD. 继续起动，直至空气压力不够", "day": 2}, {"id": 624, "number": 194, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在船舶主机自动控制装置中， 如出现三次重复起动仍起动失败， 应检查系统\n的_______", "options": {"A": "起动阀动作回路", "B": "供油回路", "C": "扫气压力限制回路", "D": "辅助鼓风机是否自动运行"}, "answer": "B", "answerText": "供油回路", "raw": "在船舶主机自动控制装置中， 如出现三次重复起动仍起动失败， 应检查系统\n的_______\nA.起动阀动作回路\nB.供油回路\nC.扫气压力限制回路\nD.辅助鼓风机是否自动运行", "day": 2}, {"id": 625, "number": 195, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中，转速采用负荷控制的特点是________", "options": {"A": "主机转速不随外界负荷变化，油门开度改变", "B": "主机转速随外界负荷变化，油门开度不变", "C": "主机转速随外界负荷变化，油门开度改变", "D": "主机转速不随外界负荷变化，油门开度不变"}, "ans . 操纵手柄从“STOP”推到“START”位置", "day": 2}, {"id": 655, "number": 225, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中把操车手柄从倒车全速立即扳到正车某速度挡，其停油\n时刻发生在________。", "options": {"A": "车钟手柄离开倒车全速位置的瞬间", "B": "车钟手柄过停车位置时", "C": "车钟手柄扳到位时", "D": "在主机换向完成时"}, "answer": "B", "answerText": "车钟手柄过停车位置时", "raw": "在主机遥控系统中把操车手柄从倒车全速立即扳到正车某速度挡，其停油\n时刻发生在________。\nA. 车钟手柄离开倒车全速位置的瞬间\nB. 车钟手柄过停车位置时\nC. 车钟手柄扳到位时\nD. 在主机换向完成时", "day": 2}, {"id": 656, "number": 226, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中，能耗制动逻辑控制的特点之一是____", "options": {"A": "只消耗起动空气的能量", "B": "不消耗起动空气", "C": "主机转速低于发火转速", "D": "主机立即停转"}, "answer": "B", "answerText": "不消耗起动空气", "raw": "在主机遥控系统中，能耗制动逻辑控制的特点之一是____\nA.只消耗起动空气的能量\nB.不消耗起动空气\nC.主机转速低于发火转速\nD.主机立即停转", "day": 2}, {"id": 657, "number": 227, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "关于柴油机制动的错误认识是", "options": {"A": "能耗制动转速高于强制制动转速 0.5〜1 倍", "B": "能耗制动是在应急操纵情况下的制动方式", "C": "强制制动力矩大于能耗制动的方式", "D": "能耗制动时气缸起动阀的开启时刻恰好是该缸处于膨胀冲程之际"}, "answer": "D", "answerText": "能耗制动时气缸起动阀的开启时刻恰好是该缸处于膨胀冲程之际", "raw": "关于柴油机制动的错误认识是\nA. 能耗制动转速高于强制制动转速 0.5〜1 倍\nB. 能耗制动是在应急操纵情况下的制动方式\nC. 强制制动力矩大于能耗制动的方式\nD. 能耗制动时气缸起动阀的开启时刻恰好是该缸处于膨胀冲程之际", "day": 2}, {"id": 658, "number": 228, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机能耗制动过程中_______", "options": {"A": "主起动阀和空气分配器均关闭", "B": "主起动阀开启、空气分配器关闭", "C": "主起动阀关闭、空气分配器开启", "D": "主起动阀和空气分配器均开启"}, "answer": "C", "answerText": "主起动阀关闭、空气分配器开启", "raw": "在主机能耗制动过程中_______\nA. 主起动阀和空气分配器均关闭\nB. 主起动阀开启、空气分配器关闭\nC. 主起动阀关闭、空气分配器开启\nD. 主起动阀和空气分配器均开启", "day": 2}, {"id": 659, "number": 229, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "能耗制动时，对主机状态的错误理解是 _____ 。", "options": {"A": "主机转速高于发火转速", "B": "主起动阀打开，空气分配器工作", "C": "主机仍按原方向转动", "D": "主机已停油"}, "answer": "B", "answerText": "主起动阀打开，空气分配器工作", "raw": "能耗制动时，对主机状态的错误理解是 _____ 。\nA.主机转速高于发火转速\nB.主起动阀打开，空气分配器工作\nC.主机仍按原方向转动\nD.主机已停油", "day": 2}, {"id": 660, "number": 230, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "气动主机遥控系统当把手柄从正车全速扳到倒车位置时，并按下应急操作\n按钮，当凸轮 轴换向完成后，系统应首先进行________", "options": {"A": "强制制动", "B": "能耗制动", "C": "重起动", "D": "倒车制动"}, "answer": "B", "answerText": "能耗制动", "raw": "气动主机遥控系统当把手柄从正车全速扳到倒车位置时，并按下应急操作\n按钮，当凸轮 轴换向完成后，系统应首先进行________\nA.强制制动\nB.能耗制动\nC.重起动\nD.倒车制动", "day": 2}, {"id": 661, "number": 231, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中，能耗制动过程中必须停油的原因是_______ 。", "options": {"A": "此时主机转速太高", "B": "此时主机转速太低", "C": "燃油凸轮转速与主机转速不同", "D": "空气分配器和燃油凸轮工作的方向与主机转向不符"}, "answer": "D", "answerText": "空气分配器和燃油凸轮工作的方向与主机转向不符", "raw": "在主机遥控系统中，能耗制动过程中必须停油的原因是_______ 。\nA. 此时主机转速太高\nB. 此时主机转速太低\nC. 燃油凸轮转速与主机转速不同\nD. 空气分配器和燃油凸轮工作的方向与主机转向不符", "day": 2}, {"id": 662, "number": 232, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中，强制制动必须在_______ 的情况下进行。", "options": {"A": "车令与凸轴轮位置不符，转速降到应急换向转速", "B": "凸轮轴换向完毕后，空气分配器工作，主起动阀关闭", "C": "主机转速降到发火转速后，主起动阀与空气分配器均开启", "D": "主机转速降到零后，主起动阀与空气分配器均开启"}, "answer": "C", "answerText": "主机转速降到发火转速后，主起动阀与空气分配器均开启", "raw": "在主机遥控系统中，强制制动必须在_______ 的情况下进行。\nA. 车令与凸轴轮位置不符，转速降到应急换向转速\nB. 凸轮轴换向完毕后，空气分配器工作，主起动阀关闭\nC. 主机转速降到发火转速后，主起动阀与空气分配器均开启\nD. 主机转速降到零后，主起动阀与空气分配器均开启", "day": 2}, {"id": 663, "number": 233, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "船舶柴油机在进行强制制动时_______", "options": {"A": "车令与转向不符", "B": "车令与凸轮轴位置不符", "C": "高于换向转速", "D": "车令与转向相符"}, "answer": "A", "answerText": "车令与转向不符", "raw": "船舶柴油机在进行强制制动时_______\nA.车令与转向不符\nB.车令与凸轮轴位置不符\nC.高于换向转速\nD.车令与转向相符", "day": 2}, {"id": 664, "number": 234, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中， 主机在全速正车运行， 把车钟手柄从正车全速立即拉到\n倒车全速，主起动阀开始打开的时间为________", "options": {"A": "主机转速下降到换向转速", "B": "主机正车转速下降到发火转速", "C": "主机转速下降到零", "D": "主机转速达到倒车发火转速"}, "answer": "B", "answerText": "主机正车转速下降到发火转速", "raw": "在主机遥控系统中， 主机在全速正车运行， 把车钟手柄从正车全速立即拉到\n倒车全速，主起动阀开始打开的时间为________\nA.主机转速下降到换向转速\nB.主机正车转速下降到发火转速\nC.主机转速下降到零\nD.主机转速达到倒车发火转速", "day": 2}, {"id": 665, "number": 235, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "强制制动区别于正常起动的基本点是_______", "options": {"A": "车令与凸轮轴位置一致", "B": "车令与凸轮轴位置不一致", "C": "车令与转向一致", "D": "车令与转向不一致"}, "answer": "D", "answerText": "车令与转向不一致", "raw": "强制制动区别于正常起动的基本点是_______\nA.车令与凸轮轴位置一致\nB.车令与凸轮轴位置不一致\nC.车令与转向一致\nD.车令与转向不一致", "day": 2}, {"id": 666, "number": 236, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在气动主机遥控系统中， 若把车钟手柄从正车全速扳到倒车全速， 当凸轮轴\n换向结束后，系统会自动进行_______", "options": {"A": "重起动", "B": "强制制动", "C": "能耗制动", "D": "倒车起动"}, "answer": "B", "answerText": "强制制动", "raw": "在气动主机遥控系统中， 若把车钟手柄从正车全速扳到倒车全速， 当凸轮轴\n换向结束后，系统会自动进行_______\nA.重起动\nB.强制制动\nC.能耗制动\nD.倒车起动", "day": 2}, {"id": 667, "number": 237, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中，强制制动过程中必须停油的原因是_______ 。", "options": {"A": "空气分配器和燃油凸轮工作的方向与主机转向不符", "B": "空气分配器和燃油凸轮工作的方向与主机转速不符", "C": "此时主机转速与车钟要求不符", "D": "此时主机转速比车钟要求的高"}, "answer": "A", "answerText": "空气分配器和燃油凸轮工作的方向与主机转向不符", "raw": "在主机遥控系统中，强制制动过程中必须停油的原因是_______ 。\nA. 空气分配器和燃油凸轮工作的方向与主机转向不符\nB. 空气分配器和燃油凸轮工作的方向与主机转速不符\nC. 此时主机转速与车钟要求不符\nD. 此时主机转速比车钟要求的高", "day": 2}, {"id": 668, "number": 238, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控的转速控制系统中， 把车钟手柄从港内全速扳到海上全速时， 该\n转速控制是 属于________", "options": {"A": "定值控制", "B": "程序控制", "C": "逻辑控制", "D": "随动控制"}, "answer": "B", "answerText": "程序控制", "raw": "在主机遥控的转速控制系统中， 把车钟手柄从港内全速扳到海上全速时， 该\n转速控制是 属于________\nA.定值控制\nB.程序控制\nC.逻辑控制\nD.随动控制", "day": 2}, {"id": 669, "number": 239, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在油、 气并进的起动方案中， 把车钟手柄从全速正车扳到倒车某速度挡， 解\n除油门零位联 锁的时刻为_______", "options": {"A": "转速下降到换向转速", "B": "转速下降到低于发火转速", "C": "-转速下降到零", "D": "转速高于发火转速"}, "answer": "C", "answerText": "-转速下降到零", "raw": "在油、 气并进的起动方案中， 把车钟手柄从全速正车扳到倒车某速度挡， 解\n除油门零位联 锁的时刻为_______\nA.转速下降到换向转速\nB.转速下降到低于发火转速\nC.-转速下降到零\nD.转速高于发火转速", "day": 2}, {"id": 670, "number": 240, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在油、 气分进的起动方案中， 把车钟手柄从全速正车扳到倒车某速度挡， 解\n除油门零位联 锁的时刻为_______ 。", "options": {"A": "主机转速下降到换向转速", "B": "主机转速下降到低于发火转速", "C": "主机转速下降到零", "D": "车令与转向一致，且主机转速达到发火转速"}, "answer": "D", "answerText": "车令与转向一致，且主机转速达到发火转速", "raw": "在油、 气分进的起动方案中， 把车钟手柄从全速正车扳到倒车某速度挡， 解\n除油门零位联 锁的时刻为_______ 。\nA. 主机转速下降到换向转速\nB. 主机转速下降到低于发火转速\nC. 主机转速下降到零\nD. 车令与转向一致，且主机转速达到发火转速", "day": 2}, {"id": 671, "number": 241, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中，加速速率限制是指_______ 。", "options": {"A": "主机从起动成功到 30%额定转速的加速过程", "B": "主机从起动成功到 70%额定转速的加速过程", "C": "主机从 30%额定转速到 70%额定转速的加速过程", "D": "主机从 70%额定转速到 100%额定转速的加速过程"}, "answer": "C", "answerText": "主机从 30%额定转速到 70%额定转速的加速过程", "raw": "在主机遥控系统中，加速速率限制是指_______ 。\nA. 主机从起动成功到 30%额定转速的加速过程\nB. 主机从起动成功到 70%额定转速的加速过程\nC. 主机从 30%额定转速到 70%额定转速的加速过程\nD. 主机从 70%额定转速到 100%额定转速的加速过程", "day": 3}, {"id": 672, "number": 242, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在气动主机遥控系统中，组成加速速率限制功能的部件是_______。", "options": {"A": "分级延时阀加气容", "B": "单向节流阀加气容", "C": "分级延时阀加比例阀", "D": "调压阀加单向节流阀"}, "answer": "A", "answerText": "分级延时阀加气容", "raw": "在气动主机遥控系统中，组成加速速率限制功能的部件是_______。\nA.分级延时阀加气容\nB.单向节流阀加气容\nC.分级延时阀加比例阀\nD.调压阀加单向节流阀", "day": 3}, {"id": 673, "number": 243, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在气动遥控系统中，欲将 30%〜70%额定转速加速速率限制时间缩短，调整\n方法是___ 。", "options": {"A": "压紧分级延时阀弹簧", "B": "放松分级延时阀弹簧", "C": "开大分级延时阀的节流孔", "D": "关小分级延时阀的节流孔"}, "answer": "C", "answerText": "开大分级延时阀的节流孔", "raw": "在气动遥控系统中，欲将 30%〜70%额定转速加速速率限制时间缩短，调整\n方法是___ 。\nA.压紧分级延时阀弹簧\nB.放松分级延时阀弹簧\nC.开大分级延时阀的节流孔\nD.关小分级延时阀的节流孔", "day": 3}, {"id": 674, "number": 244, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在气动遥控系统中，欲将加速速率限制的起点由最大转速的 40%调到 30%，\n对于分级延时阀，应_______", "options": {"A": "压紧弹簧", "B": "调松弹簧", "C": "开大节流孔", "D": "关小节流孔"}, "answer": "B", "answerText": "调松弹簧", "raw": "在气动遥控系统中，欲将加速速率限制的起点由最大转速的 40%调到 30%，\n对于分级延时阀，应_______\nA.压紧弹簧\nB.调松弹簧\nC.开大节流孔\nD.关小节流孔", "day": 3}, {"id": 675, "number": 245, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "如图，在气动主机遥控系统中，为延长加速速率限制时间，应在分级延时阀\n上 。", "options": {"A": "扭紧调整弹簧", "B": "扭松调整弹簧", "C": "开大节流阀", "D": "关小节流阀"}, "answer": "D", "answerText": "关小节流阀", "raw": "如图，在气动主机遥控系统中，为延长加速速率限制时间，应在分级延时阀\n上 。\nA.扭紧调整弹簧\nB.扭松调整弹簧\nC.开大节流阀\nD.关小节流阀", "day": 3}, {"id": 676, "number": 246, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在气动遥控系统中气动加速速率限制回路如图所示， 如果分级延时阀B 的变\n节流孔部分堵塞，则会导致________。", "options": {"A": "加速速率变快", "B": "加速速率变慢", "C": "对加速过程没有影响", "D": "只对减速过程有影响"}, "answer": "B", "answerText": "加速速率变慢", "raw": "在气动遥控系统中气动加速速率限制回路如图所示， 如果分级延时阀B 的变\n节流孔部分堵塞，则会导致________。\nA.加速速率变快\nB.加速速率变慢\nC.对加速过程没有影响\nD.只对减速过程有影响", "day": 3}, {"id": 677, "number": 247, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中，设置加速速率限制功能的目的是", "options": {"A": "防止主机超转速", "B": "防止主机超负荷", "C": "防止主机加速过程振动太大", "D": "防止主机加速过程冒黑烟"}, "answer": "B", "answerText": "防止主机超负荷", "raw": "在主机遥控系统中，设置加速速率限制功能的目的是\nA.防止主机超转速\nB.防止主机超负荷\nC.防止主机加速过程振动太大\nD.防止主机加速过程冒黑烟", "day": 3}, {"id": 678, "number": 248, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在没有应急操纵按钮的主机控制系统在遥控操纵时，驾驶员直接拉车钟到\n倒车全速后，遥控系统在转速还是正转情况下，会出现_______ 。", "options": {"A": "保持停油控制", "B": "停油、正转时实现倒车换向并立即倒车起动", "C": "停油、倒车换向，强制制动", "D": "取消负荷限制功能"}, "answer": "C", "answerText": "停油、倒车换向，强制制动", "raw": "在没有应急操纵按钮的主机控制系统在遥控操纵时，驾驶员直接拉车钟到\n倒车全速后，遥控系统在转速还是正转情况下，会出现_______ 。\nA. 保持停油控制\nB. 停油、正转时实现倒车换向并立即倒车起动\nC. 停油、倒车换向，强制制动\nD. 取消负荷限制功能", "day": 3}, {"id": 679, "number": 249, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机转速自动控制中， 若出现主机转速无法达到车令设定转速， 而稳定在\n某一转速值时，其原因不可能是_______", "options": {"A": "车令设定转速已大于轮机长设定的最大转速限制值", "B": "车令设定转速已小于最低稳定转速", "C": "车令转速设置在主机临界转速区域内", "D": "车钟扳得太快，加速速率限制起作用"}, "answer": "D", "answerText": "车钟扳得太快，加速速率限制起作用", "raw": "在主机转速自动控制中， 若出现主机转速无法达到车令设定转速， 而稳定在\n某一转速值时，其原因不可能是_______\nA. 车令设定转速已大于轮机长设定的最大转速限制值\nB. 车令设定转速已小于最低稳定转速\nC. 车令转速设置在主机临界转速区域内\nD. 车钟扳得太快，加速速率限制起作用", "day": 3}, {"id": 680, "number": 250, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统的轮机长最大转速限制回路中，令 US 为车令设定转速值，\nUm 为轮机长最大允许转速值，Uo 为限制回路输出值，当 Us>Um 时，则", "options": {"A": "Uo=Us", "B": "Uo= Um", "C": "Uo<Um", "D": "Uo>Um"}, "answer": "A", "answerText": "Uo=Us", "raw": "在主机遥控系统的轮机长最大转速限制回路中，令 US 为车令设定转速值，\nUm 为轮机长最大允许转速值，Uo 为限制回路输出值，当 Us>Um 时，则\nA. Uo=Us\nB. Uo= Um\nC. Uo<Um\nD. Uo>Um", "day": 3}, {"id": 681, "number": 252, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中，轮机长最大转速限制的电位器是", "options": {"A": "机旁操纵台上", "B": "集中控制室的操纵台上", "C": "驾驶室的操纵台上", "D": "遥控装置上"}, "answer": "B", "answerText": "集中控制室的操纵台上", "raw": "在主机遥控系统中，轮机长最大转速限制的电位器是\nA.机旁操纵台上\nB.集中控制室的操纵台上\nC.驾驶室的操纵台上\nD.遥控装置上", "day": 3}, {"id": 682, "number": 253, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中，主机的最低稳定转速限制在_______ 情况下起作用。", "options": {"A": "按应急操纵按钮", "B": "车钟手柄设定转速大于最小转速设定值", "C": "车钟手柄设定转速小于最小转速设定值", "D": "港内全速以下加速"}, "answer": "C", "answerText": "车钟手柄设定转速小于最小转速设定值", "raw": "在主机遥控系统中，主机的最低稳定转速限制在_______ 情况下起作用。\nA.按应急操纵按钮\nB. 车钟手柄设定转速大于最小转速设定值\nC. 车钟手柄设定转速小于最小转速设定值\nD. 港内全速以下加速", "day": 3}, {"id": 683, "number": 254, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中，当主机在运行中按应急操纵按钮后，能取消的限制是\n_______ ①程序负荷限制；②轮机长最大转速限制；③最低稳定转速限制；④增\n压空气压力限制", "options": {"A": "①②③", "B": "①③④", "C": "①②④", "D": "②③④"}, "answer": "C", "answerText": "①②④", "raw": "在主机遥控系统中，当主机在运行中按应急操纵按钮后，能取消的限制是\n_______ ①程序负荷限制；②轮机长最大转速限 渐 。\nA.增大；增大\nB.增大；减小\nC 减少；减小\nD.减少；增大 .", "day": 3}, {"id": 704, "number": 276, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "当有开车指令时， 在主机遥控系统中， 主机_______ 的作用是能自动检查是\n否满足起动的逻辑条件。", "options": {"A": "重起动逻辑控制", "B": "制动逻辑控制回路", "C": "起动逻辑控制回路", "D": "重复起动逻辑控制"}, "answer": "C", "answerText": "起动逻辑控制回路", "raw": "当有开车指令时， 在主机遥控系统中， 主机_______ 的作用是能自动检查是\n否满足起动的逻辑条件。\nA.重起动逻辑控制\nB.制动逻辑控制回路\nC.起动逻辑控制回路\nD.重复起动逻辑控制", "day": 3}, {"id": 705, "number": 277, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中，起动的鉴别逻辑条件是_______", "options": {"A": "车令与转向一致", "B": "车令与凸轮轴位置一致", "C": "转速低于发火转速", "D": "停油"}, "answer": "B", "answerText": "车令与凸轮轴位置一致", "raw": "在主机遥控系统中，起动的鉴别逻辑条件是_______\nA.车令与转向一致\nB.车令与凸轮轴位置一致\nC.转速低于发火转速\nD.停油", "day": 3}, {"id": 706, "number": 278, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中，起动的准备逻辑条件是 Ysc，起动的鉴别逻辑为 Ysl，\n在起动过程中， 当主机转速达到发火转速时，则_______ 。", "options": {"A": "Ysc=0， Ysl=0", "B": "Ysc=0， Ysl=1", "C": "Ysc=1， Ysl=0", "D": "Ysc=1， Ysl=1"}, "answer": "B", "answerText": "Ysc=0， Ysl=1", "raw": "在主机遥控系统中，起动的准备逻辑条件是 Ysc，起动的鉴别逻辑为 Ysl，\n在起动过程中， 当主机转速达到发火转速时，则_______ 。\nA. Ysc=0， Ysl=0\nB. Ysc=0， Ysl=1\nC. Ysc=1， Ysl=0\nD. Ysc=1， Ysl=1", "day": 3}, {"id": 707, "number": 279, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中，用 Ysc 表示起动的准备逻辑条件，用 Ysl 表示起动的\n鉴别逻辑，当把车钟手柄从倒车低速挡扳到正车全速挡，且完成换向后，则\n_______", "options": {"A": "Ysc=0， Ysl=0", "B": "Ysc=0， Ysl=1", "C": "Ysc=1， Ysl=0", "D": "Ysc=1， Ysl=1"}, "answer": "D", "answerText": "Ysc=1， Ysl=1", "raw": "在主机遥控系统中，用 Ysc 表示起动的准备逻辑条件，用 Ysl 表示起动的\n鉴别逻辑，当把车钟手柄从倒车低速挡扳到正车全速挡，且完成换向后，则\n_______\nA. Ysc=0， Ysl=0\nB. Ysc=0， Ysl=1\nC. Ysc=1， Ysl=0\nD. Ysc=1， Ysl=1", "day": 3}, {"id": 708, "number": 280, "chapter": "第二章 主机自动控制装置的结构和功能", "section": "第三节 气动控制设备的特点(气动系统及气动系统识图)", "stem": "在主机遥控系统中，用 Ysc 表示起动的准备逻辑条件，用 Ysl 表示起动的\n鉴别逻辑， 现主机备车完毕后在停车状态 （车令中手柄在停车位置） ， 则________。
