<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>轮机自动化单题刷题</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#24665e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="轮机刷题">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.svg">
<style>
:root {
  --bg:#f5f6f0; --ink:#20231d; --muted:#67705e; --panel:#fffefa; --line:#d9decf;
  --accent:#24665e; --accent-2:#b75237; --ok:#267447; --bad:#a73b31; --soft:#edf3e8;
  --shadow:0 18px 42px rgba(31,38,28,.10);
}
* { box-sizing:border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--ink); line-height:1.55; }
.app { min-height:100vh; display:grid; grid-template-columns:300px minmax(0,1fr); }
.side { background:#eef2e7; border-right:1px solid var(--line); padding:22px; height:100vh; position:sticky; top:0; overflow:auto; }
h1 { font-size:22px; margin:0 0 6px; }
.sub { color:var(--muted); font-size:13px; margin-bottom:18px; }
.group { margin:18px 0; }
.label { font-size:12px; font-weight:800; color:var(--muted); margin-bottom:7px; }
.seg { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
button, select, input { border:1px solid var(--line); background:var(--panel); color:var(--ink); border-radius:8px; padding:10px 12px; font-size:14px; }
button { cursor:pointer; }
button.active, .primary { background:var(--accent); color:white; border-color:var(--accent); }
button.warn { background:#fff2ed; border-color:#e4b4a5; color:#8d2d1f; }
button:disabled { opacity:.55; cursor:not-allowed; }
.statgrid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.stat { border:1px solid var(--line); background:var(--panel); border-radius:8px; padding:10px; }
.stat b { display:block; font-size:21px; }
.main { padding:26px; display:grid; place-items:start center; }
.topbar { width:min(900px,100%); display:flex; gap:10px; align-items:center; justify-content:space-between; margin-bottom:14px; }
.search { flex:1; min-width:180px; }
.card { width:min(900px,100%); background:var(--panel); border:1px solid var(--line); border-radius:8px; box-shadow:var(--shadow); padding:24px; }
.meta { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
.tag { font-size:12px; color:var(--muted); border:1px solid var(--line); background:#fafbf6; border-radius:999px; padding:3px 8px; }
.progress { height:10px; border-radius:999px; background:#e3e8da; overflow:hidden; margin-bottom:16px; }
.bar { height:100%; width:0; background:var(--accent); transition:width .2s ease; }
.qtitle { font-size:18px; font-weight:800; margin-bottom:12px; }
.stem { white-space:pre-wrap; font-size:18px; margin-bottom:18px; }
.options { display:grid; gap:10px; }
.option { text-align:left; width:100%; border:1px solid var(--line); background:#fbfcf8; border-radius:8px; padding:13px 14px; font-size:16px; display:flex; gap:10px; align-items:flex-start; }
.option .letter { min-width:28px; height:28px; border-radius:50%; display:grid; place-items:center; background:var(--soft); font-weight:800; }
.option.correct { border-color:#79b58b; background:#eef8f0; }
.option.correct .letter { background:var(--ok); color:white; }
.option.wrong { border-color:#d59690; background:#fff0ee; }
.option.wrong .letter { background:var(--bad); color:white; }
.result { display:none; margin-top:16px; border-radius:8px; padding:13px 14px; font-weight:800; }
.result.ok { display:block; color:#174c2b; background:#edf8ef; border:1px solid #b9dabf; }
.result.bad { display:block; color:#76231c; background:#fff0ee; border:1px solid #e2b0aa; }
.actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; }
.actions button { min-width:110px; }
.hint { color:var(--muted); font-size:12px; margin-top:12px; }
.empty { width:min(900px,100%); text-align:center; padding:48px; color:var(--muted); background:var(--panel); border:1px solid var(--line); border-radius:8px; }
@media(max-width:820px) { .app { grid-template-columns:1fr; } .side { position:relative; height:auto; border-right:0; border-bottom:1px solid var(--line); } .main { padding:16px; } .topbar { flex-direction:column; align-items:stretch; } .stem { font-size:16px; } }

.mobile-head{display:block}.filter-toggle{display:none}
@media(max-width:820px){
  body{background:var(--panel)}
  .app{display:block;min-height:100vh}
  .side{position:sticky;top:0;z-index:20;height:auto;padding:10px 12px;border-bottom:1px solid var(--line);background:#eef2e7}
  .mobile-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
  h1{font-size:17px;margin:0}
  .sub{display:none}
  .filter-toggle{display:inline-flex;align-items:center;justify-content:center;padding:7px 10px;font-size:13px;background:var(--accent);color:#fff;border-color:var(--accent)}
  .filter-panel{display:none;margin-top:10px}
  .side.open .filter-panel{display:block}
  .statgrid{grid-template-columns:repeat(4,1fr);gap:6px}
  .stat{padding:6px;text-align:center}
  .stat b{font-size:16px}
  .stat span{font-size:11px}
  .group{margin:10px 0}
  .seg{grid-template-columns:repeat(3,1fr);gap:6px}
  button,select,input{border-radius:8px;padding:9px 10px;font-size:14px}
  .main{padding:8px 10px 18px;display:block}
  .topbar{position:sticky;top:49px;z-index:10;width:100%;margin:0 0 8px;padding:7px 0;background:var(--panel);gap:6px}
  .topbar .search{display:none}
  .topbar button{flex:1;padding:8px 10px;font-size:13px}
  .card{width:100%;min-height:calc(100vh - 122px);border:0;border-radius:0;box-shadow:none;padding:10px 2px 96px;background:var(--panel)}
  .progress{height:7px;margin:0 0 10px}
  .meta{gap:5px;margin-bottom:8px;max-height:30px;overflow:hidden}
  .tag{font-size:11px;padding:2px 6px}
  .qtitle{font-size:15px;margin-bottom:8px;color:var(--muted)}
  .stem{font-size:20px;line-height:1.55;margin-bottom:14px}
  .options{gap:9px}
  .option{font-size:17px;line-height:1.45;padding:13px 12px;border-radius:10px}
  .option .letter{min-width:30px;height:30px}
  .result{font-size:16px;margin-top:12px;padding:11px}
  .actions{position:fixed;left:0;right:0;bottom:0;z-index:25;margin:0;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:rgba(255,254,250,.96);border-top:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .actions button{min-width:0;width:100%;padding:11px 8px;font-size:14px}
  .actions button:nth-child(3),.actions button:nth-child(4){font-size:13px;padding:9px 8px}
  .hint{font-size:11px}
}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="mobile-head"><h1>单题刷题</h1><button class="filter-toggle" onclick="toggleFilters()">筛选</button></div>
    <div class="sub">可刷全部 1295 题：选答案，立刻判定，支持章节、错题、标星和顺序/随机。</div>
    <div id="filterPanel" class="filter-panel"><div class="statgrid">
      <div class="stat"><b id="total">0</b><span>当前题集</span></div>
      <div class="stat"><b id="pos">0</b><span>进度</span></div>
      <div class="stat"><b id="right">0</b><span>本轮对</span></div>
      <div class="stat"><b id="wrong">0</b><span>本轮错</span></div>
    </div>
    <div class="group">
      <div class="label">4 天计划</div>
      <div class="seg">
        <button class="active" data-day="all" onclick="setDay('all')">全部</button>
        <button data-day="1" onclick="setDay('1')">Day 1</button>
        <button data-day="2" onclick="setDay('2')">Day 2</button>
        <button data-day="3" onclick="setDay('3')">Day 3</button>
        <button data-day="4" onclick="setDay('4')">Day 4</button>
      </div>
    </div>
    <div class="group">
      <div class="label">题集</div>
      <div class="seg">
        <button class="active" data-mode="all" onclick="setMode('all')">全部</button>
        <button data-mode="todo" onclick="setMode('todo')">未做</button>
        <button data-mode="wrong" onclick="setMode('wrong')">错题</button>
        <button data-mode="star" onclick="setMode('star')">标星</button>
        <button data-mode="known" onclick="setMode('known')">会了</button>
      </div>
    </div>
    <div class="group">
      <div class="label">章节</div>
      <select id="chapter" style="width:100%"></select>
    </div>
    <div class="group">
      <div class="label">顺序</div>
      <div class="seg">
        <button class="active" data-order="normal" onclick="setOrder('normal')">顺序</button>
        <button data-order="shuffle" onclick="setOrder('shuffle')">随机</button>
      </div>
    </div>
    <button class="warn" style="width:100%; margin-top:8px" onclick="resetRound()">重开本轮</button>
    <button class="primary" style="width:100%; margin-top:8px" onclick="location.href='exam.html'">50题模拟考试</button>
    <button style="width:100%; margin-top:8px" onclick="location.href='list.html'">背诵列表</button>
    <div class="hint">快捷键：A/B/C/D 或 1/2/3/4 选答案，Enter 下一题，S 标星。</div></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <input id="query" class="search" placeholder="搜题号、关键词、章节">
      <button onclick="prevQuestion()">上一题</button>
      <button class="primary" onclick="nextQuestion()">下一题</button>
    </div>
    <section id="stage"></section>
  </main>
</div>

r": "B", "answerText": "1", "raw": "有一控制系统，其阶跃响应如图所示，其衰减率为______。\nA. 0\nB. 1\nC. 无穷大\nD. -1", "day": 1}, {"id": 31, "number": 270, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制基本概念（概念部分）", "stem": "稳定性合适的定值控制系统受到扰动后，第一个波峰值与给定值的差值称\n为_______。", "options": {"A": "最大动态偏差", "B": "静态偏差", "C": "超调量", "D": "衰减率"}, "answer": "A", "answerText": "最大动态偏差", "raw": "稳定性合适的定值控制系统受到扰动后，第一个波峰值与给定值的差值称\n为_______。\nA.最大动态偏差\nB.静态偏差\nC.超调量\nD.衰减率", "day": 1}, {"id": 32, "number": 271, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制基本概念（概念部分）", "stem": "在控制系统动态过程结束后，被控量的稳态值与给定值之差称为\n_______。", "options": {"A": "静态偏差", "B": "最大动态偏差", "C": "超调量", "D": "衰减率"}, "answer": "A", "answerText": "静态偏差", "raw": "在控制系统动态过程结束后，被控量的稳态值与给定值之差称为\n_______。\nA.静态偏差\nB.最大动态偏差\nC.超调量\nD.衰减率", "day": 1}, {"id": 33, "number": 272, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制基本概念（概念部分）", "stem": "反馈控制系统从扰动发生到系统达到新稳态这段时间称为_______ 。", "options": {"A": "上升时间", "B": "峰值时间", "C": "过渡过程时间", "D": "振荡周期"}, "answer": "C", "answerText": "过渡过程时间", "raw": "反馈控制系统从扰动发生到系统达到新稳态这段时间称为_______ 。\nA.上升时间\nB.峰值时间\nC.过渡过程时间\nD.振荡周期", "day": 1}, {"id": 34, "number": 273, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制基本概念（概念部分）", "stem": "有一个反馈控制系统，受到阶跃扰动后，被控量振荡 2~3 次就稳定在给定\n值上，这说明________ 。", "options": {"A": "系统稳定性好", "B": "系统稳定性差", "C": "调节器控制作用太弱", "D": "调节器控制作用太强"}, "answer": "A", "answerText": "系统稳定性好", "raw": "有一个反馈控制系统，受到阶跃扰动后，被控量振荡 2~3 次就稳定在给定\n值上，这说明________ 。\nA.系统稳定性好\nB.系统稳定性差\nC.调节器控制作用太弱\nD.调节器控制作用太强", "day": 1}, {"id": 35, "number": 274, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制基本概念（概念部分）", "stem": "在定值控制系统中，其动态过程的衰减率 φ= 0.75，则该系统的动态过程\n是_______。", "options": {"A": "非周期过程", "B": "衰减振荡过程", "C": "等幅振荡过程", "D": "发散振荡过程"}, "answer": "B", "answerText": "衰减振荡过程", "raw": "在定值控制系统中，其动态过程的衰减率 φ= 0.75，则该系统的动态过程\n是_______。\nA.非周期过程\nB.衰减振荡过程\nC.等幅振荡过程\nD.发散振荡过程", "day": 1}, {"id": 36, "number": 275, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制基本概念（概念部分）", "stem": "反馈控制系统在_______ 条件下，才能在实际运行中应用。", "options": {"A": " 动", "raw": "主空气压缩机的自动控制线路中，用压力开关实现其在气压设定的高压值\n时________而在气压设定的低压值时_______ 。\nA.自动停止；自动停止\nB.自动停止；自动起动\nC.自动起动；自动停止\nD.自动起动；自动报警", "day": 1}, {"id": 130, "number": 509, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制的基本概念（双位控制和空压机控制）", "stem": "空气压缩机的自动起、停控制线路中不可缺少_______ ，以实现在设定的\n高压时空压机_______。", "options": {"A": "压力继电器；停止", "B": "压力继电器；起动", "C": "热继电器；起动", "D": "热继电器；报警"}, "answer": "A", "answerText": "压力继电器；停止", "raw": "空气压缩机的自动起、停控制线路中不可缺少_______ ，以实现在设定的\n高压时空压机_______。\nA.压力继电器；停止\nB.压力继电器；起动\nC.热继电器；起动\nD.热继电器；报警", "day": 1}, {"id": 131, "number": 510, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制的基本概念（双位控制和空压机控制）", "stem": "船舶空压机起动时需要满足的条件包括________。\n①电动机未过载保护；②泄放电磁阀有电；③滑油压力正常；④温度保护开关\n正常", "options": {"A": "①②③", "B": "①③④", "C": "①②④", "D": "①②③④"}, "answer": "C", "answerText": "①②④", "raw": "船舶空压机起动时需要满足的条件包括________。\n①电动机未过载保护；②泄放电磁阀有电；③滑油压力正常；④温度保护开关\n正常\nA.①②③\nB.①③④\nC.①②④\nD.①②③④", "day": 1}, {"id": 132, "number": 511, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制的基本概念（双位控制和空压机控制）", "stem": "船舶两台主空压机的电动机功率较大，在对控制空压机自动起、停的压力\n开关进行整定时，最好是对压力开关起动设定值_______ ，停止设定值\n________ 。", "options": {"A": "不同；不同", "B": "相同；相同", "C": "相同；不同", "D": "不同；相同"}, "answer": "A", "answerText": "不同；不同", "raw": "船舶两台主空压机的电动机功率较大，在对控制空压机自动起、停的压力\n开关进行整定时，最好是对压力开关起动设定值_______ ，停止设定值\n________ 。\nA.不同；不同\nB.相同；相同\nC.相同；不同\nD.不同；相同", "day": 1}, {"id": 133, "number": 512, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制的基本概念（双位控制和空压机控制）", "stem": "船舶空压机运行中应受到有效保护以预防发生严重机损故障，在控制系统\n中需要设置空压机________ 。\n①低油压停车保护；②高温停车保护；③电动机过载停车保护；④供气泄漏保\n护", "options": {"A": "②③", "B": "①③④", "C": "①②③④", "D": "①②③"}, "answer": "D", "answerText": "①②③", "raw": "船舶空压机运行中应受到有效保护以预防发生严重机损故障，在控制系统\n中需要设置空压机________ 。\n①低油压停车保护；②高温停车保护；③电动机过载停车保护；④供气泄漏保\n护\nA.②③\nB.①③④\nC.①②③④\nD.①②③", "day": 1}, {"id": 134, "number": 518, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制的基本概念（双位控制和空压机控制）", "stem": "在 YT-1226 型压力调节器中，若要保持下限值不变、提高压力的上限值，应\n_______。", "options": {"A": "增大给定弹簧的预紧力", "B": "减小给定弹簧的预紧力", "C": "增大幅差弹簧的预紧力", "D": "减小幅差弹簧的预紧力"}, "answer": "C", "answerText": "增大幅差弹簧的预紧力", "raw": "在 YT-1226 型压力调节器中，若要保持下限值不变、提高压力的上限值，应\n_______。\nA.增大给定弹簧的预紧力\nB.减小给定弹簧的预紧力\nC.增大幅差弹簧的预紧力\nD.减小幅差弹簧的预紧力", "day": 1}, {"id": 135, "number": 519, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制的基本概念（双位控制和空压机控制）", "stem": "在 YT-1226 型压力调节器中，其输入和输出信号分别是________。", "options": {"A": "给定弹簧预紧力，幅差弹簧预紧力", "B": "压力信号，给定弹簧预紧力", "C": "幅差弹簧预紧力，开关状态", "D": "压力信号，开关状态"}, "answer": "D", "answerText": "压力信号，开关状态", "raw": "在 YT-1226 型压力调节器中，其输入和输出信号分别是________。\nA. 给定弹簧预紧力，幅差弹簧预紧力\nB. 压力信号，给定弹簧预紧力\nC. 幅差弹簧预紧力，开关状态\nD. 压力信号，开关状态", "day": 1}, {"id": 136, "number": 520, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制的基本概念（双位控制和空压机控制）", "stem": "在采用 PI 调节器组成的气缸冷却水温度控制系统中，温度给定值是 81°C\n系统受到扰动后达到稳态时温度表指针指在 82°C 上，其原因可能是_____ 。", "options": {"A": "比例带 PB 调得太小", "B": "比例带 PB 调得过大", "C": "积分时间 Ti 整定得太短", "D": "积分作用被切除"}, "answer": "D", "answerText": "积分作用被切除", "raw": "在采用 PI 调节器组成的气缸冷却水温度控制系统中，温度给定值是 81°C\n系统受到扰动后达到稳态时温度表指针指在 82°C 上，其原因可能是_____ 。\nA.比例带 PB 调得太小\nB.比例带 PB 调得过大\nC.积分时间 Ti 整定得太短\nD.积分作用被切除", "day": 1}, {"id": 137, "number": 521, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制的基本概念（双位控制和空压机控制）", "stem": "如图所示的 NAKAKITA 型气动 PID 调节器在船舶机舱中常用于主机燃油黏\n度控制系统，关于调节器的正确说法是___ 。", "options": {"A": "它的工作方式是反作用式，按位移平衡原理工作的", "B": "它的工作方式是反作用式，按力矩平衡原理工作的", "C": "它的工作方式是正作用式，按位移平衡原理工作的", "D": "它的工作方式是正作用式，按力矩平衡原理工作的"}, "answer": "A", "answerText": "它的工作方式是反作用式，按位移平衡原理工作的", "raw": "如图所示的 NAKAKITA 型气动 PID 调节器在船舶机舱中常用于主机燃油黏\n度控制系统，关于调节器的正确说法是___ 。\nA. 它的工作方式是反作用式，按位移平衡原理工作的\nB. 它的工作方式是反作用式，按力矩平衡原理工作的\nC. 它的工作方式是正作用式，按位移平衡原理工作的\nD. 它的工作方式是正作用式，按力矩平衡原理工作的", "day": 1}, {"id": 138, "number": 522, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制的基本概念（双位控制和空压机控制）", "stem": "在采用 PI 调节器的燃油黏度自动控制系统中，当把调节器气整定为 Ti→∞\n时，则________。", "options": {"A": "稳定性变差", "B": "静态精度变差", "C": "蒸汽调节阀动作频繁", "D": "最大动态偏差明显增大"}, "answer": "B", "answerText": "静态精度变差", "raw": "在采用 PI 调节器的燃油黏度自动控制系统中，当把调节器气整定为 Ti→∞\n时，则________。\nA.稳定性变差\nB.静态精度变差\nC.蒸汽调节阀动作频繁\nD.最大动态偏差明显增大", "day": 1}, {"id": 139, "number": 523, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制的基本概念（双位控制和空压机控制）", "stem": "如图所示，在气动 P 型调节器组成的控制系统中，通过移动_______ 的位\n置，即改变_______ 可以调整比例调节器的比例系数。", "options": {"A": "测量波纹管；测量力臂的长度", "B": "测量波纹管；反馈力臂的长度", "C": "反馈波纹管；反馈力臂的长度", "D": "反馈波纹管；测量力臂的长度"}, "answer": "C", "answerText": "反馈波纹管；反馈力臂的长度", "raw": "如图所示，在气动 P 型调节器组成的控制系统中，通过移动_______ 的位\n置，即改变_______ 可以调整比例调节器的比例系数。\nA.测量波纹管；测量力臂的长度\nB.测量波纹管；反馈力臂的长度\nC.反馈波纹管；反馈力臂的长度\nD.反馈波纹管；测量力臂的长度", "day": 1}, {"id": 140, "number": 524, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制的基本概念（双位控制和空压机控制）", "stem": "如图所示，在气动 P 型调节器组成的控制系统中，是_______ 式调节器。", "options": {"A": "气开", "B": "气关", "C": "正作用", "D": "反作用"}, "answer": "D", "answerText": "反作用", "raw": "如图所示，在气动 P 型调节器组成的控制系统中，是_______ 式调节器。\nA.气开\nB.气关\nC.正作用\nD.反作用", "day": 1}, {"id": 141, "number": 525, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制的基本概念（双位控制和空压机控制）", "stem": "双脉冲调节器接收发电机的_______ 。", "options": {"A": "转速信号和有功功率信号", "B": "转速信号和无功功率信号", "C": "电压信号和有功功率信号", "D": "电压信号和无功功率信号"}, "answer": "A", "answerText": "转速信号和有功功率信号", "raw": "双脉冲调节器接收发电机的_______ 。\nA.转速信号和有功功率信号\nB.转速信号和无功功率信号\nC.电压信号和有功功率信号\nD.电压信号和无功功率信号", "day": 1}, {"id": 142, "number": 526, "chapter": "第一章船舶自动控制基础", "section": "第一节 自动控制的基本概念（双位控制和空压机控制）", "stem": "在 PID 调节器中，______意味着控制作用弱，控制过程更加稳定。", "options": {"A": "PB 和 Ti 增大", "B": "PB 和 Ti 减小", "C": "PB 增大，Ti 减小", "D": "PB 减小，Ti 增大"}, "answer": "A", "answerText": "PB 和 Ti 增大", "raw": "在 PID 调节器中，______意味着控制作用弱，控制过程更加稳定。\nA. PB 和 Ti 增大\nB. PB 和 Ti 减小\nC. PB 增大，Ti 减小\nD. PB 减小，Ti 增大", "day": 1}, {"id": 143, "number": 170, "chapter": "第一章船舶自动控制基础", "section": "第二节 船舶机舱控制回路（压力水柜和 ENGARD 冷却水）", "stem": "淡水压力柜的水泵电动机起、停过于频繁，电器方面的因素可能是_____。", "options": {"A": "压力继电器低限值整定太高", "B": "压力继电器高限值整定太低", "C": "压力继电器低限值整定太低", "D": "压力继电器低限值整定太高和高限值整定太低，整定值接近"}, "answer": "D", "answerText": "压力继电器低限值整定太高和高限值整定太低，整定值接近", "raw": "淡水压力柜的水泵电动机起、停过于频繁，电器方面的因素可能是_____。\nA. 压力继电器低限值整定太高\nB. 压力继电器高限值整定太低\nC. 压力继电器低限值整定太低\nD. 压力继电器低限值整定太高和高限值整定太低，整定值接近", "day": 1}, {"id": 144, "number": 171, "chapter": "第一章船舶自动控制基础", "section": "第二节 船舶机舱控制回路（压力水柜和 ENGARD 冷却水）", "stem": "如图所示的水位控制系统。 电路中KM 常开辅助触头因故不能闭合， 则会出\n现手动时电机____，自动时电机_______ 。", "options": {"A": "只能点动；在水位低限处起、停", "B": "只能点动；在水位高限处起、停", "C": "不能起动；不能起动", "D": "不能起动；实现双位控制"}, "answer": "A", "answerText": "只能点动；在水位低限处起、停", "raw": "如图所示的水位控制系统。 电路中KM 常开辅助触头因故不能闭合， 则会出\n现手动时电机____，自动时电机_______ 。\nA.只能点动；在水位低限处起、停\nB.只能点动；在水位高限处起、停\nC.不能起动；不能起动\nD.不能起动；实现双位控制", "day": 1}, {"id": 145, "number": 172, "chapter": "第一章船舶自动控制基础", "section": "第二节 船舶机舱控制回路（压力水柜和 ENGARD 冷却水）", "stem": "如图所示的水位控制电路。当水位处于 LH 与 LL 之间，此时触点 KP(L)的状\n态是____，若此时 SA 处于自动位置，合上 QS 开关后，电机会________。", "options": {"A": "断开的；起动", "B": "断开的；不起动", "C": "闭合；起动", "D": "闭合；不起动"}, "answer": "B", "answerText": "断开的；不起动", "raw": "如图所示的水位控制电路。当水位处于 LH 与 LL 之间，此时触点 KP(L)的状\n态是____，若此时 SA 处于自动位置，合上 QS 开关后，电机会________。\nA.断开的；起动\nB.断开的；不起动\nC.闭合；起动\nD.闭合；不起动", "day": 1}, {"id": 146, "number": 174, "chapter": "第一章船舶自动控制基础", "section": "第二节 船舶机舱控制回路（压力水柜和 ENGARD 冷却水）", "stem": "如图所示的水位控制电路。若将压力继电器的两个触点位置互换，在水位低\n于 LL 时，将 SA 合自动位置，在合上 QS 后，会出现_______。", "options": {"A": "电机立即起动，水泵给水，当水位达到 LL 时，水泵停", "B": "电机立即起动，水泵给水，当水位达到 LH 时，水泵停", "C": "电机不能起动", "D": "电机立即起动，水泵给水，但当水位达到 LH 时，水泵仍供水不停"}, "answer": "A", "answerText": "电机立即起动，水泵给水，当水位达到 LL 时，水泵停", "raw": "如图所示的水位控制电路。若将压力继电器的两个触点位置互换，在水位低\n于 LL 时，将 SA 合自动位置，在合上 QS 后，会出现_______。\nA. 电机立即起动，水泵给水，当水位达到 LL 时，水泵停\nB. 电机立即起动，水泵给水，当水位达到 LH 时，水泵停\nC. 电机不能起动\nD.电机立即起动，水泵给水，但当水位达到 LH 时，水泵仍供水不停", "day": 1}, {"id": 147, "number": 175, "chapter": "第一章船舶自动控制基础", "section": "第二节 船舶机舱控制回路（压力水柜和 ENGARD 冷却水）", "stem": "如图所示的水位控制电路。发现给水泵起、停频繁 ，其原因可能是______。", "options": {"A": "压力开关低压 KP(L)触头因故不能闭合", "B": "压力开关高压 KP(H)触头因故不能打开", "C": "压力开关的低压或(和)高压整定值不当", "D": "接触器 KM 铁芯端面上的短路铜环断裂"}, "answer": "C", "answerText": "压力开关的低压或(和)高压整定值不当", "raw": "如图所示的水位控制电路。发现给水泵起、停频繁 ，其原因可能是______。\nA. 压力开关低压 KP(L)触头因故不能闭合\nB. 压力开关高压 KP(H)触头因故不能打开\nC. 压力开关的低压或(和)高压整定值不当\nD. 接触器 KM 铁芯端面上的短路铜环断裂", "day": 1}, {"id": 148, "number": 463, "chapter": "第一章船舶自动控制基础", "section": "第二节 船舶机舱控制回路（压力水柜和 ENGARD 冷却水）", "stem": "在中央冷却水温度控制系统中， ENGARD 控制器能对冷却水温度进行\n_______ 。", "options": {"A": "双位控制", "B": "比例微分定值控制", "C": "比例积分定值控制", "D": "比例积分微分定值控制"}, "answer": "C", "answerText": "比例积分定值控制", "raw": "在中央冷却水温度控制系统中， ENGARD 控制器能对冷却水温度进行\n_______ 。\nA.双位控制\nB.比例微分定值控制\nC.比例积分定值控制\nD.比例积分微分定值控制", "day": 1}, {"id": 149, "number": 464, "chapter": "第一章船舶自动控制基础", "section": "第二节 船舶机舱控制回路（压力水柜和 ENGARD 冷却水）", "stem": "ENGARD 中央冷却水温度控制系统主要是对_______ 的控制。 ①低温淡水\n温度；②高温淡水温度；③海水温度；④海水流量", "options": {"A": "①④", "B": "①③", "C": "②④", "D": "①②"}, "answer": "A", "answerText": "①④", "raw": "ENGARD 中央冷却水温度控制系统主要是对_______ 的控制。 ①低温淡水\n温度；②高温淡水温度；③海水温度；④海水流量\nA.①④\nB.①③\nC.②④\nD.①②", "day": 1}, {"id": 150, "number": 465, "chapter": "第一章船舶自动控制基础", "section": "第二节 船舶机舱控制回路（压力水柜和 ENGARD 冷却水）", "stem": "ENGARD 中央冷却水温度控制系统的功能， 包括________ ①低温淡水温度\n控制；②主淡水泵的控制；③控制海水泵，实现冷却海水流量的控制； ④高温\n淡水温度控制；⑤报警与显示", "options": {"A": "①③④⑤", "B": "①③④", "C": "②④⑤", "D": "①③⑤"}, "answer": "D", "answerText": "①③⑤", "raw": "ENGARD 中央冷却水温度控制系统的功能， 包括________ ①低温淡水温度\n控制；②主淡水泵的控制；③控制海水泵，实现冷却海水流量的控制； ④高温\n淡水温度控制；⑤报警与显示\nA.①③④⑤\nB.①③④\nC.②④⑤\nD.①③⑤", "day": 1}, {"id": 151, "number": 466, "chapter": "第一章船舶自动控制基础", "section": "第二节 船舶机舱控制回路（压力水柜和 ENGARD 冷却水）", "stem": "在 ENGARD 型中央冷却水温度控制系统中， 如果低温淡水调节阀控制旁通\n口开度 V1 的变化范围在 0%~5%，并且淡水温度偏离设定值不超过_______ ，\n则不需要对海水泵的流 量进行调节。", "options": {"A": "0.5 °C", "B": "1.0 °C", "C": "1.5 °C", "D": "2.0 °C"}, "answer": "A", "answerText": "0.5 °C", "raw": "在 ENGARD 型中央冷却水温度控制系统中， 如果低温淡水调节阀控制旁通\n口开度 V1 的变化范围在 0%~5%，并且淡水温度偏离设定值不超过_______ ，\n则不需要对海水泵的流 量进行调节。\nA. 0.5 °C\nB. 1.0 °C\nC. 1.5 °C\nD. 2.0 °C", "day": 1}, {"id": 152, "number": 478, "chapter": "第一章船舶自动控制基础", "section": "第二节 船舶机舱控制回路（压力水柜和 ENGARD 冷却水）", "stem": "在 ENGARD 型中央冷却水温度控制系统中， 若要对参数进行重新设置， 首\n先将 ENGARD 控制箱内的模式选择开关置到_______", "options": {"A": "“Q”位置", "B": "“P”位置", "C": "“R”位置", "D": "“L”位置"}, "answer": "B", "an
